<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" aria-labelledby="retrieval-title retrieval-desc">
  <title id="retrieval-title">Retrieval Optimization</title>
  <desc id="retrieval-desc">Visualization of how the system optimizes retrieval based on context</desc>
  
  <defs>
    <!-- Styles -->
    <style>
      /* Base styles using the Divinci color palette */
      .background { fill: #F5F7FA; }
      .container { fill: #F5F7FA; stroke: #485262; stroke-width: 1.5; }
      .primary-connection { stroke: #2E5BFF; stroke-width: 2; fill: none; }
      .secondary-connection { stroke: #00D8D8; stroke-width: 1.5; fill: none; }
      .tertiary-connection { stroke: #B0B7C3; stroke-width: 1; stroke-dasharray: 4,2; fill: none; }
      .highlight-connection { stroke: #8C54FF; stroke-width: 2.5; fill: none; }
      
      .primary-node { fill: #F5F7FA; stroke: #2E5BFF; stroke-width: 2; }
      .secondary-node { fill: #F5F7FA; stroke: #00D8D8; stroke-width: 2; }
      .tertiary-node { fill: #F5F7FA; stroke: #8C54FF; stroke-width: 2; }
      .node-highlight { fill: #F0F5FF; }
      
      .icon-primary { fill: #2E5BFF; }
      .icon-secondary { fill: #00D8D8; }
      .icon-tertiary { fill: #8C54FF; }
      
      text {
        font-family: 'Inter', sans-serif;
        fill: #485262;
      }
      .title-text { 
        font-size: 16px; 
        font-weight: 500;
      }
      .subtitle-text { 
        font-size: 14px; 
        font-weight: 400;
      }
      .detail-text { 
        font-size: 12px; 
        font-weight: 400;
      }
      
      /* Animation keyframes */
      @keyframes flowAnimation {
        from { stroke-dashoffset: 400; }
        to { stroke-dashoffset: 0; }
      }
      
      .animated-path {
        stroke-dasharray: 5, 3;
        animation: flowAnimation 10s linear infinite;
      }
      
      .query-box {
        fill: #F5F7FA;
        stroke: #2E5BFF;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .optimizer-box {
        fill: #F5F7FA;
        stroke: #8C54FF;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .result-box {
        fill: #F5F7FA;
        stroke: #00D8D8;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .context-highlight {
        fill: #F0F5FF;
        stroke: #2E5BFF;
        stroke-width: 1;
        rx: 2;
        ry: 2;
      }
      
      .performance-indicator-good { fill: #00D27A; }
      .performance-indicator-medium { fill: #FFAB2D; }
      .performance-indicator-attention { fill: #FF5C5C; }
    </style>
    
    <!-- Gradient for retrieval flow -->
    <linearGradient id="retrievalFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8C54FF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#00D8D8" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Special effect for optimization area -->
    <filter id="optimization-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" class="background"/>
  
  <!-- User Query -->
  <g transform="translate(20, 30)">
    <rect width="70" height="50" class="query-box"/>
    <text x="35" y="25" class="subtitle-text" text-anchor="middle">Query</text>
    <path d="M 20,35 Q 35,45 50,35" class="icon-primary" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Context Analysis -->
  <g transform="translate(20, 110)">
    <rect width="70" height="60" class="optimizer-box"/>
    <text x="35" y="25" class="subtitle-text" text-anchor="middle">Context</text>
    <text x="35" y="40" class="subtitle-text" text-anchor="middle">Analysis</text>
    
    <!-- Context visualization -->
    <circle cx="25" cy="55" r="3" class="icon-tertiary"/>
    <circle cx="35" cy="55" r="3" class="icon-tertiary"/>
    <circle cx="45" cy="55" r="3" class="icon-tertiary"/>
  </g>
  
  <!-- Retrieval Optimizer -->
  <g transform="translate(115, 70)">
    <rect width="90" height="70" class="tertiary-node" rx="6" ry="6" filter="url(#optimization-glow)"/>
    <text x="45" y="30" class="subtitle-text" text-anchor="middle">Retrieval</text>
    <text x="45" y="45" class="subtitle-text" text-anchor="middle">Optimizer</text>
    
    <!-- Optimization signals -->
    <path d="M 25,55 L 35,65 L 45,50 L 55,60 L 65,55" class="icon-tertiary" stroke-width="1.5" fill="none"/>
  </g>
  
  <!-- Vector Database -->
  <g transform="translate(230, 25)">
    <path d="M 0,10 Q 0,0 35,0 Q 70,0 70,10 L 70,40 Q 70,50 35,50 Q 0,50 0,40 Z" class="tertiary-node"/>
    <text x="35" y="25" class="subtitle-text" text-anchor="middle" font-size="12px">Vector DB</text>
    
    <!-- Database rows -->
    <line x1="15" y1="35" x2="55" y2="35" class="icon-primary" stroke-width="1"/>
    <line x1="15" y1="40" x2="55" y2="40" class="icon-primary" stroke-width="1"/>
  </g>
  
  <!-- Results -->
  <g transform="translate(230, 110)">
    <rect width="70" height="70" class="result-box"/>
    <text x="35" y="25" class="subtitle-text" text-anchor="middle">Optimized</text>
    <text x="35" y="40" class="subtitle-text" text-anchor="middle">Results</text>
    
    <!-- Result items with different relevance -->
    <rect x="15" y="50" width="40" height="10" class="context-highlight"/>
    <rect x="15" y="65" width="40" height="10" class="context-highlight" opacity="0.7"/>
    <rect x="15" y="80" width="40" height="10" class="context-highlight" opacity="0.4"/>
    
    <!-- Relevance indicators -->
    <circle cx="60" cy="55" r="3" class="performance-indicator-good"/>
    <circle cx="60" cy="70" r="3" class="performance-indicator-medium"/>
    <circle cx="60" cy="85" r="3" class="performance-indicator-attention"/>
  </g>
  
  <!-- Connections -->
  <path d="M 90,55 L 115,105" class="primary-connection animated-path"/>
  <path d="M 90,140 L 115,105" class="secondary-connection animated-path"/>
  
  <path d="M 205,105 L 230,50" class="highlight-connection animated-path"/>
  <path d="M 205,105 L 230,145" class="highlight-connection animated-path"/>
  
  <path d="M 265,75 L 265,110" class="secondary-connection animated-path"/>
  
  <!-- Feedback loop -->
  <path d="M 230,165 C 200,180 130,180 100,170 C 70,160 50,125 55,105" class="tertiary-connection"/>
  <text x="160" y="185" class="detail-text" text-anchor="middle">Continuous Optimization Feedback</text>
</svg>