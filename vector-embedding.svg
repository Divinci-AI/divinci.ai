<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" aria-labelledby="vector-embed-title vector-embed-desc">
  <title id="vector-embed-title">Vector Embedding</title>
  <desc id="vector-embed-desc">Visualization of how text is converted to vector embeddings and stored in a vector database</desc>
  
  <defs>
    <!-- Styles -->
    <style>
      /* Base styles using the Divinci color palette */
      .background { fill: #F5F7FA; }
      .container { fill: #F5F7FA; stroke: #485262; stroke-width: 1.5; }
      .primary-connection { stroke: #2E5BFF; stroke-width: 2; fill: none; }
      .secondary-connection { stroke: #00D8D8; stroke-width: 1.5; fill: none; }
      .tertiary-connection { stroke: #B0B7C3; stroke-width: 1; stroke-dasharray: 4,2; fill: none; }
      .highlight-connection { stroke: #8C54FF; stroke-width: 2.5; fill: none; }
      
      .primary-node { fill: #F5F7FA; stroke: #2E5BFF; stroke-width: 2; }
      .secondary-node { fill: #F5F7FA; stroke: #00D8D8; stroke-width: 2; }
      .tertiary-node { fill: #F5F7FA; stroke: #8C54FF; stroke-width: 2; }
      .node-highlight { fill: #F0F5FF; }
      
      .icon-primary { fill: #2E5BFF; }
      .icon-secondary { fill: #00D8D8; }
      .icon-tertiary { fill: #8C54FF; }
      
      text {
        font-family: 'Inter', sans-serif;
        fill: #485262;
      }
      .title-text { 
        font-size: 16px; 
        font-weight: 500;
      }
      .subtitle-text { 
        font-size: 14px; 
        font-weight: 400;
      }
      .detail-text { 
        font-size: 12px; 
        font-weight: 400;
      }
      
      /* Animation keyframes */
      @keyframes flowAnimation {
        from { stroke-dashoffset: 400; }
        to { stroke-dashoffset: 0; }
      }
      
      .animated-path {
        stroke-dasharray: 5, 3;
        animation: flowAnimation 10s linear infinite;
      }
      
      .text-box {
        fill: #F5F7FA;
        stroke: #2E5BFF;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .vector-box {
        fill: #F5F7FA;
        stroke: #00D8D8;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .database {
        fill: #F5F7FA;
        stroke: #8C54FF;
        stroke-width: 2;
      }
      
      .vector-point {
        fill: #2E5BFF;
        r: 2;
      }
    </style>
    
    <!-- Gradient for embedding flow -->
    <linearGradient id="embeddingFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E5BFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8C54FF" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" class="background"/>
  
  <!-- Text Input -->
  <g transform="translate(20, 30)">
    <rect width="60" height="60" class="text-box"/>
    <text x="30" y="25" class="subtitle-text" text-anchor="middle">Text</text>
    <line x1="10" y1="35" x2="50" y2="35" class="icon-primary" stroke-width="1"/>
    <line x1="10" y1="45" x2="50" y2="45" class="icon-primary" stroke-width="1"/>
    <line x1="10" y1="55" x2="40" y2="55" class="icon-primary" stroke-width="1"/>
  </g>
  
  <!-- Embedding Model -->
  <g transform="translate(120, 20)">
    <rect width="80" height="80" class="secondary-node" rx="6" ry="6"/>
    <text x="40" y="45" class="subtitle-text" text-anchor="middle">Embedding</text>
    <text x="40" y="60" class="subtitle-text" text-anchor="middle">Model</text>
    <circle cx="40" cy="30" r="10" class="icon-secondary" opacity="0.6"/>
  </g>
  
  <!-- Vector Representation -->
  <g transform="translate(230, 30)">
    <rect width="60" height="60" class="vector-box"/>
    <text x="30" y="25" class="subtitle-text" text-anchor="middle">Vector</text>
    
    <!-- Vector points and lines -->
    <line x1="15" y1="40" x2="45" y2="40" class="icon-secondary" stroke-width="1"/>
    <circle cx="15" cy="40" class="vector-point"/>
    <circle cx="30" cy="40" class="vector-point"/>
    <circle cx="45" cy="40" class="vector-point"/>
    
    <line x1="20" y1="50" x2="40" y2="50" class="icon-secondary" stroke-width="1"/>
    <circle cx="20" cy="50" class="vector-point"/>
    <circle cx="40" cy="50" class="vector-point"/>
    
    <line x1="10" y1="60" x2="50" y2="60" class="icon-secondary" stroke-width="1"/>
    <circle cx="10" cy="60" class="vector-point"/>
    <circle cx="25" cy="60" class="vector-point"/>
    <circle cx="50" cy="60" class="vector-point"/>
  </g>
  
  <!-- Vector Space -->
  <g transform="translate(10, 120)">
    <rect width="100" height="70" class="container" rx="6" ry="6"/>
    <text x="50" y="25" class="subtitle-text" text-anchor="middle">Vector Space</text>
    
    <!-- Vector space visualization -->
    <line x1="25" y1="40" x2="75" y2="40" class="tertiary-connection"/>
    <line x1="25" y1="65" x2="75" y2="65" class="tertiary-connection"/>
    <line x1="25" y1="40" x2="25" y2="65" class="tertiary-connection"/>
    <line x1="75" y1="40" x2="75" y2="65" class="tertiary-connection"/>
    
    <!-- Vector points in space -->
    <circle cx="35" cy="50" r="2" class="icon-primary"/>
    <circle cx="45" cy="60" r="2" class="icon-primary"/>
    <circle cx="65" cy="45" r="2" class="icon-primary"/>
    <circle cx="55" cy="55" r="2" class="icon-primary"/>
  </g>
  
  <!-- Vector Database -->
  <g transform="translate(190, 120)">
    <path d="M 0,15 Q 0,0 50,0 Q 100,0 100,15 L 100,55 Q 100,70 50,70 Q 0,70 0,55 Z" class="database"/>
    <text x="50" y="25" class="subtitle-text" text-anchor="middle">Vector</text>
    <text x="50" y="40" class="subtitle-text" text-anchor="middle">Database</text>
    
    <!-- Database rows -->
    <line x1="20" y1="50" x2="80" y2="50" class="icon-tertiary" stroke-width="1"/>
    <line x1="20" y1="55" x2="80" y2="55" class="icon-tertiary" stroke-width="1"/>
    <line x1="20" y1="60" x2="80" y2="60" class="icon-tertiary" stroke-width="1"/>
  </g>
  
  <!-- Connections -->
  <path d="M 80,60 L 120,60" class="primary-connection animated-path"/>
  <path d="M 200,60 L 230,60" class="primary-connection animated-path"/>
  
  <path d="M 50,90 L 50,120" class="secondary-connection animated-path"/>
  <path d="M 260,90 L 240,120" class="secondary-connection animated-path"/>
  
  <path d="M 110,155 L 190,155" class="highlight-connection animated-path"/>
  
  <!-- Flow description -->
  <text x="150" y="190" class="detail-text" text-anchor="middle">Text to Vector Embedding Process</text>
</svg>