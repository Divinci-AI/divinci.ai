    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            // Get elements
            const leftAntenna = document.getElementById('left-antenna');
            const rightAntenna = document.getElementById('right-antenna');
            const leftArm = document.getElementById('left-arm');
            const rightArm = document.getElementById('right-arm');
            const leftEye = document.getElementById('left-eye');
            const rightEye = document.getElementById('right-eye');
            const heart = document.getElementById('heart');
            const animateButton = document.getElementById('animate-button');
            
            console.log('Elements:', { 
                leftAntenna, 
                rightAntenna, 
                leftArm, 
                rightArm, 
                leftEye,
                rightEye,
                heart, 
                animateButton 
            });
            
            // Set transform origins
            gsap.set(leftArm, { transformOrigin: "124px 224px" });
            gsap.set(rightArm, { transformOrigin: "276px 224px" });
            gsap.set(leftAntenna, { transformOrigin: "120px 40px" });
            gsap.set(rightAntenna, { transformOrigin: "280px 40px" });
            
            // Create timeline
            const timeline = gsap.timeline({ paused: true });
            
            // Add animations
            
            // 1. Antennas tilt outward
            timeline.to(leftAntenna, {
                rotation: -45,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 0);
            
            timeline.to(rightAntenna, {
                rotation: 45,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 0);
            
            // 2. Arms raise
            timeline.to(leftArm, {
                rotation: -45,
                duration: 1.5,
                ease: "back.out(1.7)"
            }, 0.3);
            
            timeline.to(rightArm, {
                rotation: 45,
                duration: 1.5,
                ease: "back.out(1.7)"
            }, 0.3);
            
            // 3. Eyes blink
            timeline.to([leftEye, rightEye], {
                scaleY: 0.1,
                duration: 0.1,
                yoyo: true,
                repeat: 1,
                transformOrigin: "center"
            }, 1);
            
            // 4. Heart pulses
            timeline.to(heart, {
                scale: 1.3,
                fill: "#ff5555",
                duration: 0.5,
                repeat: 3,
                yoyo: true,
                transformOrigin: "center"
            }, 1.5);
            
            // 5. Return to neutral position
            timeline.to([leftAntenna, rightAntenna, leftArm, rightArm], {
                rotation: 0,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 3);
            
            // Add button event listener
            animateButton.addEventListener('click', function() {
                console.log('Button clicked');
                timeline.restart();
            });
        });
    </script>
