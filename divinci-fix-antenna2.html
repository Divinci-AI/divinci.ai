        <button id="animate-button">Test Antenna Animation</button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            // Get elements
            const leftAntenna = document.getElementById('left-antenna');
            const rightAntenna = document.getElementById('right-antenna');
            const animateButton = document.getElementById('animate-button');
            
            // Set transform origins at the base of each antenna
            gsap.set(leftAntenna, { transformOrigin: "119px 100px" });  // Base of left antenna
            gsap.set(rightAntenna, { transformOrigin: "281px 100px" }); // Base of right antenna
            
            // Create timeline
            const timeline = gsap.timeline({ paused: true });
            
            // Add animations with a smaller angle (6 degrees)
            timeline.to(leftAntenna, {
                rotation: -6,  // Tilt left antenna outward by 6 degrees
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 0);
            
            timeline.to(rightAntenna, {
                rotation: 6,  // Tilt right antenna outward by 6 degrees
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 0);
            
            // Return to neutral position
            timeline.to([leftAntenna, rightAntenna], {
                rotation: 0,
                duration: 1.5,
                ease: "elastic.out(1, 0.5)"
            }, 2);
            
            // Add button event listener
            animateButton.addEventListener('click', function() {
                console.log('Button clicked');
                timeline.restart();
            });
        });
    </script>
