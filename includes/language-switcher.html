<!-- Language Switcher Component -->
<div class="language-switcher">
    <div class="language-switcher-current">
        <span class="language-icon" style="display:inline-flex; align-items:center;">
          <i class="fa-solid fa-language" style="font-size: 20px;"></i>
        </span>
        <span class="current-language">English</span>
        <span class="dropdown-icon">▼</span>
    </div>
    <div class="language-switcher-dropdown">
        <a href="#" class="language-option" data-lang="en">
            <span class="language-name">English</span>
            <span class="language-native">English</span>
        </a>
        <a href="#" class="language-option" data-lang="es">
            <span class="language-name">Spanish</span>
            <span class="language-native">Español</span>
        </a>
        <a href="#" class="language-option" data-lang="fr">
            <span class="language-name">French</span>
            <span class="language-native">Français</span>
        </a>
        <a href="#" class="language-option" data-lang="ar">
            <span class="language-name">Arabic</span>
            <span class="language-native">العربية</span>
        </a>
    </div>
</div>

<style>
    /* Global style that affects all language switchers across the site */
    .language-switcher {
        position: relative !important;
        display: inline-block !important;
        font-family: 'Sora', sans-serif;
        margin-left: 15px;
        z-index: 9999 !important;
        overflow: visible !important;
    }

    .language-switcher-current {
        display: flex;
        align-items: center;
        cursor: pointer;
        padding: 8px 12px;
        border-radius: 4px;
        background-color: rgba(255, 255, 255, 0.1);
        transition: background-color 0.3s;
    }

    .language-switcher-current:hover {
        background-color: rgba(255, 255, 255, 0.2);
    }

    .language-icon {
        margin-right: 6px;
        font-size: 16px;
    }

    .current-language {
        font-size: 14px;
        font-weight: 500;
    }

    .dropdown-icon {
        margin-left: 6px;
        font-size: 10px;
        transition: transform 0.3s;
    }

    .language-switcher.active .dropdown-icon {
        transform: rotate(180deg);
    }

    .language-switcher-dropdown {
        position: absolute;
        top: 100%;
        right: 0;
        width: 200px;
        background-color: #fff;
        border-radius: 8px;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
        border: 1px solid rgba(0, 0, 0, 0.08);
        overflow: hidden;
        display: none;
        z-index: 9999;
        float: right;
        margin-top: 4px;
    }

    .language-switcher.active .language-switcher-dropdown {
        display: block !important;
        opacity: 1 !important;
        visibility: visible !important;
        pointer-events: auto !important;
    }

    .language-option {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 16px;
        text-decoration: none;
        color: #333;
        transition: all 0.2s ease;
        border-bottom: 1px solid rgba(0, 0, 0, 0.05);
    }

    .language-option:last-child {
        border-bottom: none;
    }

    .language-option:hover {
        background-color: #f8f9fa;
        color: #2863c2;
    }

    .language-name {
        font-size: 14px;
        font-weight: 500;
    }

    .language-native {
        font-size: 13px;
        color: #666;
        font-weight: 400;
    }

    .language-option:hover .language-native {
        color: #2863c2;
    }

    /* RTL support */
    [dir="rtl"] .language-icon {
        margin-right: 0;
        margin-left: 6px;
    }

    [dir="rtl"] .dropdown-icon {
        margin-left: 0;
        margin-right: 6px;
    }

    /* Fix dropdown positioning for RTL and all language versions */
    [dir="rtl"] .language-switcher-dropdown {
        right: auto;
        left: 0;
    }

    /* Ensure the dropdown stays within the viewport for all language versions */
    html:not([dir="rtl"]) .language-switcher-dropdown {
        right: 0 !important;
        left: auto !important;
        max-width: 100vw;
        position: absolute !important;
        z-index: 9999 !important;
        transform: none !important;
        top: 100% !important;
    }

    /* Keep the language switcher itself aligned properly in the header */
    .language-switcher {
        position: relative !important;
        z-index: 9999 !important;
        transform: none !important;
    }

    /* Dark mode support */
    @media (prefers-color-scheme: dark) {
        .language-switcher-dropdown {
            background-color: #2a2a2a;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        .language-option {
            color: #eee;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .language-option:hover {
            background-color: #3a3a3a;
            color: #4a9eff;
        }

        .language-native {
            color: #aaa;
        }

        .language-option:hover .language-native {
            color: #4a9eff;
        }
    }

    /* Mobile styles */
    @media screen and (max-width: 768px) {
        .language-switcher {
            margin-left: 0;
            margin-top: 10px;
            width: 100%;
        }

        .language-switcher-current {
            justify-content: center;
        }

        .language-switcher-dropdown {
            width: 100%;
            left: 0;
            right: 0;
            position: absolute;
        }

        /* Fix for all language versions on mobile */
        [dir="rtl"] .language-switcher-dropdown,
        [dir="ltr"] .language-switcher-dropdown {
            left: 0;
            right: 0;
            width: 100%;
        }
    }
</style>

<!-- Language switcher initialization is now handled by language-switcher.js -->
<script>
    // This script ensures the dropdown is properly positioned
    document.addEventListener('DOMContentLoaded', function() {
        // Add a specific class to language switchers on language pages
        if (location.pathname.match(/^\/(fr|es|ar)\//)) {
            document.querySelectorAll('.language-switcher').forEach(function(switcher) {
                switcher.classList.add('language-page-switcher');
            });
        }
    });
</script>

<style>
    /* Additional positioning fix for language-specific pages */
    .language-page-switcher .language-switcher-dropdown,
    #language-switcher-container .language-switcher-dropdown {
        position: absolute !important;
        top: 100% !important;
        right: 0 !important;
        left: auto !important;
        transform: none !important;
        z-index: 9999 !important;
    }

    [dir="rtl"] .language-page-switcher .language-switcher-dropdown,
    [dir="rtl"] #language-switcher-container .language-switcher-dropdown {
        left: 0 !important;
        right: auto !important;
    }

    /* Global fix for headers in all pages */
    .navbar .language-switcher-dropdown {
        position: absolute !important;
        top: 100% !important;
        right: 0 !important;
        left: auto !important;
        z-index: 9999 !important;
        transform: none !important;
    }

    /* RTL specific fix for all pages */
    [dir="rtl"] .navbar .language-switcher-dropdown {
        right: auto !important;
        left: 0 !important;
    }
</style>
