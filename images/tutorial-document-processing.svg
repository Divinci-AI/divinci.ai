<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    
    <!-- Glow filter for the documents -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Document pattern -->
    <pattern id="docPattern" patternUnits="userSpaceOnUse" width="50" height="50" patternTransform="rotate(45)">
      <rect width="50" height="50" fill="none" />
      <line x1="0" y1="0" x2="50" y2="0" stroke="#5ce2e7" stroke-width="0.5" stroke-opacity="0.1" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="500" cy="300" r="100" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Grid lines -->
  <g stroke="#5ce2e7" stroke-width="0.5" stroke-opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
  </g>
  
  <!-- Document stack illustration -->
  <g transform="translate(300, 200)" filter="url(#glow)">
    <!-- Document 3 (bottom) -->
    <g transform="translate(-10, 10)">
      <rect x="-60" y="-80" width="120" height="160" rx="5" fill="#ffffff" />
      <rect x="-50" y="-70" width="100" height="10" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-55" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-45" width="80" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-35" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-25" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-15" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-5" width="70" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="5" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="15" width="85" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="25" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="35" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="45" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="55" width="75" height="5" rx="2" fill="#e0e0e0" />
    </g>
    
    <!-- Document 2 (middle) -->
    <g transform="translate(0, 0)">
      <rect x="-60" y="-80" width="120" height="160" rx="5" fill="#ffffff" />
      <rect x="-50" y="-70" width="100" height="10" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-55" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-45" width="80" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-35" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-25" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-15" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-5" width="70" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="5" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="15" width="85" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="25" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="35" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="45" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="55" width="75" height="5" rx="2" fill="#e0e0e0" />
    </g>
    
    <!-- Document 1 (top) -->
    <g transform="translate(10, -10)">
      <rect x="-60" y="-80" width="120" height="160" rx="5" fill="#ffffff" />
      <rect x="-50" y="-70" width="100" height="10" rx="2" fill="#5ce2e7" opacity="0.7" />
      <rect x="-50" y="-55" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-45" width="80" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-35" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-25" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-15" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-5" width="70" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="5" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="15" width="85" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="25" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="35" width="90" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="45" width="100" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="55" width="75" height="5" rx="2" fill="#e0e0e0" />
    </g>
    
    <!-- Magnifying glass -->
    <g transform="translate(80, -40) rotate(15)">
      <circle cx="0" cy="0" r="25" fill="none" stroke="#5ce2e7" stroke-width="4" />
      <line x1="20" y1="20" x2="40" y2="40" stroke="#5ce2e7" stroke-width="4" stroke-linecap="round" />
      <circle cx="0" cy="0" r="20" fill="#5ce2e7" fill-opacity="0.1" />
    </g>
    
    <!-- Processing arrows -->
    <g>
      <path d="M-80,-20 C-100,0 -100,40 -80,60" fill="none" stroke="#5ce2e7" stroke-width="2" stroke-linecap="round" />
      <polygon points="-80,60 -85,50 -75,50" fill="#5ce2e7" />
      
      <path d="M80,-20 C100,0 100,40 80,60" fill="none" stroke="#5ce2e7" stroke-width="2" stroke-linecap="round" />
      <polygon points="80,60 75,50 85,50" fill="#5ce2e7" />
    </g>
  </g>
  
  <!-- Title -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Document Processing</text>
  
  <!-- Divinci Logo -->
  <g transform="translate(40, 40) scale(0.4)">
    <rect width="60" height="60" rx="10" fill="#16214c" stroke="white" stroke-width="2" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">D</text>
  </g>
</svg>
