<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    
    <!-- Glow filter for the rocket -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Particle animation -->
    <radialGradient id="particleGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#5ce2e7" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#5ce2e7" stop-opacity="0" />
    </radialGradient>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="50" cy="50" r="80" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="550" cy="350" r="100" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="300" cy="200" r="150" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.15" />
  
  <!-- Grid lines -->
  <g stroke="#5ce2e7" stroke-width="0.5" stroke-opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
  </g>
  
  <!-- Rocket illustration -->
  <g transform="translate(300, 200) scale(0.8)" filter="url(#glow)">
    <!-- Rocket body -->
    <path d="M0,-80 C-10,-70 -15,-40 -15,0 L-15,40 C-15,50 -10,60 0,60 C10,60 15,50 15,40 L15,0 C15,-40 10,-70 0,-80 Z" fill="#ffffff" />
    
    <!-- Rocket window -->
    <circle cx="0" cy="-20" r="10" fill="#5ce2e7" />
    
    <!-- Rocket fins -->
    <path d="M-15,30 L-40,60 L-15,50 Z" fill="#ffffff" />
    <path d="M15,30 L40,60 L15,50 Z" fill="#ffffff" />
    
    <!-- Rocket bottom -->
    <path d="M-15,40 C-15,50 -10,60 0,60 C10,60 15,50 15,40 L15,50 C15,60 10,70 0,70 C-10,70 -15,60 -15,50 Z" fill="#ff6b6b" />
    
    <!-- Rocket flames -->
    <g>
      <path d="M-10,60 C-10,90 -5,100 0,120 C5,100 10,90 10,60 Z" fill="#ff9f43" />
      <path d="M-5,60 C-5,80 -2.5,90 0,100 C2.5,90 5,80 5,60 Z" fill="#ffbe76" />
    </g>
  </g>
  
  <!-- Particles -->
  <g>
    <circle cx="280" cy="260" r="4" fill="#5ce2e7" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="2s" repeatCount="indefinite" />
      <animate attributeName="r" values="4;6;4" dur="2s" repeatCount="indefinite" />
    </circle>
    <circle cx="320" cy="270" r="3" fill="#5ce2e7" opacity="0.5">
      <animate attributeName="opacity" values="0.5;0.1;0.5" dur="1.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;5;3" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="270" cy="280" r="5" fill="#5ce2e7" opacity="0.4">
      <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite" />
      <animate attributeName="r" values="5;7;5" dur="2.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="330" cy="290" r="3" fill="#5ce2e7" opacity="0.6">
      <animate attributeName="opacity" values="0.6;0.2;0.6" dur="1.8s" repeatCount="indefinite" />
      <animate attributeName="r" values="3;5;3" dur="1.8s" repeatCount="indefinite" />
    </circle>
  </g>
  
  <!-- Title -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Getting Started</text>
  
  <!-- Divinci Logo -->
  <g transform="translate(40, 40) scale(0.4)">
    <rect width="60" height="60" rx="10" fill="#16214c" stroke="white" stroke-width="2" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">D</text>
  </g>
</svg>
