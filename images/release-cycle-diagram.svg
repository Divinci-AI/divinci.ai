<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 750" aria-labelledby="title desc" preserveAspectRatio="xMidYMid meet">
  <title id="title">AI Release Cycle Management Diagram</title>
  <desc id="desc">Visualization of Divinci AI's Release Cycle Management showing the complete development lifecycle for enterprise AI applications</desc>

  <defs>
    <!-- Styles based on Divinci design system -->
    <style>
      /* Base styles using the Divinci color palette */
      .background { fill: #F5F7FA; }
      .container { fill: #F5F7FA; stroke: #485262; stroke-width: 1.5; }
      .primary-connection { stroke: #2E5BFF; stroke-width: 2; fill: none; }
      .secondary-connection { stroke: #00D8D8; stroke-width: 1.5; fill: none; }
      .tertiary-connection { stroke: #B0B7C3; stroke-width: 1; stroke-dasharray: 4,2; fill: none; }
      .highlight-connection { stroke: #8C54FF; stroke-width: 2.5; fill: none; }

      .development-node { fill: #F5F7FA; stroke: #2E5BFF; stroke-width: 2; }
      .testing-node { fill: #F5F7FA; stroke: #00D8D8; stroke-width: 2; }
      .deployment-node { fill: #F5F7FA; stroke: #8C54FF; stroke-width: 2; }
      .monitoring-node { fill: #F5F7FA; stroke: #FFAB2D; stroke-width: 2; }
      .node-highlight { fill: #F0F5FF; }

      .icon-primary { fill: #2E5BFF; }
      .icon-secondary { fill: #00D8D8; }
      .icon-tertiary { fill: #8C54FF; }
      .icon-warning { fill: #FFAB2D; }

      text {
        font-family: 'Inter', sans-serif;
        fill: #485262;
      }
      .title-text {
        font-size: 16px;
        font-weight: 500;
      }
      .subtitle-text {
        font-size: 14px;
        font-weight: 400;
      }
      .detail-text {
        font-size: 12px;
        font-weight: 400;
      }

      /* Animation keyframes */
      @keyframes circleAnimation {
        0% { stroke-dashoffset: 500; }
        100% { stroke-dashoffset: 0; }
      }

      .animated-circle {
        stroke-dasharray: 5, 3;
        animation: circleAnimation 30s linear infinite;
      }

      .feature-box {
        fill: #F5F7FA;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }

      .feature-box-dev { stroke: #2E5BFF; }
      .feature-box-test { stroke: #00D8D8; }
      .feature-box-deploy { stroke: #8C54FF; }
      .feature-box-monitor { stroke: #FFAB2D; }

      /* Performance indicators */
      .performance-indicator-good { fill: #00D27A; }
      .performance-indicator-medium { fill: #FFAB2D; }
      .performance-indicator-attention { fill: #FF5C5C; }

      /* Current phase highlight */
      .current-phase {
        stroke-width: 3;
        filter: drop-shadow(0px 0px 5px rgba(46, 91, 255, 0.5));
      }

      /* Responsive styles for smaller screens */
      @media screen and (max-width: 768px) {
        .title-text {
          font-size: 14px;
        }
        .subtitle-text {
          font-size: 12px;
        }
        .detail-text {
          font-size: 10px;
        }
      }

      @media screen and (max-width: 480px) {
        .title-text {
          font-size: 12px;
        }
        .subtitle-text {
          font-size: 10px;
        }
        .detail-text {
          font-size: 8px;
        }
      }
    </style>

    <!-- Gradients -->
    <linearGradient id="cycleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2E5BFF" stop-opacity="0.2"/>
      <stop offset="25%" stop-color="#00D8D8" stop-opacity="0.2"/>
      <stop offset="50%" stop-color="#8C54FF" stop-opacity="0.2"/>
      <stop offset="75%" stop-color="#FFAB2D" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#2E5BFF" stop-opacity="0.2"/>
    </linearGradient>

    <!-- Filter for glow effects -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" class="background"/>

  <!-- Cycle Background -->
  <circle cx="450" cy="350" r="250" fill="url(#cycleGradient)" opacity="0.1"/>

  <!-- Main Cycle Path -->
  <circle cx="450" cy="350" r="250" class="primary-connection animated-circle" fill="none"/>

  <!-- Center Hub -->
  <circle cx="450" cy="350" r="60" class="container" stroke-width="2"/>
  <text x="450" y="345" class="title-text" text-anchor="middle">AI Release</text>
  <text x="450" y="365" class="title-text" text-anchor="middle">Cycle</text>

  <!-- The four main phases positioned around the circle -->

  <!-- Development Phase (Top) -->
  <g transform="translate(450, 100)">
    <circle cx="0" cy="0" r="50" class="development-node current-phase"/>
    <text x="0" y="5" class="subtitle-text" text-anchor="middle">Development</text>

    <!-- Lines connecting to sub-features -->
    <line x1="-40" y1="-20" x2="-100" y2="-60" class="secondary-connection"/>
    <line x1="0" y1="-40" x2="0" y2="-100" class="secondary-connection"/>
    <line x1="40" y1="-20" x2="100" y2="-60" class="secondary-connection"/>
  </g>

  <!-- Testing Phase (Right) -->
  <g transform="translate(650, 350)">
    <circle cx="0" cy="0" r="50" class="testing-node"/>
    <text x="0" y="5" class="subtitle-text" text-anchor="middle">Testing</text>

    <!-- Lines connecting to sub-features -->
    <line x1="20" y1="-40" x2="60" y2="-100" class="secondary-connection"/>
    <line x1="40" y1="0" x2="100" y2="0" class="secondary-connection"/>
    <line x1="20" y1="40" x2="60" y2="100" class="secondary-connection"/>
  </g>

  <!-- Deployment Phase (Bottom) -->
  <g transform="translate(450, 600)">
    <circle cx="0" cy="0" r="50" class="deployment-node"/>
    <text x="0" y="5" class="subtitle-text" text-anchor="middle">Deployment</text>

    <!-- Lines connecting to sub-features -->
    <line x1="-40" y1="20" x2="-100" y2="60" class="secondary-connection"/>
    <line x1="0" y1="40" x2="0" y2="90" class="secondary-connection"/>
    <line x1="40" y1="20" x2="100" y2="60" class="secondary-connection"/>
  </g>

  <!-- Monitoring Phase (Left) -->
  <g transform="translate(250, 350)">
    <circle cx="0" cy="0" r="50" class="monitoring-node"/>
    <text x="0" y="5" class="subtitle-text" text-anchor="middle">Monitoring</text>

    <!-- Lines connecting to sub-features -->
    <line x1="-20" y1="-40" x2="-60" y2="-100" class="secondary-connection"/>
    <line x1="-40" y1="0" x2="-100" y2="0" class="secondary-connection"/>
    <line x1="-20" y1="40" x2="-60" y2="100" class="secondary-connection"/>
  </g>

  <!-- Development Phase Sub-features -->
  <g transform="translate(320, 40)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-dev"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Prompt Versioning</text>
  </g>

  <g transform="translate(450, 20)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-dev"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Model Registry</text>
  </g>

  <g transform="translate(580, 40)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-dev"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Config Management</text>
  </g>

  <!-- Testing Phase Sub-features -->
  <g transform="translate(710, 250)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-test"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Statistical Validation</text>
  </g>

  <g transform="translate(780, 350)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-test"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Regression Testing</text>
  </g>

  <g transform="translate(710, 450)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-test"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Red Teaming</text>
  </g>

  <!-- Deployment Phase Sub-features -->
  <g transform="translate(320, 640)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-deploy"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Canary Deployment</text>
  </g>

  <g transform="translate(450, 680)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-deploy"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">A/B Testing</text>
  </g>

  <g transform="translate(580, 640)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-deploy"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Auto-Rollback</text>
  </g>

  <!-- Monitoring Phase Sub-features -->
  <g transform="translate(120, 250)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-monitor"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Performance Analytics</text>
  </g>

  <g transform="translate(90, 350)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-monitor"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">Anomaly Detection</text>
  </g>

  <g transform="translate(120, 450)">
    <rect x="0" y="0" width="100" height="40" class="feature-box feature-box-monitor"/>
    <text x="50" y="25" class="detail-text" text-anchor="middle">User Feedback</text>
  </g>

  <!-- Inner Connections between Phases -->
  <path d="M485,145 C530,200 530,300 485,350" class="tertiary-connection"/>
  <path d="M485,555 C530,500 530,400 485,350" class="tertiary-connection"/>
  <path d="M415,555 C370,500 370,400 415,350" class="tertiary-connection"/>
  <path d="M415,145 C370,200 370,300 415,350" class="tertiary-connection"/>

  <!-- Key Performance Indicators (removed percentage statements) -->
  <g transform="translate(320, 580)">
    <text x="0" y="50" class="subtitle-text" text-anchor="middle">Reduced Production Incidents</text>
    <circle cx="-125" cy="45" r="5" class="performance-indicator-good"/>
  </g>

  <g transform="translate(450, 100)">
    <text x="0" y="600" class="subtitle-text" text-anchor="middle">Faster AI Release Cycles</text>
    <circle cx="-100" cy="595" r="5" class="performance-indicator-good"/>
  </g>

  <g transform="translate(680, 500)">
    <text x="0" y="0" class="subtitle-text" text-anchor="middle">Improved Test Coverage</text>
    <circle cx="-80" cy="-5" r="5" class="performance-indicator-good"/>
  </g>

  <!-- Version Labels -->
  <text x="670" y="580" class="detail-text"><!-- v1.0 - 2023-05-01 --></text>
</svg>