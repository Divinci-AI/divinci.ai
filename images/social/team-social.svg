<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#5ce2e7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Circular clip paths for team photos -->
    <clipPath id="circleClip1">
      <circle cx="400" cy="250" r="80" />
    </clipPath>
    <clipPath id="circleClip2">
      <circle cx="600" cy="250" r="80" />
    </clipPath>
    <clipPath id="circleClip3">
      <circle cx="800" cy="250" r="80" />
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="1000" cy="480" r="150" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="600" cy="100" r="50" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  <circle cx="400" cy="500" r="80" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  
  <!-- Team photo placeholders (will be replaced with actual photos) -->
  <circle cx="400" cy="250" r="80" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="3" />
  <text x="400" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">👨‍💼</text>
  
  <circle cx="600" cy="250" r="80" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="3" />
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">👨‍💻</text>
  
  <circle cx="800" cy="250" r="80" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="3" />
  <text x="800" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">👩‍💼</text>
  
  <!-- Page title -->
  <text x="600" y="400" font-family="Sora, Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">Our Team</text>
  
  <!-- Tagline -->
  <text x="600" y="470" font-family="Sora, Arial, sans-serif" font-size="32" fill="white" text-anchor="middle" opacity="0.9">Meet the people behind Divinci AI</text>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.7">divinci.ai/about-us</text>
</svg>
