<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#5ce2e7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="1000" cy="480" r="150" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="600" cy="100" r="50" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  <circle cx="400" cy="500" r="80" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  
  <!-- Feature circles -->
  <circle cx="300" cy="250" r="60" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <circle cx="450" cy="250" r="60" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <circle cx="600" cy="250" r="60" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <circle cx="750" cy="250" r="60" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <circle cx="900" cy="250" r="60" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  
  <!-- Feature icons (emoji placeholders) -->
  <text x="300" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">👥</text>
  <text x="450" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">🤖</text>
  <text x="600" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">🗣️</text>
  <text x="750" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">📊</text>
  <text x="900" y="270" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">✅</text>
  
  <!-- Page title -->
  <text x="600" y="380" font-family="Sora, Arial, sans-serif" font-size="72" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">Features</text>
  
  <!-- Tagline -->
  <text x="600" y="450" font-family="Sora, Arial, sans-serif" font-size="32" fill="white" text-anchor="middle" opacity="0.9">Powerful AI tools for your needs</text>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.7">divinci.ai/features</text>
</svg>
