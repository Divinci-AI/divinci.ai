<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="retrieval-title retrieval-desc" viewBox="0 0 300 200"><desc id="retrieval-desc">Visualization of how the system optimizes retrieval based on context</desc><defs><linearGradient id="retrievalFlow" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#8C54FF" stop-opacity=".2"/><stop offset="100%" stop-color="#00D8D8" stop-opacity=".8"/></linearGradient><filter id="optimization-glow" width="140%" height="140%" x="-20%" y="-20%"><feGaussianBlur result="blur" stdDeviation="3"/><feComposite in="SourceGraphic" in2="blur"/></filter><style>@keyframes flowAnimation{0%{stroke-dashoffset:400}to{stroke-dashoffset:0}}.secondary-connection{stroke:#00d8d8;stroke-width:1.5;fill:none}.highlight-connection{stroke:#8c54ff;stroke-width:2.5;fill:none}.tertiary-node{fill:#f5f7fa;stroke:#8c54ff;stroke-width:2}.icon-primary{fill:#2e5bff}.icon-tertiary{fill:#8c54ff}text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262}.subtitle-text{font-size:14px;font-weight:400}.animated-path{stroke-dasharray:5,3;animation:flowAnimation 10s linear infinite}.context-highlight{fill:#f0f5ff;stroke:#2e5bff;stroke-width:1;rx:2;ry:2}</style></defs><rect width="100%" height="100%" style="fill:#f5f7fa"/><path d="M0 0h70v50H0z" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:1.5;rx:4;ry:4" transform="translate(20 30)"/><text x="35" y="25" class="subtitle-text" text-anchor="middle" transform="translate(20 30)">Query</text><path fill="none" stroke-width="1.5" d="M40 65q15 10 30 0" class="icon-primary"/><g transform="translate(20 110)"><path d="M0 0h70v60H0z" style="fill:#f5f7fa;stroke:#8c54ff;stroke-width:1.5;rx:4;ry:4"/><text x="35" y="25" class="subtitle-text" text-anchor="middle">Context</text><text x="35" y="40" class="subtitle-text" text-anchor="middle">Analysis</text><circle cx="25" cy="55" r="3" class="icon-tertiary"/><circle cx="35" cy="55" r="3" class="icon-tertiary"/><circle cx="45" cy="55" r="3" class="icon-tertiary"/></g><g transform="translate(115 70)"><rect width="90" height="70" class="tertiary-node" filter="url(#optimization-glow)" rx="6" ry="6"/><text x="45" y="30" class="subtitle-text" text-anchor="middle">Retrieval</text><text x="45" y="45" class="subtitle-text" text-anchor="middle">Optimizer</text><path fill="none" stroke-width="1.5" d="m25 55 10 10 10-15 10 10 10-5" class="icon-tertiary"/></g><path d="M230 35q0-10 35-10t35 10v30q0 10-35 10t-35-10Z" class="tertiary-node"/><text x="35" y="25" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(230 25)">Vector DB</text><path d="M245 60h40M245 65h40" class="icon-primary"/><g transform="translate(230 110)"><path d="M0 0h70v70H0z" style="fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4"/><text x="35" y="25" class="subtitle-text" text-anchor="middle">Optimized</text><text x="35" y="40" class="subtitle-text" text-anchor="middle">Results</text><path d="M15 50h40v10H15z" class="context-highlight"/><path d="M15 65h40v10H15z" class="context-highlight" opacity=".7"/><path d="M15 80h40v10H15z" class="context-highlight" opacity=".4"/><circle cx="60" cy="55" r="3" style="fill:#00d27a"/><circle cx="60" cy="70" r="3" style="fill:#ffab2d"/><circle cx="60" cy="85" r="3" style="fill:#ff5c5c"/></g><path d="m90 55 25 50" class="animated-path" style="stroke:#2e5bff;stroke-width:2;fill:none"/><path d="m90 140 25-35" class="secondary-connection animated-path"/><path d="m205 105 25-55M205 105l25 40" class="highlight-connection animated-path"/><path d="M265 75v35" class="secondary-connection animated-path"/><path d="M230 165c-30 15-100 15-130 5s-50-45-45-65" style="stroke:#b0b7c3;stroke-width:1;stroke-dasharray:4,2;fill:none"/><text x="160" y="185" style="font-size:12px;font-weight:400" text-anchor="middle">Continuous Optimization Feedback</text></svg>