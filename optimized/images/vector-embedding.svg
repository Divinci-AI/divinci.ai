<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="vector-embed-title vector-embed-desc" viewBox="0 0 300 200"><desc id="vector-embed-desc">Visualization of how text is converted to vector embeddings and stored in a vector database</desc><defs><linearGradient id="embeddingFlow" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#2E5BFF" stop-opacity=".2"/><stop offset="100%" stop-color="#8C54FF" stop-opacity=".8"/></linearGradient><style>@keyframes flowAnimation{0%{stroke-dashoffset:400}to{stroke-dashoffset:0}}.primary-connection{stroke:#2e5bff;stroke-width:2;fill:none}.secondary-connection{stroke:#00d8d8;stroke-width:1.5;fill:none}.tertiary-connection{stroke:#b0b7c3;stroke-width:1;stroke-dasharray:4,2;fill:none}.icon-primary{fill:#2e5bff}.icon-secondary{fill:#00d8d8}.icon-tertiary{fill:#8c54ff}text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262}.subtitle-text{font-size:14px;font-weight:400}.animated-path{stroke-dasharray:5,3;animation:flowAnimation 10s linear infinite}.vector-point{fill:#2e5bff;r:2}</style></defs><rect width="100%" height="100%" style="fill:#f5f7fa"/><path d="M0 0h60v60H0z" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:1.5;rx:4;ry:4" transform="translate(20 30)"/><text x="30" y="25" class="subtitle-text" text-anchor="middle" transform="translate(20 30)">Text</text><path d="M30 65h40M30 75h40M30 85h30" class="icon-primary"/><g transform="translate(120 20)"><rect width="80" height="80" rx="6" ry="6" style="fill:#f5f7fa;stroke:#00d8d8;stroke-width:2"/><text x="40" y="45" class="subtitle-text" text-anchor="middle">Embedding</text><text x="40" y="60" class="subtitle-text" text-anchor="middle">Model</text><circle cx="40" cy="30" r="10" class="icon-secondary" opacity=".6"/></g><g transform="translate(230 30)"><path d="M0 0h60v60H0z" style="fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4"/><text x="30" y="25" class="subtitle-text" text-anchor="middle">Vector</text><path d="M15 40h30" class="icon-secondary"/><circle cx="15" cy="40" class="vector-point"/><circle cx="30" cy="40" class="vector-point"/><circle cx="45" cy="40" class="vector-point"/><path d="M20 50h20" class="icon-secondary"/><circle cx="20" cy="50" class="vector-point"/><circle cx="40" cy="50" class="vector-point"/><path d="M10 60h40" class="icon-secondary"/><circle cx="10" cy="60" class="vector-point"/><circle cx="25" cy="60" class="vector-point"/><circle cx="50" cy="60" class="vector-point"/></g><g transform="translate(10 120)"><rect width="100" height="70" rx="6" ry="6" style="fill:#f5f7fa;stroke:#485262;stroke-width:1.5"/><text x="50" y="25" class="subtitle-text" text-anchor="middle">Vector Space</text><path d="M25 40h50M25 65h50M25 40v25M75 40v25" class="tertiary-connection"/><circle cx="35" cy="50" r="2" class="icon-primary"/><circle cx="45" cy="60" r="2" class="icon-primary"/><circle cx="65" cy="45" r="2" class="icon-primary"/><circle cx="55" cy="55" r="2" class="icon-primary"/></g><path d="M0 15Q0 0 50 0t50 15v40q0 15-50 15T0 55Z" style="fill:#f5f7fa;stroke:#8c54ff;stroke-width:2" transform="translate(190 120)"/><text x="50" y="25" class="subtitle-text" text-anchor="middle" transform="translate(190 120)">Vector</text><text x="50" y="40" class="subtitle-text" text-anchor="middle" transform="translate(190 120)">Database</text><path d="M210 170h60M210 175h60M210 180h60" class="icon-tertiary"/><path d="M80 60h40M200 60h30" class="primary-connection animated-path"/><path d="M50 90v30M260 90l-20 30" class="secondary-connection animated-path"/><path d="M110 155h80" class="animated-path" style="stroke:#8c54ff;stroke-width:2.5;fill:none"/><text x="150" y="190" style="font-size:12px;font-weight:400" text-anchor="middle">Text to Vector Embedding Process</text></svg>