<svg xmlns="http://www.w3.org/2000/svg" width="800" height="300" aria-labelledby="title-data-creation desc-data-creation"><desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process from raw documents to QA datasets</desc><defs><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#fff" d="m0 0 10 3.5L0 7z"/></marker></defs><style>@keyframes float{0%,to{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes pulse{0%,to{opacity:.7}50%{opacity:1}}@keyframes rotate{0%{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{font-family:&quot;Sora&quot;,&quot;Arial&quot;,sans-serif;fill:#fff;font-size:24px;text-anchor:middle}.arrow,.box{stroke-width:2}.arrow{stroke:#fff;fill:none;marker-end:url(#arrowhead)}.box{fill:rgba(46,91,255,.2);stroke:#5ce2e7;rx:15;ry:15}.float{animation:float 6s ease-in-out infinite}.pulse{animation:pulse 3s ease-in-out infinite}.rotate{animation:rotate 20s linear infinite;transform-origin:center}.doc-text{fill:#fff}.microscope-base{fill:#b0bec5}.microscope-dot{fill:#ea4335}.scissors{fill:none;stroke:#fff;stroke-width:3}</style><path d="M0 0h800v300H0z" style="fill:#0c1229"/><circle cx="400" cy="150" r="200" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1"/><circle cx="400" cy="150" r="150" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1" style="animation-direction:reverse"/><text x="400" y="50" style="font-family:&quot;Sora&quot;,&quot;Arial&quot;,sans-serif;fill:#fff;font-size:36px;text-anchor:middle;font-weight:600">[ Data Creation Process ]</text><g class="float" transform="translate(120 150)"><rect width="60" height="70" x="-30" y="-40" rx="5" ry="5" style="fill:#4285f4"/><rect width="60" height="70" x="-35" y="-45" rx="5" ry="5" style="fill:#34a853"/><rect width="60" height="70" x="-40" y="-50" rx="5" ry="5" style="fill:#ea4335"/><path d="M-25-35h40v3h-40zM-25-28h40v3h-40zM-25-21h40v3h-40zM-25-14h40v3h-40zM-25-7h40v3h-40z" class="doc-text"/><text y="50" class="text">Raw Documents</text></g><g class="float" style="animation-duration:4s" transform="translate(280 150)"><circle cy="-20" r="25" class="pulse" style="fill:#78909c"/><path d="M-10 0h20v30h-20z" class="microscope-base"/><path d="M-20 15h40v8h-40z" class="microscope-base"/><circle cx="-8" cy="10" r="4" class="microscope-dot pulse"/><circle cx="8" cy="20" r="4" class="microscope-dot pulse"/></g><text y="50" class="text" transform="translate(280 150)">Parsing</text><g class="float" style="animation-duration:5s"><path d="M420 150c5-20 35-20 40 0M420 110l40 40M460 110l-40 40" class="scissors"/></g><text y="50" class="text" transform="translate(440 150)">Chunking</text><g class="float" transform="translate(600 150)"><rect width="70" height="70" x="-35" y="-50" rx="8" ry="8" style="fill:#f5f7fa;stroke:#b0bec5;stroke-width:2"/><rect width="70" height="15" x="-35" y="-50" rx="8" ry="8" style="fill:#b0bec5"/><rect width="60" height="15" x="-30" y="-30" class="pulse" rx="4" ry="4" style="fill:#ff9800"/><rect width="45" height="15" x="-30" y="-10" class="pulse" rx="4" ry="4" style="fill:#4caf50"/><text x="-22" y="-20" fill="#fff" font-size="10">Q</text><text x="-22" fill="#fff" font-size="10">A</text><text y="50" class="text">QA Creation</text></g><path d="M160 150h80" class="arrow"/><path d="M320 150h80" class="arrow"/><path d="M480 150h80" class="arrow"/><path d="M440 180v50" class="arrow"/><path d="M600 180v50" class="arrow"/><g class="pulse" style="animation-duration:4s"><path d="M390 230h100v50H390z" class="box"/><text x="440" y="260" class="text">Corpus</text></g><g class="pulse" style="animation-duration:4s;animation-delay:1s"><path d="M550 230h100v50H550z" class="box"/><text x="600" y="260" class="text">QA Data</text></g><circle cx="150" cy="100" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:.5s"/><circle cx="250" cy="200" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1s"/><circle cx="350" cy="100" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1.5s"/><circle cx="450" cy="200" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2s"/><circle cx="550" cy="100" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2.5s"/><circle cx="650" cy="200" r="1.5" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:3s"/></svg>