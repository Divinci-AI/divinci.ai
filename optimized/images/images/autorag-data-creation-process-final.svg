<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="400" aria-labelledby="title-data-creation desc-data-creation"><desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process from raw documents to QA datasets</desc><defs><marker id="arrowhead" markerHeight="7" markerWidth="10" orient="auto" refX="9" refY="3.5"><path fill="#fff" d="m0 0 10 3.5L0 7z"/></marker></defs><style>@keyframes float{0%,to{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes pulse{0%,to{opacity:.7}50%{opacity:1}}@keyframes rotate{0%{transform:rotate(0deg)}to{transform:rotate(360deg)}}.text{font-family:&quot;Sora&quot;,&quot;Arial&quot;,sans-serif;fill:#fff;font-size:28px;text-anchor:middle;dominant-baseline:middle}.arrow{stroke:#fff;stroke-width:3;fill:none;marker-end:url(#arrowhead)}.box{fill:rgba(46,91,255,.2);stroke:#5ce2e7;stroke-width:2;rx:20;ry:20}.float{animation:float 6s ease-in-out infinite}.pulse{animation:pulse 3s ease-in-out infinite}.rotate{animation:rotate 20s linear infinite;transform-origin:center}.doc-text{fill:#fff}.microscope-base{fill:#b0bec5}.microscope-dot{fill:#ea4335}.scissors{fill:none;stroke:#fff;stroke-width:5}</style><path d="M0 0h1000v400H0z" style="fill:#0c1229"/><circle cx="500" cy="200" r="280" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1"/><circle cx="500" cy="200" r="220" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1" style="animation-direction:reverse"/><text x="500" y="60" style="font-family:&quot;Sora&quot;,&quot;Arial&quot;,sans-serif;fill:#fff;font-size:40px;text-anchor:middle;font-weight:600">[ Data Creation Process ]</text><g class="float" transform="translate(150 200)"><rect width="80" height="100" x="-40" y="-60" rx="5" ry="5" style="fill:#4285f4"/><rect width="80" height="100" x="-50" y="-70" rx="5" ry="5" style="fill:#34a853"/><rect width="80" height="100" x="-60" y="-80" rx="5" ry="5" style="fill:#ea4335"/><path d="M-30-50h50v5h-50zM-30-40h50v5h-50zM-30-30h50v5h-50zM-30-20h50v5h-50zM-30-10h50v5h-50zM-30 0h50v5h-50z" class="doc-text"/><text y="70" class="text">Raw Documents</text></g><g class="float" style="animation-duration:4s" transform="translate(350 200)"><circle cy="-30" r="30" class="pulse" style="fill:#78909c"/><path d="M-15-10h30v40h-30z" class="microscope-base"/><path d="M-25 10h50v10h-50z" class="microscope-base"/><circle cx="-10" cy="5" r="5" class="microscope-dot pulse"/><circle cx="10" cy="15" r="5" class="microscope-dot pulse"/></g><text y="70" class="text" transform="translate(350 200)">Parsing</text><g class="float" style="animation-duration:5s"><path d="M520 200c10-30 50-30 60 0M520 140l60 60M580 140l-60 60" class="scissors"/></g><text y="70" class="text" transform="translate(550 200)">Chunking</text><g class="float" transform="translate(750 200)"><rect width="100" height="100" x="-50" y="-80" rx="10" ry="10" style="fill:#f5f7fa;stroke:#b0bec5;stroke-width:2"/><rect width="100" height="20" x="-50" y="-80" rx="10" ry="10" style="fill:#b0bec5"/><rect width="80" height="20" x="-40" y="-50" class="pulse" rx="5" ry="5" style="fill:#ff9800"/><rect width="60" height="20" x="-40" y="-20" class="pulse" rx="5" ry="5" style="fill:#4caf50"/><text x="-30" y="-35" fill="#fff" font-size="12">Q</text><text x="-30" y="-5" fill="#fff" font-size="12">A</text><text y="70" class="text">QA Creation</text></g><path d="M200 200h100" class="arrow"/><path d="M400 200h100" class="arrow"/><path d="M600 200h100" class="arrow"/><path d="M550 250v100" class="arrow"/><path d="M750 250v100" class="arrow"/><g class="pulse" style="animation-duration:4s"><path d="M480 350h140v80H480z" class="box"/><text x="550" y="190" class="text" transform="translate(0 200)">Corpus</text></g><g class="pulse" style="animation-duration:4s;animation-delay:1s"><path d="M680 350h140v80H680z" class="box"/><text x="750" y="190" class="text" transform="translate(0 200)">QA Data</text></g><circle cx="200" cy="100" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:.5s"/><circle cx="300" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1s"/><circle cx="400" cy="100" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1.5s"/><circle cx="600" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2s"/><circle cx="700" cy="100" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2.5s"/><circle cx="800" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:3s"/></svg>