<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-doc-proc desc-doc-proc" viewBox="0 0 300 200"><desc id="desc-doc-proc">Visualization of how the AutoRAG system processes documents into analyzable chunks</desc><defs><style>@keyframes docFlow{0%{stroke-dashoffset:100}to{stroke-dashoffset:0}}@keyframes docHighlight{0%,to{opacity:.7}50%{opacity:1}}.doc-proc-bg{fill:#f5f7fa}.doc-proc-container{fill:#f5f7fa;stroke:#485262;stroke-width:1.5;rx:4;ry:4}.doc-proc-connection{stroke:#2e5bff;stroke-width:2;fill:none}.doc-proc-highlight{stroke:#8c54ff;stroke-width:2.5;fill:none}.doc-proc-box,.doc-proc-chunk{fill:#f5f7fa;stroke:#2e5bff;stroke-width:1.5;rx:4;ry:4}.doc-proc-chunk{fill:#f0f5ff;stroke:#00d8d8;rx:3;ry:3}.doc-proc-icon{fill:#2e5bff}.doc-proc-icon-alt{fill:#00d8d8}.doc-proc-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:10px}.doc-proc-title{font-size:12px;font-weight:500}.doc-proc-animated{stroke-dasharray:5,3;animation:docFlow 5s linear infinite}</style></defs><path d="M0 0h300v200H0z" class="doc-proc-bg"/><path d="M30 30h60v70H30z" class="doc-proc-container"/><text x="30" y="20" class="doc-proc-title" text-anchor="middle" transform="translate(30 30)">Source Docs</text><path d="M45 60h30v5H45z" class="doc-proc-icon"/><path d="M45 70h30v5H45z" class="doc-proc-icon" opacity=".8"/><path d="M45 80h30v5H45z" class="doc-proc-icon" opacity=".6"/><path d="M45 90h30v5H45z" class="doc-proc-icon" opacity=".4"/><path d="M0 0h70v50H0z" class="doc-proc-box" style="animation:docHighlight 2s ease-in-out infinite" transform="translate(130 40)"/><text x="35" y="30" class="doc-proc-title" text-anchor="middle" transform="translate(130 40)">Document</text><text x="35" y="42" class="doc-proc-title" text-anchor="middle" transform="translate(130 40)">Processor</text><path d="M230 20h50v20h-50z" class="doc-proc-chunk" opacity=".9"/><text x="25" y="14" class="doc-proc-text" text-anchor="middle" transform="translate(230 20)">Chunk 1</text><path d="M230 45h50v20h-50z" class="doc-proc-chunk" opacity=".9"/><text x="25" y="14" class="doc-proc-text" text-anchor="middle" transform="translate(230 45)">Chunk 2</text><path d="M230 70h50v20h-50z" class="doc-proc-chunk" opacity=".9"/><text x="25" y="14" class="doc-proc-text" text-anchor="middle" transform="translate(230 70)">Chunk 3</text><path d="M230 95h50v20h-50z" class="doc-proc-chunk" opacity=".9"/><text x="25" y="14" class="doc-proc-text" text-anchor="middle" transform="translate(230 95)">Chunk 4</text><path d="M130 120h70v50h-70z" class="doc-proc-box" opacity=".9"/><text x="35" y="30" class="doc-proc-title" text-anchor="middle" transform="translate(130 120)">Metadata</text><text x="35" y="42" class="doc-proc-title" text-anchor="middle" transform="translate(130 120)">Extraction</text><g transform="translate(30 130)"><path d="M0 0h60v40H0z" class="doc-proc-container"/><text x="30" y="20" class="doc-proc-text" text-anchor="middle">Content Tags</text><rect width="16" height="10" x="10" y="25" class="doc-proc-icon-alt" opacity=".7" rx="5" ry="5"/><rect width="16" height="10" x="32" y="25" class="doc-proc-icon-alt" opacity=".7" rx="5" ry="5"/><rect width="20" height="10" x="22" y="25" class="doc-proc-icon-alt" opacity=".5" rx="5" ry="5" transform="translate(0 10)"/></g><path d="M90 65h40M200 45l30-15M200 55h30M200 65l30 15M200 75l30 30" class="doc-proc-connection doc-proc-animated"/><path d="M165 90v30M130 145H90" class="doc-proc-highlight doc-proc-animated"/><g transform="translate(230 130)"><rect width="60" height="60" stroke="#485262" stroke-width=".5" class="doc-proc-bg" rx="3" ry="3"/><text x="30" y="15" class="doc-proc-text" font-weight="500" text-anchor="middle">Benefits</text><circle cx="15" cy="30" r="4" class="doc-proc-icon"/><text x="52" y="33" class="doc-proc-text" text-anchor="end">Scalable</text><circle cx="15" cy="45" r="4" class="doc-proc-icon-alt"/><text x="52" y="48" class="doc-proc-text" text-anchor="end">Metadata-rich</text><circle cx="15" cy="60" r="4" fill="#8C54FF"/><text x="52" y="63" class="doc-proc-text" text-anchor="end">Automated</text></g></svg>