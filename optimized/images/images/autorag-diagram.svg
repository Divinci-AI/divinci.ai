<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title desc" viewBox="0 0 800 500"><desc id="desc">Visualization of Divinci AI&apos;s AutoRAG system showing how it connects enterprise knowledge bases to LLMs with automatic processing and optimization</desc><defs><linearGradient id="knowledgeFlow" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#2E5BFF" stop-opacity=".2"/><stop offset="100%" stop-color="#8C54FF" stop-opacity=".8"/></linearGradient><filter id="processing-glow" width="140%" height="140%" x="-20%" y="-20%"><feGaussianBlur result="blur" stdDeviation="5"/><feComposite in="SourceGraphic" in2="blur"/></filter><style>@keyframes flowAnimation{0%{stroke-dashoffset:400}to{stroke-dashoffset:0}}.container{fill:#f5f7fa;stroke:#485262;stroke-width:1.5}.primary-connection{stroke:#2e5bff;stroke-width:2;fill:none}.highlight-connection,.llm-node{stroke:#8c54ff;stroke-width:2.5;fill:none}.llm-node{fill:#f5f7fa;stroke-width:2}.icon-primary{fill:#2e5bff}.icon-secondary{fill:#00d8d8}.icon-tertiary{fill:#8c54ff}text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262}.title-text{font-size:16px;font-weight:500}.detail-text,.subtitle-text{font-size:14px;font-weight:400}.detail-text{font-size:12px}.animated-path{stroke-dasharray:5,3;animation:flowAnimation 10s linear infinite}.feature-box{fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4}.performance-indicator-good{fill:#00d27a}</style></defs><rect width="100%" height="100%" style="fill:#f5f7fa"/><g id="knowledge-sources"><rect width="200" height="400" x="50" y="50" class="container" rx="10" ry="10"/><text x="150" y="80" class="title-text" text-anchor="middle">Enterprise Knowledge Sources</text><g transform="translate(80 120)"><rect width="140" height="60" class="container" rx="4" ry="4"/><text x="70" y="20" class="subtitle-text" text-anchor="middle">Documents</text><path stroke-width="2" d="M30 30h20M30 40h80" class="icon-primary"/><text x="70" y="55" class="detail-text" text-anchor="middle">PDF, Word, PPT, etc.</text></g><g transform="translate(80 200)"><rect width="140" height="60" class="container" rx="4" ry="4"/><text x="70" y="20" class="subtitle-text" text-anchor="middle">Databases</text><path fill-opacity=".6" d="M40 30h60v15H40z" class="icon-secondary"/><path fill-opacity=".3" d="M40 45h60v5H40z" class="icon-secondary"/><text x="70" y="55" class="detail-text" text-anchor="middle">SQL, NoSQL, APIs</text></g><g transform="translate(80 280)"><rect width="140" height="60" class="container" rx="4" ry="4"/><text x="70" y="20" class="subtitle-text" text-anchor="middle">Knowledge Bases</text><circle cx="50" cy="35" r="10" fill-opacity=".6" class="icon-tertiary"/><circle cx="70" cy="35" r="10" fill-opacity=".6" class="icon-tertiary"/><circle cx="90" cy="35" r="10" fill-opacity=".6" class="icon-tertiary"/><text x="70" y="55" class="detail-text" text-anchor="middle">Wikis, Confluence, etc.</text></g><g transform="translate(80 360)"><rect width="140" height="60" class="container" rx="4" ry="4"/><text x="70" y="20" class="subtitle-text" text-anchor="middle">Code Repositories</text><text x="70" y="40" class="icon-primary" font-family="monospace" text-anchor="middle">{ code }</text><text x="70" y="55" class="detail-text" text-anchor="middle">GitHub, GitLab, etc.</text></g></g><g id="processing-engine"><rect width="200" height="300" x="300" y="100" class="container" rx="10" ry="10"/><text x="400" y="130" class="title-text" text-anchor="middle">AutoRAG Processing Engine</text><g transform="translate(325 150)"><rect width="150" height="40" class="feature-box" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Document Processor</text></g><g transform="translate(325 200)"><rect width="150" height="40" class="feature-box" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Content Analyzer</text></g><g transform="translate(325 250)"><rect width="150" height="40" class="feature-box" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Vector Embedding</text></g><g transform="translate(325 300)"><rect width="150" height="40" class="feature-box" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Retrieval Optimizer</text></g><g transform="translate(325 350)"><rect width="150" height="40" class="feature-box" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Context Manager</text></g></g><g id="llm-integration"><rect width="200" height="400" x="550" y="50" class="container" rx="10" ry="10"/><text x="650" y="80" class="title-text" text-anchor="middle">LLM Integration</text><g transform="translate(575 120)"><rect width="150" height="85" class="container" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Enterprise LLMs</text><circle cx="35" cy="50" r="15" class="llm-node"/><text x="35" y="55" class="detail-text" text-anchor="middle">GPT</text><circle cx="75" cy="50" r="15" class="llm-node"/><text x="75" y="55" class="detail-text" text-anchor="middle">Claude</text><circle cx="115" cy="50" r="15" class="llm-node"/><text x="115" y="55" class="detail-text" text-anchor="middle">Gemini</text></g><g transform="translate(575 220)"><rect width="150" height="60" class="container" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Response Generation</text><path fill="none" stroke-width="2" d="M30 40h90m-80-5-10 5 10 5" class="icon-tertiary"/></g><g transform="translate(575 300)"><rect width="150" height="60" class="container" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Citation Manager</text><path stroke-width="2" d="M40 40h20m10 0h20m10 0h20" class="icon-primary"/></g><g transform="translate(575 380)"><rect width="150" height="60" class="container" rx="4" ry="4"/><text x="75" y="25" class="subtitle-text" text-anchor="middle">Performance Monitor</text><path fill="none" stroke-width="2" d="m40 35 20 15 20-10 20-10 20 15" class="performance-indicator-good"/></g></g><path d="M220 150c40 0 40 20 80 20M220 230c40 0 40-10 80-10M220 310c40 0 40-40 80-40M220 390c40 0 40-70 80-70" class="primary-connection animated-path"/><path d="M500 170c20 0 30-8 50-8M500 220c20 0 30 30 50 30M500 270c20 0 30 60 50 60" class="highlight-connection animated-path"/><path d="M575 410c-35 0-55 0-75-40S460 130 400 80 220 30 100 50" style="stroke:#b0b7c3;stroke-width:1;stroke-dasharray:4,2;fill:none"/><text x="400" y="30" class="detail-text" text-anchor="middle">Continuous Learning Feedback Loop</text><g transform="translate(650 480)"><text class="subtitle-text">97% Hallucination Reduction</text><circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/></g><g transform="translate(400 480)"><text class="subtitle-text">85% Faster Implementation</text><circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/></g><g transform="translate(150 480)"><text class="subtitle-text">99.8% Information Accuracy</text><circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/></g></svg>