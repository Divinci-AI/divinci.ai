<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-vec-emb desc-vec-emb" viewBox="0 0 800 500"><desc id="desc-vec-emb">Visualization of how text is converted to vector embeddings and stored in a vector database</desc><defs><style>@keyframes vecFlow{0%{stroke-dashoffset:200}to{stroke-dashoffset:0}}@keyframes vecPulse{0%,to{opacity:.9}50%{opacity:1}}@keyframes vecValues{0%,to{opacity:.4}50%{opacity:1}}.vec-emb-box,.vec-emb-connection{stroke:#2e5bff;stroke-width:3;fill:none}.vec-emb-box{fill:#f5f7fa;stroke:#00d8d8;rx:10;ry:10}.vec-emb-text-item{fill:#2e5bff;opacity:.8}.vec-emb-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:16px}.vec-emb-title{font-size:20px;font-weight:500}.vec-emb-animated{stroke-dasharray:12,7;animation:vecFlow 4s linear infinite}</style></defs><path d="M0 0h800v500H0z" style="fill:#f5f7fa"/><g transform="translate(80 100)"><path d="M0 0h180v200H0z" style="fill:#f5f7fa;stroke:#485262;stroke-width:3;rx:15;ry:15"/><text x="90" y="50" class="vec-emb-title" text-anchor="middle">Text Chunks</text><rect width="100" height="20" x="40" y="80" class="vec-emb-text-item" rx="5" ry="5"/><rect width="100" height="20" x="40" y="110" class="vec-emb-text-item" rx="5" ry="5"/><rect width="100" height="20" x="40" y="140" class="vec-emb-text-item" rx="5" ry="5"/><rect width="100" height="20" x="40" y="170" class="vec-emb-text-item" rx="5" ry="5"/></g><g transform="translate(320 120)"><path d="M0 0h200v160H0z" style="fill:#f0f5ff;stroke:#8c54ff;stroke-width:3;rx:12;ry:12;animation:vecPulse 2s ease-in-out infinite"/><text x="100" y="60" class="vec-emb-title" text-anchor="middle">Embedding</text><text x="100" y="90" class="vec-emb-title" text-anchor="middle">Model</text><circle cx="65" cy="140" r="8" fill="#8C54FF" opacity=".6"/><circle cx="65" cy="120" r="8" fill="#8C54FF" opacity=".6"/><circle cx="100" cy="130" r="8" fill="#8C54FF" opacity=".9"/><circle cx="135" cy="140" r="8" fill="#8C54FF" opacity=".6"/><circle cx="135" cy="120" r="8" fill="#8C54FF" opacity=".6"/><path stroke="#8C54FF" stroke-width="2" d="m65 120 35 10M65 140l35-10M100 130l35-10M100 130l35 10" opacity=".5"/></g><path d="M0 0h140v240H0z" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:3;rx:8;ry:8" transform="translate(580 80)"/><text x="70" y="40" class="vec-emb-title" text-anchor="middle" transform="translate(580 80)">Vector Database</text><text class="vec-emb-text" font-family="monospace" font-size="18" style="animation:vecValues 2s ease-in-out 0s infinite" transform="translate(620 160)">[0.2,</text><text y="30" class="vec-emb-text" font-family="monospace" font-size="18" style="animation:vecValues 2s ease-in-out .4s infinite" transform="translate(620 160)">0.8,</text><text y="60" class="vec-emb-text" font-family="monospace" font-size="18" style="animation:vecValues 2s ease-in-out .8s infinite" transform="translate(620 160)">-0.4,</text><text y="90" class="vec-emb-text" font-family="monospace" font-size="18" style="animation:vecValues 2s ease-in-out 1.2s infinite" transform="translate(620 160)">0.1,</text><text y="120" class="vec-emb-text" font-family="monospace" font-size="18" style="animation:vecValues 2s ease-in-out 1.6s infinite" transform="translate(620 160)">0.7]</text><path stroke="#2E5BFF" stroke-width="2" d="M610 300h80M610 310h80M610 320h80"/><path d="M260 200h60" class="vec-emb-connection vec-emb-animated"/><path d="M520 200h60" class="vec-emb-animated" style="stroke:#8c54ff;stroke-width:4;fill:none"/><path d="M80 350h180v100H80z" class="vec-emb-box"/><text x="90" y="55" class="vec-emb-title" text-anchor="middle" transform="translate(80 350)">Semantic</text><text x="90" y="85" class="vec-emb-title" text-anchor="middle" transform="translate(80 350)">Search</text><path d="M320 350h200v100H320z" class="vec-emb-box"/><text x="100" y="55" class="vec-emb-title" text-anchor="middle" transform="translate(320 350)">Context</text><text x="100" y="85" class="vec-emb-title" text-anchor="middle" transform="translate(320 350)">Memory</text><path d="M580 350h140v100H580z" class="vec-emb-box"/><text x="70" y="55" class="vec-emb-title" text-anchor="middle" transform="translate(580 350)">Similarity</text><text x="70" y="85" class="vec-emb-title" text-anchor="middle" transform="translate(580 350)">Metrics</text><path stroke-dasharray="5,5" d="M650 320v30M260 400h60M520 400h60" class="vec-emb-connection"/></svg>