 attributeName="opacity" begin="1.7s" dur="3s" repeatCount="indefinite" values="0.3;0.7;0.3"/></path><path fill="#fff" d="M570 430h10v5h-10z" opacity=".3"><animate attributeName="opacity" begin="2.2s" dur="3s" repeatCount="indefinite" values="0.3;0.7;0.3"/></path><text x="550" y="450" class="data-creation-text" text-anchor="middle">Corpus</text></g><g style="animation:pulse 4s ease-in-out infinite;animation-delay:1s"><path d="M680 400h140v80H680z" class="data-creation-box glow-filter"><animate attributeName="stroke-width" begin="1s" dur="4s" repeatCount="indefinite" values="2;3;2"/></path><path fill="#FF9800" d="M710 420h25v5h-25z" opacity=".5"><animate attributeName="opacity" begin="0s" dur="3s" repeatCount="indefinite" values="0.5;0.8;0.5"/></path><path fill="#4CAF50" d="M740 420h15v5h-15z" opacity=".5"><animate attributeName="opacity" begin="0.3s" dur="3s" repeatCount="indefinite" values="0.5;0.8;0.5"/></path><path fill="#fff" d="M760 420h5v5h-5z" opacity=".3"><animate attributeName="opacity" begin="0.6s" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3"/></path><path fill="#fff" d="M770 420h5v5h-5z" opacity=".3"><animate attributeName="opacity" begin="0.9s" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3"/></path><path fill="#FF9800" d="M710 430h25v5h-25z" opacity=".5"><animate attributeName="opacity" begin="1.2s" dur="3s" repeatCount="indefinite" values="0.5;0.8;0.5"/></path><path fill="#4CAF50" d="M740 430h15v5h-15z" opacity=".5"><animate attributeName="opacity" begin="1.5s" dur="3s" repeatCount="indefinite" values="0.5;0.8;0.5"/></path><path fill="#fff" d="M760 430h5v5h-5z" opacity=".3"><animate attributeName="opacity" begin="1.8s" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3"/></path><path fill="#fff" d="M770 430h5v5h-5z" opacity=".3"><animate attributeName="opacity" begin="2.1s" dur="3s" repeatCount="indefinite" values="0.3;0.6;0.3"/></path><text x="750" y="450" class="data-creation-text" text-anchor="middle">QA Data</text></g><circle cx="250" cy="250" r="3" fill="#5ce2e7" class="pulse" opacity=".7"><animateMotion dur="2s" path="M0,0 L100,0" repeatCount="indefinite"/></circle><circle cx="450" cy="250" r="3" fill="#5ce2e7" class="pulse" opacity=".7"><animateMotion dur="2s" path="M0,0 L100,0" repeatCount="indefinite"/></circle><circle cx="650" cy="250" r="3" fill="#5ce2e7" class="pulse" opacity=".7"><animateMotion dur="2s" path="M0,0 L100,0" repeatCount="indefinite"/></circle><circle cx="550" cy="350" r="3" fill="#5ce2e7" class="pulse" opacity=".7"><animateMotion dur="2s" path="M0,0 L0,100" repeatCount="indefinite"/></circle><circle cx="750" cy="350" r="3" fill="#5ce2e7" class="pulse" opacity=".7"><animateMotion dur="2s" path="M0,0 L0,100" repeatCount="indefinite"/></circle><circle cx="500" cy="300" r="200" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1"/><circle cx="500" cy="300" r="250" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1" style="animation-direction:reverse"/><circle cx="500" cy="300" r="300" fill="none" stroke="#5ce2e7" stroke-width=".5" class="rotate" opacity=".1"/><path fill="none" stroke="#5ce2e7" stroke-width=".5" d="m500 150 100 50v100l-100 50-100-50V200Z" class="rotate" opacity=".05"/><path fill="none" stroke="#5ce2e7" stroke-width=".5" d="m500 100 150 75v150l-150 75-150-75V175Z" class="rotate" opacity=".05" style="animation-direction:reverse"/><path stroke="#5ce2e7" stroke-width=".5" d="M150 250h600M550 250v200M750 250v200" opacity=".05"/><circle cx="200" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:.5s"/><circle cx="300" cy="300" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1s"/><circle cx="400" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:1.5s"/><circle cx="600" cy="300" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2s"/><circle cx="700" cy="200" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:2.5s"/><circle cx="800" cy="300" r="2" fill="#5ce2e7" class="float" opacity=".3" style="animation-delay:3s"/></svg>