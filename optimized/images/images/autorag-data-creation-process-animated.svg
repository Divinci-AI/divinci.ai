<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-data-creation desc-data-creation" viewBox="0 0 1000 600"><desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process from raw documents to QA datasets</desc><defs><radialGradient id="blue-glow" cx=".5" cy=".5" r=".5" fx=".5" fy=".5"><stop offset="0%" stop-color="#4285F4" stop-opacity=".7"/><stop offset="100%" stop-color="#4285F4" stop-opacity="0"/></radialGradient><radialGradient id="green-glow" cx=".5" cy=".5" r=".5" fx=".5" fy=".5"><stop offset="0%" stop-color="#5ce2e7" stop-opacity=".7"/><stop offset="100%" stop-color="#5ce2e7" stop-opacity="0"/></radialGradient><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#fff" d="m0 0 10 5-10 5z"/></marker><filter id="glow" width="200%" height="200%" x="-50%" y="-50%"><feGaussianBlur result="blur" stdDeviation="5"/><feComposite in="SourceGraphic" in2="blur"/></filter><style>@keyframes float{0%,to{transform:translateY(0)}50%{transform:translateY(-10px)}}@keyframes pulse{0%,to{opacity:.7}50%{opacity:1}}@keyframes rotate{0%{transform:rotate(0deg)}to{transform:rotate(360deg)}}@keyframes dash{to{stroke-dashoffset:0}}@keyframes scissorCut{0%,to{transform:rotate(0deg)}25%{transform:rotate(20deg)}75%{transform:rotate(-20deg)}}@keyframes microscope{0%,to{transform:translateY(0)}50%{transform:translateY(-5px)}}@keyframes typing{0%{width:0}to{width:100%}}.data-creation-text{font-family:&quot;Sora&quot;,&quot;Inter&quot;,sans-serif;fill:#fff;font-size:32px;font-weight:500}.data-creation-arrow{stroke:#fff;stroke-width:3;fill:none}.data-creation-box{fill:rgba(46,91,255,.2);stroke:#5ce2e7;stroke-width:2;rx:20;ry:20}.doc-text{fill:#fff}.microscope-dot{fill:#ea4335}.scissors-blade{fill:#e0e0e0}.qa-text{fill:#fff}.glow-filter{filter:url(#glow)}.float{animation:float 6s ease-in-out infinite}.pulse{animation:pulse 3s ease-in-out infinite}.rotate{animation:rotate 20s linear infinite;transform-origin:center}.arrow-animate{stroke-dasharray:100;stroke-dashoffset:100;animation:dash 2s linear infinite}</style></defs><path d="M0 0h1000v600H0z" style="fill:#0c1229"/><text x="500" y="60" style="font-family:&quot;Sora&quot;,&quot;Inter&quot;,sans-serif;fill:#fff;font-size:40px;font-weight:600" text-anchor="middle">[ Data Creation Process ]</text><g style="animation:float 4s ease-in-out infinite" transform="translate(150 250)"><rect width="80" height="100" x="-40" y="-20" rx="5" ry="5" style="fill:#4285f4"><animate attributeName="y" begin="0s" dur="4s" repeatCount="indefinite" values="-20;-25;-20"/></rect><rect width="80" height="100" x="-50" y="-30" rx="5" ry="5" style="fill:#34a853"><animate attributeName="y" begin="0.5s" dur="4s" repeatCount="indefinite" values="-30;-35;-30"/></rect><rect width="80" height="100" x="-60" y="-40" rx="5" ry="5" style="fill:#ea4335"><animate attributeName="y" begin="1s" dur="4s" repeatCount="indefinite" values="-40;-45;-40"/></rect><path d="M-30-10v5z" class="doc-text"><animate attributeName="width" begin="0s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><path d="M-30 0v5z" class="doc-text"><animate attributeName="width" begin="0.5s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><path d="M-30 10v5z" class="doc-text"><animate attributeName="width" begin="1s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><path d="M-30 20v5z" class="doc-text"><animate attributeName="width" begin="1.5s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><path d="M-30 30v5z" class="doc-text"><animate attributeName="width" begin="2s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><path d="M-30 40v5z" class="doc-text"><animate attributeName="width" begin="2.5s" dur="3s" repeatCount="indefinite" values="0;50;50"/></path><circle cy="20" r="60" fill="url(#blue-glow)" class="pulse" opacity=".1"><animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.1;0.2;0.1"/></circle><text y="100" class="data-creation-text" text-anchor="middle">Raw Documents</text></g><g transform="translate(350 250)"><g style="animation:microscope 2s ease-in-out infinite;transform-origin:bottom center"><path d="M-15 20h30v40h-30z" style="fill:#b0bec5"/><circle r="30" style="fill:#78909c"><animate attributeName="r" dur="3s" repeatCount="indefinite" values="30;32;30"/></circle><path stroke="#5ce2e7" d="M-20 0h40" opacity=".5"><animate attributeName="y1" dur="4s" repeatCount="indefinite" values="0;-20;20;0"/><animate attributeName="y2" dur="4s" repeatCount="indefinite" values="0;-20;20;0"/></path><path d="M-25 40h50v10h-50z" style="fill:#546e7a"/><circle cx="-10" cy="35" r="5" class="microscope-dot pulse"><animate attributeName="r" begin="0s" dur="2s" repeatCount="indefinite" values="5;7;5"/></circle><circle cx="10" cy="45" r="5" class="microscope-dot pulse"><animate attributeName="r" begin="1s" dur="2s" repeatCount="indefinite" values="5;7;5"/></circle></g><circle cy="20" r="50" fill="url(#green-glow)" class="pulse" opacity=".1"><animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.1;0.3;0.1"/></circle><text y="100" class="data-creation-text" text-anchor="middle">Parsing</text></g><g transform="translate(550 250)"><path stroke="#fff" stroke-width="5" d="M-30 30c10-30 50-30 60 0" style="fill:#fff"/><g style="animation:scissorCut 3s ease-in-out infinite;transform-origin:center"><path stroke="#fff" stroke-linecap="round" stroke-width="8" d="m-30-30 60 60" class="scissors-blade"><animate attributeName="d" dur="2s" repeatCount="indefinite" values="M-30,-30 L30,30;M-25,-35 L35,25;M-30,-30 L30,30"/></path><path stroke="#fff" stroke-linecap="round" stroke-width="8" d="m30-30-60 60" class="scissors-blade"><animate attributeName="d" dur="2s" repeatCount="indefinite" values="M30,-30 L-30,30;M35,-35 L-25,25;M30,-30 L-30,30"/></path></g><path stroke="#5ce2e7" stroke-dasharray="2,2" stroke-width="2" d="M-20 0h40" opacity=".7"><animate attributeName="y1" dur="3s" repeatCount="indefinite" values="0;-10;0;10;0"/><animate attributeName="y2" dur="3s" repeatCount="indefinite" values="0;-10;0;10;0"/><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.7;0;0.7"/></path><circle r="40" fill="url(#green-glow)" class="pulse" opacity=".2"/></g><text y="100" class="data-creation-text" text-anchor="middle" transform="translate(550 250)">Chunking</text><g class="float" transform="translate(750 250)"><rect width="100" height="100" x="-50" y="-50" rx="10" ry="10" style="fill:#f5f7fa;stroke:#b0bec5;stroke-width:2"><animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.9;1;0.9"/></rect><rect width="100" height="20" x="-50" y="-50" fill="#B0BEC5" rx="10" ry="10"/><circle cx="40" cy="-40" r="5" class="pulse" style="fill:#ff5252"/><rect width="80" height="20" x="-40" y="-20" rx="5" ry="5" style="fill:#ff9800;animation:pulse 2s ease-in-out infinite"/><text x="-30" y="-5" class="qa-text" font-size="12">Q</text><circle cy="-10" r="2" fill="#fff" opacity=".7"><animate attributeName="opacity" begin="0s" dur="1.5s" repeatCount="indefinite" values="0.7;0;0.7"/></circle><circle cx="10" cy="-10" r="2" fill="#fff" opacity=".7"><animate attributeName="opacity" begin="0.5s" dur="1.5s" repeatCount="indefinite" values="0.7;0;0.7"/></circle><circle cx="20" cy="-10" r="2" fill="#fff" opacity=".7"><animate attributeName="opacity" begin="1s" dur="1.5s" repeatCount="indefinite" values="0.7;0;0.7"/></circle><rect width="60" height="20" x="-40" y="10" rx="5" ry="5" style="fill:#4caf50"><animate attributeName="width" begin="1.5s" dur="2s" repeatCount="indefinite" values="0;60"/></rect><text x="-30" y="25" class="qa-text" font-size="12">A</text><circle r="60" fill="url(#green-glow)" class="pulse" opacity=".1"><animate attributeName="opacity" dur="4s" repeatCount="indefinite" values="0.1;0.3;0.1"/></circle><text y="100" class="data-creation-text" text-anchor="middle">QA Creation</text></g><path marker-end="url(#arrow)"