<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-doc-proc desc-doc-proc" viewBox="0 0 800 500"><desc id="desc-doc-proc">Visualization of how the AutoRAG system processes documents into analyzable chunks</desc><defs><style>@keyframes docFlow{0%{stroke-dashoffset:200}to{stroke-dashoffset:0}}@keyframes docHighlight{0%,to{opacity:.7}50%{opacity:1}}.doc-proc-bg{fill:#f5f7fa}.doc-proc-container{fill:#f5f7fa;stroke:#485262;stroke-width:3;rx:10;ry:10}.doc-proc-connection{stroke:#2e5bff;stroke-width:3;fill:none}.doc-proc-highlight{stroke:#8c54ff;stroke-width:4;fill:none}.doc-proc-box{fill:#f5f7fa;stroke:#2e5bff;stroke-width:3;rx:10;ry:10}.doc-proc-chunk{fill:#f0f5ff;stroke:#00d8d8;stroke-width:2;rx:8;ry:8}.doc-proc-icon{fill:#2e5bff}.doc-proc-icon-alt{fill:#00d8d8}.doc-proc-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:16px}.doc-proc-title{font-size:20px;font-weight:500}.doc-proc-animated{stroke-dasharray:12,7;animation:docFlow 5s linear infinite}</style></defs><path d="M0 0h800v500H0z" class="doc-proc-bg"/><path d="M100 80h150v170H100z" class="doc-proc-container"/><text x="75" y="45" class="doc-proc-title" text-anchor="middle" transform="translate(100 80)">Source Documents</text><path d="M130 150h90v14h-90z" class="doc-proc-icon"/><path d="M130 175h90v14h-90z" class="doc-proc-icon" opacity=".8"/><path d="M130 200h90v14h-90z" class="doc-proc-icon" opacity=".6"/><path d="M130 225h90v14h-90z" class="doc-proc-icon" opacity=".4"/><path d="M0 0h180v130H0z" class="doc-proc-box" style="animation:docHighlight 2s ease-in-out infinite" transform="translate(340 100)"/><text x="90" y="65" class="doc-proc-title" text-anchor="middle" transform="translate(340 100)">Document</text><text x="90" y="95" class="doc-proc-title" text-anchor="middle" transform="translate(340 100)">Processor</text><path d="M600 50h120v50H600z" class="doc-proc-chunk" opacity=".9"/><text x="60" y="32" class="doc-proc-text" text-anchor="middle" transform="translate(600 50)">Chunk 1</text><path d="M600 110h120v50H600z" class="doc-proc-chunk" opacity=".9"/><text x="60" y="32" class="doc-proc-text" text-anchor="middle" transform="translate(600 110)">Chunk 2</text><path d="M600 170h120v50H600z" class="doc-proc-chunk" opacity=".9"/><text x="60" y="32" class="doc-proc-text" text-anchor="middle" transform="translate(600 170)">Chunk 3</text><path d="M600 230h120v50H600z" class="doc-proc-chunk" opacity=".9"/><text x="60" y="32" class="doc-proc-text" text-anchor="middle" transform="translate(600 230)">Chunk 4</text><path d="M340 300h180v130H340z" class="doc-proc-box" opacity=".9"/><text x="90" y="65" class="doc-proc-title" text-anchor="middle" transform="translate(340 300)">Metadata</text><text x="90" y="95" class="doc-proc-title" text-anchor="middle" transform="translate(340 300)">Extraction</text><g transform="translate(100 330)"><path d="M0 0h150v100H0z" class="doc-proc-container"/><text x="75" y="45" class="doc-proc-title" text-anchor="middle">Content Tags</text><rect width="40" height="24" x="30" y="60" class="doc-proc-icon-alt" opacity=".7" rx="12" ry="12"/><rect width="40" height="24" x="80" y="60" class="doc-proc-icon-alt" opacity=".7" rx="12" ry="12"/><rect width="50" height="24" x="55" y="60" class="doc-proc-icon-alt" opacity=".5" rx="12" ry="12" transform="translate(0 30)"/></g><path d="M250 165h90M520 120l80-45M520 140l80-5M520 160l80 35M520 180l80 75" class="doc-proc-connection doc-proc-animated"/><path d="M430 230v70M340 365h-90" class="doc-proc-highlight doc-proc-animated"/><g transform="translate(600 330)"><rect width="150" height="150" stroke="#485262" class="doc-proc-bg" rx="8" ry="8"/><text x="75" y="40" class="doc-proc-title" font-weight="500" text-anchor="middle">Benefits</text><circle cx="40" cy="70" r="8" class="doc-proc-icon"/><text x="130" y="75" class="doc-proc-text" text-anchor="end">Scalable</text><circle cx="40" cy="105" r="8" class="doc-proc-icon-alt"/><text x="130" y="110" class="doc-proc-text" text-anchor="end">Metadata-rich</text><circle cx="40" cy="140" r="8" fill="#8C54FF"/><text x="130" y="145" class="doc-proc-text" text-anchor="end">Automated</text></g></svg>