<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-ret-opt desc-ret-opt" viewBox="0 0 800 500"><desc id="desc-ret-opt">Visualization of how AutoRAG optimizes retrieval based on context and feedback</desc><defs><style>@keyframes retFlow{0%{stroke-dashoffset:200}to{stroke-dashoffset:0}}@keyframes retPulse{0%,to{opacity:.7}50%{opacity:1}}@keyframes gaugeAnim{0%,to{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}.ret-opt-container{fill:#f5f7fa;stroke:#485262;stroke-width:2.5;rx:12;ry:12}.ret-opt-connection{stroke:#2e5bff;stroke-width:3;fill:none}.ret-opt-feedback{stroke:#00d8d8;stroke-width:2.5;fill:none;stroke-dasharray:10,5}.ret-opt-icon-2{fill:#8c54ff}.ret-opt-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:16px}.ret-opt-title{font-size:20px;font-weight:500}.ret-opt-animated{stroke-dasharray:12,7;animation:retFlow 6s linear infinite}</style></defs><path d="M0 0h800v500H0z" style="fill:#f5f7fa"/><path d="M0 0h160v90H0z" style="fill:#f0f5ff;stroke:#2e5bff;stroke-width:3;rx:10;ry:10" transform="translate(100 100)"/><text x="80" y="50" class="ret-opt-title" text-anchor="middle" transform="translate(100 100)">Query</text><text x="80" y="75" class="ret-opt-text" text-anchor="middle" transform="translate(100 100)">with Context</text><g transform="translate(320 70)"><path d="M0 0h180v150H0z" style="fill:#f5f7fa;stroke:#8c54ff;stroke-width:3;rx:12;ry:12;animation:retPulse 3s ease-in-out infinite"/><text x="90" y="50" class="ret-opt-title" text-anchor="middle">Retrieval</text><text x="90" y="80" class="ret-opt-title" text-anchor="middle">Optimizer</text><circle cx="70" cy="110" r="8" class="ret-opt-icon-2"/><circle cx="110" cy="110" r="8" class="ret-opt-icon-2"/><path stroke="#8C54FF" stroke-width="3" d="M70 110h40M80 100h20M80 120h20"/></g><path d="M560 100h160v90H560z" class="ret-opt-container"/><text x="80" y="50" class="ret-opt-title" text-anchor="middle" transform="translate(560 100)">Vector</text><text x="80" y="75" class="ret-opt-text" text-anchor="middle" transform="translate(560 100)">Database</text><path d="M0 0h180v130H0z" style="fill:#f5f7fa;stroke:#00d8d8;stroke-width:3;rx:10;ry:10" transform="translate(320 300)"/><text x="90" y="50" class="ret-opt-title" text-anchor="middle" transform="translate(320 300)">Optimized</text><text x="90" y="75" class="ret-opt-text" text-anchor="middle" transform="translate(320 300)">Results</text><g transform="translate(410 395)"><path fill="none" stroke="#E0E0E0" stroke-width="4" d="M-40 0a40 40 0 0 1 80 0"/><path stroke="#00D8D8" stroke-width="3" d="M0 0v-36" style="transform-origin:center bottom;animation:gaugeAnim 4s ease-in-out infinite"/><circle r="6" fill="#00D8D8"/><text y="20" class="ret-opt-text" text-anchor="middle">Relevance</text></g><path d="M100 320h160v90H100z" class="ret-opt-container"/><text x="80" y="50" class="ret-opt-title" text-anchor="middle" transform="translate(100 320)">Feedback</text><text x="80" y="75" class="ret-opt-text" text-anchor="middle" transform="translate(100 320)">Analyzer</text><path d="M560 320h160v90H560z" class="ret-opt-container"/><text x="80" y="50" class="ret-opt-title" text-anchor="middle" transform="translate(560 320)">Performance</text><text x="80" y="75" class="ret-opt-text" text-anchor="middle" transform="translate(560 320)">Metrics</text><path fill="none" stroke="#00D8D8" stroke-width="3" d="m620 430 20-15 20 25"/><path d="M260 145h60M500 145h60" class="ret-opt-connection ret-opt-animated"/><path d="M410 220v80" class="ret-opt-animated" style="stroke:#8c54ff;stroke-width:4;fill:none"/><path d="M320 365h-60M500 365h60" class="ret-opt-connection"/><path d="M100 320c0-100 0-250 220-250M560 320c120 0 160-100 160-175S560 70 500 70" class="ret-opt-feedback ret-opt-animated"/></svg>