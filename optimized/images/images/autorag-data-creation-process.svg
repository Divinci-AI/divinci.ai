<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-data-creation desc-data-creation" viewBox="0 0 1000 600"><desc id="desc-data-creation">Visualization of the AutoRAG data creation process from raw documents to QA datasets</desc><defs><style>.data-creation-text{font-family:&quot;Sora&quot;,&quot;Inter&quot;,sans-serif;fill:#fff;font-size:32px;font-weight:500}.data-creation-arrow{stroke:#fff;stroke-width:3;fill:none}.data-creation-box{fill:#2e5bff;opacity:.2;stroke:#5ce2e7;stroke-width:2;rx:20;ry:20}.doc-text{fill:#fff}.microscope-dot{fill:#ea4335}.scissors-blade{fill:#e0e0e0}.qa-text{fill:#fff}</style></defs><path d="M0 0h1000v600H0z" style="fill:#0c1229"/><text x="500" y="60" style="font-family:&quot;Sora&quot;,&quot;Inter&quot;,sans-serif;fill:#fff;font-size:40px;font-weight:600" text-anchor="middle">[ Data Creation Process ]</text><g transform="translate(150 250)"><rect width="80" height="100" x="-40" y="-20" rx="5" ry="5" style="fill:#4285f4"/><rect width="80" height="100" x="-50" y="-30" rx="5" ry="5" style="fill:#34a853"/><rect width="80" height="100" x="-60" y="-40" rx="5" ry="5" style="fill:#ea4335"/><path d="M-30-10h50v5h-50zM-30 0h50v5h-50zM-30 10h50v5h-50zM-30 20h50v5h-50zM-30 30h50v5h-50zM-30 40h50v5h-50z" class="doc-text"/><text y="100" class="data-creation-text" text-anchor="middle">Raw Documents</text></g><g transform="translate(350 250)"><path d="M-15 20h30v40h-30z" style="fill:#b0bec5"/><circle r="30" style="fill:#78909c"/><path d="M-25 40h50v10h-50z" style="fill:#546e7a"/><circle cx="-10" cy="35" r="5" class="microscope-dot"/><circle cx="10" cy="45" r="5" class="microscope-dot"/><text y="100" class="data-creation-text" text-anchor="middle">Parsing</text></g><path stroke="#fff" stroke-width="5" d="M-30 30c10-30 50-30 60 0" style="fill:#fff" transform="translate(550 250)"/><path stroke="#fff" stroke-linecap="round" stroke-width="8" d="m520 220 60 60M580 220l-60 60" class="scissors-blade"/><text y="100" class="data-creation-text" text-anchor="middle" transform="translate(550 250)">Chunking</text><g transform="translate(750 250)"><rect width="100" height="100" x="-50" y="-50" rx="10" ry="10" style="fill:#f5f7fa;stroke:#b0bec5;stroke-width:2"/><rect width="100" height="20" x="-50" y="-50" fill="#B0BEC5" rx="10" ry="10"/><circle cx="40" cy="-40" r="5" style="fill:#ff5252"/><rect width="80" height="20" x="-40" y="-20" rx="5" ry="5" style="fill:#ff9800"/><rect width="60" height="20" x="-40" y="10" rx="5" ry="5" style="fill:#4caf50"/><text x="-30" y="-5" class="qa-text" font-size="12">Q</text><text x="-30" y="25" class="qa-text" font-size="12">A</text><text y="100" class="data-creation-text" text-anchor="middle">QA Creation</text></g><path marker-end="url(#arrow)" d="M200 250h100" class="data-creation-arrow"/><path marker-end="url(#arrow)" d="M400 250h100" class="data-creation-arrow"/><path marker-end="url(#arrow)" d="M600 250h100" class="data-creation-arrow"/><path marker-end="url(#arrow)" d="M550 300v100" class="data-creation-arrow"/><path marker-end="url(#arrow)" d="M750 300v100" class="data-creation-arrow"/><path d="M480 400h140v80H480z" class="data-creation-box"/><text x="550" y="450" class="data-creation-text" text-anchor="middle">Corpus</text><path d="M680 400h140v80H680z" class="data-creation-box"/><text x="750" y="450" class="data-creation-text" text-anchor="middle">QA Data</text><defs><marker id="arrow" markerHeight="6" markerWidth="6" orient="auto" refX="9" refY="5" viewBox="0 0 10 10"><path fill="#fff" d="m0 0 10 5-10 5z"/></marker></defs></svg>