<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-vec-emb desc-vec-emb" viewBox="0 0 300 200"><desc id="desc-vec-emb">Visualization of how text is converted to vector embeddings and stored in a vector database</desc><defs><style>@keyframes vecFlow{0%{stroke-dashoffset:100}to{stroke-dashoffset:0}}@keyframes vecPulse{0%,to{opacity:.9}50%{opacity:1}}@keyframes vecValues{0%,to{opacity:.4}50%{opacity:1}}.vec-emb-connection{stroke:#2e5bff;stroke-width:2;fill:none}.vec-emb-box{fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4}.vec-emb-text-item{fill:#2e5bff;opacity:.8}.vec-emb-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:10px}.vec-emb-title{font-size:12px;font-weight:500}.vec-emb-animated{stroke-dasharray:5,3;animation:vecFlow 4s linear infinite}</style></defs><path d="M0 0h300v200H0z" style="fill:#f5f7fa"/><g transform="translate(20 40)"><path d="M0 0h70v80H0z" style="fill:#f5f7fa;stroke:#485262;stroke-width:1.5;rx:6;ry:6"/><text x="35" y="20" class="vec-emb-title" text-anchor="middle">Text Chunks</text><rect width="40" height="8" x="15" y="30" class="vec-emb-text-item" rx="2" ry="2"/><rect width="40" height="8" x="15" y="43" class="vec-emb-text-item" rx="2" ry="2"/><rect width="40" height="8" x="15" y="56" class="vec-emb-text-item" rx="2" ry="2"/><rect width="40" height="8" x="15" y="69" class="vec-emb-text-item" rx="2" ry="2"/></g><g transform="translate(120 50)"><path d="M0 0h80v60H0z" style="fill:#f0f5ff;stroke:#8c54ff;stroke-width:2;rx:5;ry:5;animation:vecPulse 2s ease-in-out infinite"/><text x="40" y="25" class="vec-emb-title" text-anchor="middle">Embedding</text><text x="40" y="40" class="vec-emb-title" text-anchor="middle">Model</text><circle cx="25" cy="55" r="3" fill="#8C54FF" opacity=".6"/><circle cx="25" cy="45" r="3" fill="#8C54FF" opacity=".6"/><circle cx="40" cy="50" r="3" fill="#8C54FF" opacity=".9"/><circle cx="55" cy="55" r="3" fill="#8C54FF" opacity=".6"/><circle cx="55" cy="45" r="3" fill="#8C54FF" opacity=".6"/><path stroke="#8C54FF" stroke-width=".7" d="m25 45 15 5M25 55l15-5M40 50l15-5M40 50l15 5" opacity=".5"/></g><path d="M0 0h50v100H0z" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:2;rx:3;ry:3" transform="translate(230 30)"/><text x="25" y="15" class="vec-emb-title" text-anchor="middle" transform="translate(230 30)">Vector DB</text><text class="vec-emb-text" font-family="monospace" style="animation:vecValues 2s ease-in-out 0s infinite" transform="translate(245 60)">[0.2,</text><text y="12" class="vec-emb-text" font-family="monospace" style="animation:vecValues 2s ease-in-out .4s infinite" transform="translate(245 60)">0.8,</text><text y="24" class="vec-emb-text" font-family="monospace" style="animation:vecValues 2s ease-in-out .8s infinite" transform="translate(245 60)">-0.4,</text><text y="36" class="vec-emb-text" font-family="monospace" style="animation:vecValues 2s ease-in-out 1.2s infinite" transform="translate(245 60)">0.1,</text><text y="48" class="vec-emb-text" font-family="monospace" style="animation:vecValues 2s ease-in-out 1.6s infinite" transform="translate(245 60)">0.7]</text><path stroke="#2E5BFF" d="M240 120h30M240 125h30M240 130h30"/><path d="M90 80h30" class="vec-emb-connection vec-emb-animated"/><path d="M200 80h30" class="vec-emb-animated" style="stroke:#8c54ff;stroke-width:2.5;fill:none"/><path d="M20 140h70v40H20z" class="vec-emb-box"/><text x="35" y="25" class="vec-emb-title" text-anchor="middle" transform="translate(20 140)">Semantic</text><text x="35" y="37" class="vec-emb-title" text-anchor="middle" transform="translate(20 140)">Search</text><path d="M120 140h80v40h-80z" class="vec-emb-box"/><text x="40" y="25" class="vec-emb-title" text-anchor="middle" transform="translate(120 140)">Context</text><text x="40" y="37" class="vec-emb-title" text-anchor="middle" transform="translate(120 140)">Memory</text><path d="M230 140h50v40h-50z" class="vec-emb-box"/><text x="25" y="25" class="vec-emb-title" text-anchor="middle" transform="translate(230 140)">Similarity</text><text x="25" y="37" class="vec-emb-title" text-anchor="middle" transform="translate(230 140)">Metrics</text><path stroke-dasharray="2,2" d="M255 130v10M90 160h30M200 160h30" class="vec-emb-connection"/></svg>