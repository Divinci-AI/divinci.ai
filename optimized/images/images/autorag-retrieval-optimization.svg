<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="title-ret-opt desc-ret-opt" viewBox="0 0 300 200"><desc id="desc-ret-opt">Visualization of how AutoRAG optimizes retrieval based on context and feedback</desc><defs><style>@keyframes retFlow{0%{stroke-dashoffset:100}to{stroke-dashoffset:0}}@keyframes retPulse{0%,to{opacity:.7}50%{opacity:1}}@keyframes gaugeAnim{0%,to{transform:rotate(-20deg)}50%{transform:rotate(20deg)}}.ret-opt-container{fill:#f5f7fa;stroke:#485262;stroke-width:1.5;rx:5;ry:5}.ret-opt-connection{stroke:#2e5bff;stroke-width:2;fill:none}.ret-opt-feedback{stroke:#00d8d8;stroke-width:1.5;fill:none;stroke-dasharray:4,2}.ret-opt-icon-2{fill:#8c54ff}.ret-opt-text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262;font-size:10px}.ret-opt-title{font-size:12px;font-weight:500}.ret-opt-animated{stroke-dasharray:5,3;animation:retFlow 6s linear infinite}</style></defs><path d="M0 0h300v200H0z" style="fill:#f5f7fa"/><path d="M0 0h70v40H0z" style="fill:#f0f5ff;stroke:#2e5bff;stroke-width:1.5;rx:4;ry:4" transform="translate(20 35)"/><text x="35" y="25" class="ret-opt-title" text-anchor="middle" transform="translate(20 35)">Query</text><text x="35" y="37" class="ret-opt-text" text-anchor="middle" transform="translate(20 35)">with Context</text><g transform="translate(110 20)"><path d="M0 0h80v70H0z" style="fill:#f5f7fa;stroke:#8c54ff;stroke-width:2;rx:5;ry:5;animation:retPulse 3s ease-in-out infinite"/><text x="40" y="20" class="ret-opt-title" text-anchor="middle">Retrieval</text><text x="40" y="34" class="ret-opt-title" text-anchor="middle">Optimizer</text><circle cx="30" cy="50" r="4" class="ret-opt-icon-2"/><circle cx="50" cy="50" r="4" class="ret-opt-icon-2"/><path stroke="#8C54FF" stroke-width="1.5" d="M30 50h20M34 46h12M34 54h12"/></g><path d="M210 35h70v40h-70z" class="ret-opt-container"/><text x="35" y="25" class="ret-opt-title" text-anchor="middle" transform="translate(210 35)">Vector</text><text x="35" y="37" class="ret-opt-text" text-anchor="middle" transform="translate(210 35)">Database</text><path d="M0 0h80v60H0z" style="fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4" transform="translate(110 120)"/><text x="40" y="20" class="ret-opt-title" text-anchor="middle" transform="translate(110 120)">Optimized</text><text x="40" y="32" class="ret-opt-text" text-anchor="middle" transform="translate(110 120)">Results</text><g transform="translate(150 165)"><path fill="none" stroke="#E0E0E0" stroke-width="2" d="M-20 0a20 20 0 0 1 40 0"/><path stroke="#00D8D8" stroke-width="2" d="M0 0v-18" style="transform-origin:center bottom;animation:gaugeAnim 4s ease-in-out infinite"/><circle r="3" fill="#00D8D8"/><text y="12" class="ret-opt-text" text-anchor="middle">Relevance</text></g><path d="M20 130h70v40H20z" class="ret-opt-container"/><text x="35" y="25" class="ret-opt-title" text-anchor="middle" transform="translate(20 130)">Feedback</text><text x="35" y="37" class="ret-opt-text" text-anchor="middle" transform="translate(20 130)">Analyzer</text><path d="M210 130h70v40h-70z" class="ret-opt-container"/><text x="35" y="25" class="ret-opt-title" text-anchor="middle" transform="translate(210 130)">Performance</text><text x="35" y="37" class="ret-opt-text" text-anchor="middle" transform="translate(210 130)">Metrics</text><path fill="none" stroke="#00D8D8" stroke-width="1.5" d="m235 180 10-5 10 10"/><path d="M90 55h20M190 55h20" class="ret-opt-connection ret-opt-animated"/><path d="M150 90v30" class="ret-opt-animated" style="stroke:#8c54ff;stroke-width:2.5;fill:none"/><path d="M110 150H90M190 150h20" class="ret-opt-connection"/><path d="M20 130c0-40 0-110 90-110M210 130c50 0 70-40 70-75s-70-35-90-35" class="ret-opt-feedback ret-opt-animated"/></svg>