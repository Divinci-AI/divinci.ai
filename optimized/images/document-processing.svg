<svg xmlns="http://www.w3.org/2000/svg" aria-labelledby="doc-process-title doc-process-desc" viewBox="0 0 300 200"><desc id="doc-process-desc">Visualization of AutoRAG&apos;s document processing, chunking, and preparation for embedding</desc><defs><linearGradient id="documentFlow" x1="0%" x2="100%" y1="0%" y2="0%"><stop offset="0%" stop-color="#2E5BFF" stop-opacity=".2"/><stop offset="100%" stop-color="#00D8D8" stop-opacity=".8"/></linearGradient><style>@keyframes flowAnimation{0%{stroke-dashoffset:400}to{stroke-dashoffset:0}}.primary-connection{stroke:#2e5bff;stroke-width:2;fill:none}.secondary-connection{stroke:#00d8d8;stroke-width:1.5;fill:none}.icon-primary{fill:#2e5bff}text{font-family:&quot;Inter&quot;,sans-serif;fill:#485262}.detail-text,.subtitle-text{font-size:14px;font-weight:400}.detail-text{font-size:12px}.animated-path{stroke-dasharray:5,3;animation:flowAnimation 10s linear infinite}.process-box{fill:#f5f7fa;stroke:#00d8d8;stroke-width:1.5;rx:4;ry:4}.chunk-box{fill:#f0f5ff;stroke:#2e5bff;stroke-width:1;rx:2;ry:2}</style></defs><rect width="100%" height="100%" style="fill:#f5f7fa"/><path d="M0 0h60v70H0z" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:1.5;rx:4;ry:4" transform="translate(30 30)"/><text x="30" y="20" class="subtitle-text" text-anchor="middle" transform="translate(30 30)">Input</text><path d="M45 60h30M45 70h30M45 80h30M45 90h20" class="icon-primary"/><g transform="translate(120 30)"><path d="M0 0h70v70H0z" class="process-box"/><text x="35" y="20" class="subtitle-text" text-anchor="middle">Processor</text><circle cx="35" cy="45" r="15" opacity=".7" style="fill:#f5f7fa;stroke:#2e5bff;stroke-width:2"><animate attributeName="opacity" dur="3s" repeatCount="indefinite" values="0.7;1;0.7"/></circle><text x="35" y="48" class="detail-text" text-anchor="middle">Parse</text></g><path d="M220 30h60v70h-60z" class="process-box"/><text x="30" y="20" class="subtitle-text" text-anchor="middle" transform="translate(220 30)">Chunking</text><path d="M230 60h40v10h-40zM230 75h40v10h-40zM230 90h40v10h-40z" class="chunk-box"/><path d="M30 130h60v50H30z" class="process-box"/><text x="30" y="20" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(30 130)">Semantic</text><text x="30" y="35" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(30 130)">Analysis</text><path d="M120 130h70v50h-70z" class="process-box"/><text x="35" y="20" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(120 130)">Metadata</text><text x="35" y="35" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(120 130)">Extraction</text><path d="M220 130h60v50h-60z" class="process-box"/><text x="30" y="20" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(220 130)">Embedding</text><text x="30" y="35" class="subtitle-text" font-size="12" text-anchor="middle" transform="translate(220 130)">Prep</text><path d="M90 65h30M190 65h30" class="primary-connection animated-path"/><path d="M60 100v30M155 100v30M250 100v30M90 155h30M190 155h30" class="secondary-connection animated-path"/><text x="150" y="190" class="detail-text" text-anchor="middle">Intelligent Document Processing Pipeline</text></svg>