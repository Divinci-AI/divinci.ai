# Zola Configuration for Divinci AI Website
base_url = "https://divinci.ai"

# Build settings
compile_sass = true
minify_html = true
generate_feed = true
build_search_index = true
hard_link_static = false

# Theme and output settings
output_dir = "public"
default_language = "en"

# Markdown settings
[markdown]
highlight_code = true
highlight_theme = "base16-ocean-dark"
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true



# Extra configuration
[extra]
author = "Divinci AI"
company = "Divinci AI"
email = "support@divinci.ai"
twitter = "@DivinciAI"
linkedin = "company/divinci-ai"
github = "Divinci-AI"

# Analytics and tracking
google_analytics = ""
google_tag_manager = ""

# SEO settings
default_image = "/images/social/divinci-default-social.png"
favicon = "/images/favicon-32x32.png"

# Language configurations
[languages.en]
title = "Divinci AI"
description = "Empowering human-AI collaboration"
weight = 1

