<!-- Language Switcher Component -->
<div class="dropdown" style="margin-left: 15px;">
    <div class="dropdown-trigger">
        <button class="button is-small is-transparent" aria-haspopup="true" aria-controls="language-dropdown" style="background: rgba(255, 255, 255, 0.1); border: none; color: white; border-radius: 5px;">
            <span class="language-icon" style="margin-right: 6px;">
                <div id="language-morph" style="width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 16px; font-weight: bold; color: white; position: relative;">
                    <span id="char-display">A</span>
                </div>
            </span>
            <span class="current-language" style="font-size: 14px;">
                {% if lang == "en" %}English
                {% elif lang == "es" %}Español
                {% elif lang == "fr" %}Français
                {% elif lang == "ar" %}العربية
                {% else %}English{% endif %}
            </span>
            <span class="icon is-small" style="margin-left: 4px;">
                <i class="fas fa-angle-down" style="font-size: 10px;"></i>
            </span>
        </button>
    </div>
    <div class="dropdown-menu" id="language-dropdown" role="menu" style="min-width: 180px;">
        <div class="dropdown-content">
            <a href="/" class="dropdown-item is-active">
                <span style="font-weight: 500; color: #1976d2;">English</span>
            </a>
            <a href="/es/" class="dropdown-item">
                <span style="font-weight: 500; color: #333;">Español</span>
            </a>
            <a href="/fr/" class="dropdown-item">
                <span style="font-weight: 500; color: #333;">Français</span>
            </a>
            <a href="/ar/" class="dropdown-item">
                <span style="font-weight: 500; color: #333;">العربية</span>
            </a>
        </div>
    </div>
</div>

<!-- Language Switcher Styles -->
<style>
    /* Custom styles for language switcher using Bulma */
    .dropdown .button.is-transparent {
        transition: background-color 0.3s ease;
        font-family: 'Sora', sans-serif;
    }

    .dropdown .button.is-transparent:hover {
        background-color: rgba(255, 255, 255, 0.2) !important;
    }

    .dropdown-item.is-active {
        background-color: #e3f2fd;
        color: #1976d2;
        font-weight: 600;
    }

    .dropdown-item.is-active .language-native {
        color: #1976d2 !important;
    }

    .dropdown-item:hover {
        background-color: #f8f9fa;
    }

    /* Character morph animation */
    #language-morph {
        transition: transform 0.3s ease;
    }

    #language-morph.animate-morph #char-display {
        animation: character-morph 2s cubic-bezier(0.65,0,0.35,1) 1;
    }

    @keyframes character-morph {
        0% {
            transform: scale(1) rotate(0deg);
            opacity: 1;
        }
        25% {
            transform: scale(1.2) rotate(90deg);
            opacity: 0.7;
        }
        50% {
            transform: scale(0.8) rotate(180deg);
            opacity: 0.3;
        }
        75% {
            transform: scale(1.1) rotate(270deg);
            opacity: 0.7;
        }
        100% {
            transform: scale(1) rotate(360deg);
            opacity: 1;
        }
    }

    /* RTL support for Arabic */
    html[dir="rtl"] .dropdown {
        margin-left: 0;
        margin-right: 15px;
    }

    /* Ensure dropdown appears above other content */
    .dropdown-menu {
        z-index: 10000;
    }

    /* Hide dropdown by default */
    .dropdown:not(.is-active) .dropdown-menu {
        display: none;
    }

    /* Show dropdown when active or hovered */
    .dropdown.is-active .dropdown-menu,
    .dropdown.is-hoverable:hover .dropdown-menu {
        display: block;
    }
</style>

<!-- Language Switcher JavaScript -->
<script>
document.addEventListener('DOMContentLoaded', function() {
    const languageDropdown = document.querySelector('.dropdown');
    const dropdownTrigger = document.querySelector('.dropdown-trigger button');
    const languageMorph = document.getElementById('language-morph');
    const charDisplay = document.getElementById('char-display');

    // Character sequence for morphing animation
    const characters = ['A', 'あ', 'ア', '文', 'Ω', 'A'];
    let currentCharIndex = 0;

    if (languageDropdown && dropdownTrigger && languageMorph && charDisplay) {
        // Handle click to toggle dropdown
        dropdownTrigger.addEventListener('click', function(e) {
            e.preventDefault();
            languageDropdown.classList.toggle('is-active');
        });

        // Close dropdown when clicking outside
        document.addEventListener('click', function(e) {
            if (!languageDropdown.contains(e.target)) {
                languageDropdown.classList.remove('is-active');
            }
        });

        // Add morphing animation when dropdown is hovered
        languageDropdown.addEventListener('mouseenter', function() {
            startMorphAnimation();
        });

        // Function to start the morphing animation
        function startMorphAnimation() {
            languageMorph.classList.add('animate-morph');

            // Change character during the animation
            let morphInterval = setInterval(() => {
                currentCharIndex = (currentCharIndex + 1) % characters.length;
                charDisplay.textContent = characters[currentCharIndex];
            }, 300);

            // Stop after one complete cycle
            setTimeout(() => {
                clearInterval(morphInterval);
                charDisplay.textContent = 'A'; // Reset to A
                currentCharIndex = 0;
                languageMorph.classList.remove('animate-morph');
            }, 2000);
        }
    }
});
</script>
