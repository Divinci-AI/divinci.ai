<!-- Mobile Header Style - Using base URL to ensure paths work from any directory -->
<script>
    // Create dynamic link element to handle path resolution without document.write
    (function() {
        // Load Google Fonts (Sora and Inter)
        if (!document.querySelector('link[href*="fonts.googleapis.com"]')) {
            const googleFonts = document.createElement('link');
            googleFonts.rel = 'stylesheet';
            googleFonts.href = 'https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@100;200;300;400;500;600;700;800&display=swap';
            document.head.appendChild(googleFonts);
        }

        // Load font styles
        const basePath = window.location.pathname.includes('/features/') ? '../../' : '../';

        // Load fonts.css
        const fontStyles = document.createElement('link');
        fontStyles.rel = 'stylesheet';
        fontStyles.href = basePath + 'optimized/css/assets/css/fonts.min.css';
        document.head.appendChild(fontStyles);

        // Load Sora styles
        const soraStyles = document.createElement('link');
        soraStyles.rel = 'stylesheet';
        soraStyles.href = basePath + 'optimized/css/assets/css/sora-styles.min.css';
        document.head.appendChild(soraStyles);

        // Load mobile header styles
        const mobileHeaderStyles = document.createElement('link');
        mobileHeaderStyles.rel = 'stylesheet';
        mobileHeaderStyles.href = basePath + 'optimized/css/includes/mobile-header.min.css';
        document.head.appendChild(mobileHeaderStyles);

        // Load custom header styles
        const headerStyles = document.createElement('link');
        headerStyles.rel = 'stylesheet';
        headerStyles.href = basePath + 'optimized/css/includes/header-styles.min.css';
        document.head.appendChild(headerStyles);

        // Set RTL direction for Arabic
        document.documentElement.dir = 'rtl';

        // Add RTL-specific styles
        const rtlStyles = document.createElement('style');
        rtlStyles.textContent = `
            .nav-menu {
                flex-direction: row-reverse;
            }
            .nav-title {
                margin-right: 0.5rem;
                margin-left: 0;
            }
            .view-toggle-container {
                flex-direction: row-reverse;
            }
        `;
        document.head.appendChild(rtlStyles);
    })();
</script>

<!-- Mobile Menu Script -->
<script>
    // Create dynamic script element to handle path resolution without document.write
    (function() {

        script.src = (window.location.pathname.includes('/features/') ? '../../' : '../') + 'js/mobile-menu.js';
        script.defer = true;
        document.body.appendChild(script);

        // Add view toggle script

        viewToggleScript.defer = true;
        document.body.appendChild(viewToggleScript);

<!-- Script to handle navigation links based on current path -->
<script>
    // Properly set the href attributes based on location
    (function() {
        const basePath = window.location.pathname.includes('/features/') ? '../../' : '';

        // Set logo link to home
        const logoLink = document.getElementById('logoHomeLink');
        if (logoLink) {
            logoLink.setAttribute('href', basePath + 'index.html');
        }

        // Set navigation links
        const navLinks = document.querySelectorAll('.nav-menu a');
        navLinks.forEach(link => {
            const href = link.getAttribute('href');
            if (href && href.startsWith('#')) {
                // Preserve the signup-link class and signup-button span when updating the href
                if (link.classList.contains('signup-link')) {
                    link.setAttribute('href', basePath + 'index.html' + href);
                    // Ensure the signup button is properly styled
                    if (!link.querySelector('.signup-button')) {
                        const text = link.textContent.trim();
                        link.innerHTML = '';
                        const span = document.createElement('span');
                        span.className = 'signup-button';
                        span.textContent = text;
                        link.appendChild(span);
                    }
                } else {
                    link.setAttribute('href', basePath + 'index.html' + href);
                }
            }
        });
    })();
</script>

<!-- Script to load and initialize the language switcher -->
<script>
    (function() {
        // Process data-include elements
        document.querySelectorAll('[data-include]').forEach(element => {
            const filePath = element.getAttribute('data-include');
            if (filePath) {
                const xhr = new XMLHttpRequest();
                xhr.onreadystatechange = function() {
                    if (xhr.readyState === 4) {
                        if (xhr.status === 200) {
                            element.innerHTML = xhr.responseText;

                            // Execute scripts in the included content
                            const scripts = element.querySelectorAll('script');
                            scripts.forEach(script => {
                                const newScript = document.createElement('script');
                                if (script.src) {
                                    newScript.src = script.src;
                                } else {
                                    newScript.textContent = script.textContent;
                                }
                                document.head.appendChild(newScript);
                            });

                            // Initialize language switcher
                            const languageSwitcher = element.querySelector('.language-switcher');
                            if (languageSwitcher) {
                                const toggleButton = languageSwitcher.querySelector('.language-switcher-current');
                                if (toggleButton) {
                                    toggleButton.onclick = function(e) {
                                        e.preventDefault();
                                        e.stopPropagation();
                                        console.log('Language switcher clicked (Arabic header include handler)');
                                        languageSwitcher.classList.toggle('active');
                                    };

                                    // Close dropdown when clicking outside
                                    document.addEventListener('click', function(e) {
                                        if (!languageSwitcher.contains(e.target)) {
                                            languageSwitcher.classList.remove('active');
                                        }
                                    });

                                    // Set the current language based on the HTML lang attribute
                                    const currentLang = document.documentElement.lang || 'ar';
                                    const currentLanguageEl = languageSwitcher.querySelector('.current-language');

                                    if (currentLanguageEl) {
                                        const languageNames = {
                                            'en': 'English',
                                            'es': 'Español',
                                            'fr': 'Français',
                                            'ar': 'العربية'
                                        };

                                        currentLanguageEl.textContent = languageNames[currentLang] || 'العربية';
                                    }
                                }
                            }
                        } else {
                            console.error('Failed to load included file:', filePath);
                        }
                    }
                };
                xhr.open('GET', filePath, true);
                xhr.send();
            }
        });
    })();
</script>
