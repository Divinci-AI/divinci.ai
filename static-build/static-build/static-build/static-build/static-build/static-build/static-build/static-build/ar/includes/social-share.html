<!-- Social Sharing Component -->
<div class="social-share-container" 
     data-share-url="{{share_url}}" 
     data-share-title="{{share_title}}" 
     data-share-text="{{share_text}}"
     data-platforms="twitter,linkedin,facebook,email"
     data-include-copy="true"
     data-heading="Share this page">
    <!-- Content will be populated by social-sharing.js -->
</div>

<!-- Load social sharing styles and script if not already loaded -->
<script>
    (function() {
        // Determine base path
        const basePath = window.location.pathname.includes('/features/') ? '../../' : '';
        
        // Load CSS if not already loaded
        if (!document.querySelector('link[href*="social-sharing.css"]')) {
            const cssLink = document.createElement('link');
            cssLink.rel = 'stylesheet';
            cssLink.href = basePath + 'css/social-sharing.css';
            document.head.appendChild(cssLink);
        }
        
        // Load JS if not already loaded
        if (!document.querySelector('script[src*="social-sharing.js"]')) {
            const script = document.createElement('script');
            script.src = basePath + 'js/social-sharing.js';
            script.defer = true;
            document.body.appendChild(script);
            
            // Initialize after script loads
            script.onload = function() {
                if (window.DivinciSocial && window.DivinciSocial.init) {
                    window.DivinciSocial.init();
                }
            };
        } else {
            // If script already loaded, initialize
            if (window.DivinciSocial && window.DivinciSocial.init) {
                window.DivinciSocial.init();
            }
        }
    })();
</script>
