<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="aiGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#43e97b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#38f9d7;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fa709a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fee140;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="aiGrad4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a18cd1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fbc2eb;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow2">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.1" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>

  <!-- Central AI Core (Workers AI) with pulsing animation -->
  <g>
    <circle cx="400" cy="200" r="55" fill="url(#coreGlow2)" opacity="0.6">
      <animate attributeName="r" values="55;65;55" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.4;0.7;0.4" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="45" fill="none" stroke="#667eea" stroke-width="2.5" opacity="0.7">
      <animate attributeName="r" values="45;50;45" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="400" cy="200" r="35" fill="none" stroke="#667eea" stroke-width="2" opacity="0.5">
      <animate attributeName="r" values="35;38;35" dur="2.5s" repeatCount="indefinite"/>
    </circle>

    <!-- AI brain icon in center -->
    <circle cx="385" cy="195" r="3" fill="white"/>
    <circle cx="415" cy="195" r="3" fill="white"/>
    <path d="M 385 205 Q 400 210 415 205" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  </g>

  <!-- Model Cards with floating animation -->
  <!-- Llama 3 -->
  <g transform="translate(120, 70)">
    <rect width="140" height="90" rx="10" fill="url(#aiGrad1)" opacity="0.95">
      <animate attributeName="y" values="0;-8;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Llama 3</text>
    <text x="70" y="55" text-anchor="middle" fill="white" font-size="12" opacity="0.9">Meta AI</text>
    <circle cx="50" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Mistral -->
  <g transform="translate(540, 70)">
    <rect width="140" height="90" rx="10" fill="url(#aiGrad2)" opacity="0.95">
      <animate attributeName="y" values="0;-8;0" dur="3s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Mistral</text>
    <text x="70" y="55" text-anchor="middle" fill="white" font-size="12" opacity="0.9">Mistral AI</text>
    <circle cx="50" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Gemma -->
  <g transform="translate(120, 240)">
    <rect width="140" height="90" rx="10" fill="url(#aiGrad3)" opacity="0.95">
      <animate attributeName="y" values="0;-8;0" dur="3s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Gemma</text>
    <text x="70" y="55" text-anchor="middle" fill="white" font-size="12" opacity="0.9">Google</text>
    <circle cx="50" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Qwen -->
  <g transform="translate(540, 240)">
    <rect width="140" height="90" rx="10" fill="url(#aiGrad4)" opacity="0.95">
      <animate attributeName="y" values="0;-8;0" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
    <text x="70" y="35" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Qwen</text>
    <text x="70" y="55" text-anchor="middle" fill="white" font-size="12" opacity="0.9">Alibaba</text>
    <circle cx="50" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="70" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </circle>
    <circle cx="90" cy="72" r="4" fill="white" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- Connection lines from models to core with animated flow -->
  <path d="M 260 115 Q 330 155 370 185" stroke="#4facfe" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M 540 115 Q 470 155 430 185" stroke="#43e97b" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" begin="0.5s" repeatCount="indefinite"/>
  </path>
  <path d="M 260 285 Q 330 245 370 215" stroke="#fa709a" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" begin="1s" repeatCount="indefinite"/>
  </path>
  <path d="M 540 285 Q 470 245 430 215" stroke="#a18cd1" stroke-width="2.5" fill="none" opacity="0.5" stroke-dasharray="8,4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" begin="1.5s" repeatCount="indefinite"/>
  </path>

  <!-- Data particles flowing -->
  <circle r="4" fill="#4facfe">
    <animateMotion path="M 260 115 Q 330 155 370 185" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#43e97b">
    <animateMotion path="M 540 115 Q 470 155 430 185" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#fa709a">
    <animateMotion path="M 260 285 Q 330 245 370 215" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle r="4" fill="#a18cd1">
    <animateMotion path="M 540 285 Q 470 245 430 215" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
  </circle>

  <!-- Title and subtitle -->
  <text x="400" y="35" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">Workers AI - Open Source Models</text>
  <text x="400" y="388" text-anchor="middle" fill="#718096" font-size="15">Access cutting-edge LLMs from Hugging Face at the edge</text>
</svg>
