<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .scenario-title { font-family: 'Georgia', serif; font-size: 32px; font-weight: bold; fill: #2d3c34; }
      .scenario-subtitle { font-family: 'Georgia', serif; font-size: 15px; fill: #5a6b5f; font-style: italic; }
      .column-title { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: 700; fill: white; }
      .amount-big { font-family: 'Arial', sans-serif; font-size: 28px; font-weight: 700; }
      .section-label { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: 600; fill: #2d3c34; }
      .detail-text { font-family: 'Arial', sans-serif; font-size: 14px; fill: #2d3c34; }
      .total-label { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: 700; fill: white; }
    </style>
    <linearGradient id="conservative-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="moderate-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="progressive-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>

  <text x="700" y="40" text-anchor="middle" class="scenario-title">Three Pathways to Universal Basic Income by 2035</text>
  <text x="700" y="70" text-anchor="middle" class="scenario-subtitle">Flexible funding scenarios based on political constraints and technology adoption rates</text>

  <g id="scenario-a">
    <rect x="50" y="120" width="400" height="620" rx="12" fill="url(#conservative-grad)" opacity="0.15"/>
    <rect x="70" y="140" width="360" height="50" rx="8" fill="url(#conservative-grad)"/>
    <text x="250" y="172" text-anchor="middle" class="column-title">SCENARIO A: Conservative</text>
    <text x="250" y="220" text-anchor="middle" class="amount-big" style="fill: #e67e22;">$600-800/month</text>
    <text x="250" y="245" text-anchor="middle" class="detail-text" style="font-weight: 600;">15% defense reduction</text>
    <rect x="80" y="270" width="340" height="180" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
    <text x="250" y="295" text-anchor="middle" class="section-label" style="fill: #e67e22;">FUNDING SOURCES</text>
    <text x="95" y="320" class="detail-text">• Defense: $315B</text>
    <text x="95" y="340" class="detail-text">• Bureaucracy reduction (30%): $225B</text>
    <text x="95" y="360" class="detail-text">• Welfare consolidation: $600B</text>
    <text x="95" y="380" class="detail-text">• Bitcoin reserve: $200B annually</text>
    <text x="95" y="400" class="detail-text">• Proof-of-useful-work: $150B</text>
    <rect x="95" y="415" width="310" height="25" fill="#f39c12" rx="4"/>
    <text x="250" y="433" text-anchor="middle" class="section-label" style="fill: white;">Total: $1.49 trillion</text>
    <rect x="80" y="465" width="340" height="140" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
    <text x="250" y="490" text-anchor="middle" class="section-label" style="fill: #e67e22;">TECHNOLOGY SAVINGS</text>
    <text x="95" y="515" class="detail-text">• Fusion energy: $300-400/mo</text>
    <text x="95" y="535" class="detail-text">• Solarpunk living: $450-700/mo</text>
    <text x="95" y="555" class="detail-text">• Robot housing (5% adoption): $100-150/mo</text>
    <rect x="95" y="570" width="310" height="25" fill="#f39c12" rx="4"/>
    <text x="250" y="588" text-anchor="middle" class="section-label" style="fill: white;">Cost reduction: $850-1,250/mo</text>
    <rect x="80" y="625" width="340" height="100" rx="8" fill="#e67e22"/>
    <text x="250" y="655" text-anchor="middle" class="total-label" style="font-size: 13px;">TOTAL MONTHLY VALUE</text>
    <text x="250" y="690" text-anchor="middle" class="total-label" style="font-size: 32px;">$1,450-2,050</text>
    <text x="250" y="715" text-anchor="middle" class="detail-text" style="fill: white; opacity: 0.9;">Cash + Cost Reductions</text>
  </g>

  <g id="scenario-b">
    <rect x="500" y="120" width="400" height="620" rx="12" fill="url(#moderate-grad)" opacity="0.15"/>
    <rect x="520" y="140" width="360" height="50" rx="8" fill="url(#moderate-grad)"/>
    <text x="700" y="172" text-anchor="middle" class="column-title">SCENARIO B: Moderate</text>
    <text x="700" y="220" text-anchor="middle" class="amount-big" style="fill: #2980b9;">$1,200-1,500/month</text>
    <text x="700" y="245" text-anchor="middle" class="detail-text" style="font-weight: 600;">40% defense reduction</text>
    <rect x="530" y="270" width="340" height="180" rx="6" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="700" y="295" text-anchor="middle" class="section-label" style="fill: #2980b9;">FUNDING SOURCES</text>
    <text x="545" y="320" class="detail-text">• Defense: $840B</text>
    <text x="545" y="340" class="detail-text">• Bureaucracy reduction (45%): $385B</text>
    <text x="545" y="360" class="detail-text">• Welfare consolidation: $600B</text>
    <text x="545" y="380" class="detail-text">• Bitcoin reserve: $800B annually</text>
    <text x="545" y="400" class="detail-text">• Proof-of-useful-work: $350B</text>
    <rect x="545" y="415" width="310" height="25" fill="#3498db" rx="4"/>
    <text x="700" y="433" text-anchor="middle" class="section-label" style="fill: white;">Total: $2.975 trillion</text>
    <rect x="530" y="465" width="340" height="140" rx="6" fill="#fff" stroke="#3498db" stroke-width="2"/>
    <text x="700" y="490" text-anchor="middle" class="section-label" style="fill: #2980b9;">TECHNOLOGY SAVINGS</text>
    <text x="545" y="515" class="detail-text">• Fusion energy: $350-450/mo</text>
    <text x="545" y="535" class="detail-text">• Solarpunk living: $750-1,100/mo</text>
    <text x="545" y="555" class="detail-text">• Robot housing (25% adoption): $250-350/mo</text>
    <rect x="545" y="570" width="310" height="25" fill="#3498db" rx="4"/>
    <text x="700" y="588" text-anchor="middle" class="section-label" style="fill: white;">Cost reduction: $1,350-1,900/mo</text>
    <rect x="530" y="625" width="340" height="100" rx="8" fill="#2980b9"/>
    <text x="700" y="655" text-anchor="middle" class="total-label" style="font-size: 13px;">TOTAL MONTHLY VALUE</text>
    <text x="700" y="690" text-anchor="middle" class="total-label" style="font-size: 32px;">$2,550-3,400</text>
    <text x="700" y="715" text-anchor="middle" class="detail-text" style="fill: white; opacity: 0.9;">Cash + Cost Reductions</text>
  </g>

  <g id="scenario-c">
    <rect x="950" y="120" width="400" height="620" rx="12" fill="url(#progressive-grad)" opacity="0.15"/>
    <rect x="970" y="140" width="360" height="50" rx="8" fill="url(#progressive-grad)"/>
    <text x="1150" y="172" text-anchor="middle" class="column-title">SCENARIO C: Progressive</text>
    <text x="1150" y="220" text-anchor="middle" class="amount-big" style="fill: #229954;">$1,800-2,000/month</text>
    <text x="1150" y="245" text-anchor="middle" class="detail-text" style="font-weight: 600;">60% defense reduction</text>
    <rect x="980" y="270" width="340" height="180" rx="6" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <text x="1150" y="295" text-anchor="middle" class="section-label" style="fill: #229954;">FUNDING SOURCES</text>
    <text x="995" y="320" class="detail-text">• Defense: $1.26T</text>
    <text x="995" y="340" class="detail-text">• Bureaucracy reduction (55%): $475B</text>
    <text x="995" y="360" class="detail-text">• Welfare consolidation: $600B</text>
    <text x="995" y="380" class="detail-text">• Bitcoin reserve: $1.5T annually</text>
    <text x="995" y="400" class="detail-text">• Proof-of-useful-work: $500B</text>
    <rect x="995" y="415" width="310" height="25" fill="#27ae60" rx="4"/>
    <text x="1150" y="433" text-anchor="middle" class="section-label" style="fill: white;">Total: $4.335 trillion</text>
    <rect x="980" y="465" width="340" height="140" rx="6" fill="#fff" stroke="#27ae60" stroke-width="2"/>
    <text x="1150" y="490" text-anchor="middle" class="section-label" style="fill: #229954;">TECHNOLOGY SAVINGS</text>
    <text x="995" y="515" class="detail-text">• Fusion energy: $400-500/mo</text>
    <text x="995" y="535" class="detail-text">• Solarpunk living: $1,050-1,400/mo</text>
    <text x="995" y="555" class="detail-text">• Robot housing (50% adoption): $350-500/mo</text>
    <rect x="995" y="570" width="310" height="25" fill="#27ae60" rx="4"/>
    <text x="1150" y="588" text-anchor="middle" class="section-label" style="fill: white;">Cost reduction: $1,800-2,400/mo</text>
    <rect x="980" y="625" width="340" height="100" rx="8" fill="#229954"/>
    <text x="1150" y="655" text-anchor="middle" class="total-label" style="font-size: 13px;">TOTAL MONTHLY VALUE</text>
    <text x="1150" y="690" text-anchor="middle" class="total-label" style="font-size: 32px;">$3,600-4,400</text>
    <text x="1150" y="715" text-anchor="middle" class="detail-text" style="fill: white; opacity: 0.9;">Cash + Cost Reductions</text>
  </g>

  <text x="700" y="780" text-anchor="middle" class="detail-text" style="font-size: 10px; opacity: 0.6;">
    All scenarios integrate fusion energy, AI automation, robotic construction, and distributed computing. Technology adoption rates vary by scenario timeline.
  </text>
</svg>
