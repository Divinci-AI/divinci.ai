<?xml version="1.0" encoding="UTF-8"?>
<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    .robot-body {
      fill: white;
    }
    .robot-eyes {
      fill: #0a192f;
    }
    #divinci-robot {
      transform: scale(0.9);
      transform-origin: center;
    }
    
    /* Animation definitions */
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.05); }
    }
    
    @keyframes blink {
      0%, 95%, 100% { transform: scaleY(1); }
      97.5% { transform: scaleY(0.1); }
    }
    
    @keyframes antenna-wave {
      0%, 100% { transform: rotate(0deg); }
      25% { transform: rotate(-5deg); }
      75% { transform: rotate(5deg); }
    }
    
    /* Active animations */
    #heart {
      animation: pulse 2s infinite;
      transform-origin: center;
    }
    
    #left-eye, #right-eye {
      animation: blink 4s infinite;
      transform-origin: center;
    }
    
    #left-antenna {
      animation: antenna-wave 3s infinite;
      transform-origin: bottom center;
    }
    
    #right-antenna {
      animation: antenna-wave 3s infinite 0.5s;
      transform-origin: bottom center;
    }
  </style>
  
  <g id="divinci-robot">
    <!-- Head section -->
    <g id="head">
      <!-- Head base with rounded bottom corners -->
      <path id="head-base" class="robot-body" d="M70,40 h60 v30 q0,10 -10,10 h-40 q-10,0 -10,-10 z"/>
      
      <!-- Antennas -->
      <g id="antennas">
        <!-- Left antenna -->
        <g id="left-antenna">
          <circle class="robot-body" cx="85" cy="25" r="7"/>
          <rect class="robot-body" x="83" y="25" width="4" height="15"/>
        </g>
        
        <!-- Right antenna -->
        <g id="right-antenna">
          <circle class="robot-body" cx="115" cy="25" r="7"/>
          <rect class="robot-body" x="113" y="25" width="4" height="15"/>
        </g>
      </g>
      
      <!-- Eyes -->
      <circle id="left-eye" class="robot-eyes" cx="85" cy="60" r="6"/>
      <circle id="right-eye" class="robot-eyes" cx="115" cy="60" r="6"/>
    </g>
    
    <!-- Body section -->
    <g id="body">
      <!-- Arms -->
      <g id="arms">
        <!-- Left arm -->
        <g id="left-arm">
          <rect class="robot-body" x="55" y="100" width="10" height="30"/>
          <circle class="robot-body" cx="60" cy="140" r="5"/>
          <path class="robot-body" d="M55,130 h10 v15 q0,5 -5,5 q-5,0 -5,-5 z"/>
        </g>
        
        <!-- Right arm -->
        <g id="right-arm">
          <rect class="robot-body" x="135" y="100" width="10" height="30"/>
          <circle class="robot-body" cx="140" cy="140" r="5"/>
          <path class="robot-body" d="M135,130 h10 v15 q0,5 -5,5 q-5,0 -5,-5 z"/>
        </g>
      </g>
      
      <!-- Heart -->
      <path id="heart" class="robot-body" d="M100,115 c-12,-12 -25,-8 -25,7 c0,12 12,20 25,30 c13,-10 25,-18 25,-30 c0,-15 -13,-19 -25,-7 z"/>
    </g>
  </g>
</svg>
