<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .flow-title { font-family: 'Georgia', serif; font-size: 28px; font-weight: bold; fill: #2d3c34; }
      .flow-subtitle { font-family: 'Georgia', serif; font-size: 14px; fill: #5a6b5f; font-style: italic; }
      .step-title { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 700; fill: #2d3c34; }
      .step-label { font-family: 'Arial', sans-serif; font-size: 13px; fill: #2d3c34; }
      .savings-label { font-family: 'Arial', sans-serif; font-size: 12px; fill: #27ae60; font-weight: 600; }
      .cost-label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #666; }
    </style>
    <linearGradient id="factory-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="transport-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="assembly-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="finish-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="flow-title">Robotic Construction: From Factory to Home in 72 Hours</text>
  <text x="600" y="65" text-anchor="middle" class="flow-subtitle">How automation and prefabrication reduce housing costs by 30-40%</text>

  <!-- Step 1: Prefabrication Factory -->
  <g id="step1">
    <rect x="50" y="120" width="260" height="180" rx="10" fill="url(#factory-grad)" opacity="0.2"/>
    <rect x="60" y="130" width="240" height="40" rx="6" fill="url(#factory-grad)"/>
    <text x="180" y="156" text-anchor="middle" class="step-title" style="fill: white;">1. Prefabrication Factory</text>

    <!-- Factory details -->
    <text x="75" y="195" class="step-label">🏭 AI-designed modular panels</text>
    <text x="75" y="218" class="step-label">🤖 Robot welding &amp; assembly (24/7)</text>
    <text x="75" y="241" class="step-label">📐 Precision: ±1mm tolerance</text>
    <text x="75" y="264" class="step-label">⚡ Zero waste optimization</text>

    <text x="180" y="288" text-anchor="middle" class="savings-label">30% labor cost reduction</text>
  </g>

  <!-- Arrow 1 -->
  <g>
    <path d="M 330 210 L 390 210" stroke="#2d3c34" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="360" y="198" text-anchor="middle" class="cost-label">Day 1</text>
  </g>

  <!-- Step 2: Automated Transport -->
  <g id="step2">
    <rect x="410" y="120" width="260" height="180" rx="10" fill="url(#transport-grad)" opacity="0.2"/>
    <rect x="420" y="130" width="240" height="40" rx="6" fill="url(#transport-grad)"/>
    <text x="540" y="156" text-anchor="middle" class="step-title" style="fill: white;">2. Smart Logistics</text>

    <!-- Transport details -->
    <text x="435" y="195" class="step-label">🚚 AI route optimization</text>
    <text x="435" y="218" class="step-label">📦 Just-in-time delivery</text>
    <text x="435" y="241" class="step-label">🛰️ Real-time tracking</text>
    <text x="435" y="264" class="step-label">🔄 Returnable transport frames</text>

    <text x="540" y="288" text-anchor="middle" class="savings-label">15% logistics cost reduction</text>
  </g>

  <!-- Arrow 2 -->
  <g>
    <path d="M 690 210 L 750 210" stroke="#2d3c34" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="720" y="198" text-anchor="middle" class="cost-label">Day 2</text>
  </g>

  <!-- Step 3: Robotic Assembly -->
  <g id="step3">
    <rect x="770" y="120" width="380" height="180" rx="10" fill="url(#assembly-grad)" opacity="0.2"/>
    <rect x="780" y="130" width="360" height="40" rx="6" fill="url(#assembly-grad)"/>
    <text x="960" y="156" text-anchor="middle" class="step-title" style="fill: white;">3. On-Site Robot Assembly</text>

    <!-- Assembly details -->
    <g>
      <text x="795" y="195" class="step-label">🏗️ Foundation robots (8 hours)</text>
      <text x="795" y="218" class="step-label">🔩 Panel installation (24 hours)</text>
      <text x="795" y="241" class="step-label">🔌 Electrical/plumbing bots (16 hours)</text>
      <text x="795" y="264" class="step-label">🎯 Quality AI inspection</text>
    </g>

    <text x="960" y="288" text-anchor="middle" class="savings-label">40% on-site labor reduction</text>
  </g>

  <!-- Vertical arrow down to Step 4 -->
  <g>
    <path d="M 960 320 L 960 380" stroke="#2d3c34" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
    <text x="985" y="355" class="cost-label">Day 3</text>
  </g>

  <!-- Step 4: Final Finishing -->
  <g id="step4">
    <rect x="770" y="400" width="380" height="180" rx="10" fill="url(#finish-grad)" opacity="0.2"/>
    <rect x="780" y="410" width="360" height="40" rx="6" fill="url(#finish-grad)"/>
    <text x="960" y="436" text-anchor="middle" class="step-title" style="fill: white;">4. Finishing &amp; Inspection</text>

    <!-- Finishing details -->
    <text x="795" y="475" class="step-label">🎨 Automated painting/coating</text>
    <text x="795" y="498" class="step-label">🪟 Window/door installation</text>
    <text x="795" y="521" class="step-label">🔍 AI structural verification</text>
    <text x="795" y="544" class="step-label">✅ Move-in ready certification</text>

    <text x="960" y="568" text-anchor="middle" class="savings-label">20% finishing cost reduction</text>
  </g>

  <!-- Traditional vs Robotic Comparison Box -->
  <g id="comparison">
    <rect x="50" y="340" width="680" height="240" rx="10" fill="#f9f9f9" stroke="#2d3c34" stroke-width="2"/>

    <!-- Traditional column -->
    <rect x="70" y="360" width="300" height="200" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="220" y="385" text-anchor="middle" class="step-title" style="fill: #c0392b;">Traditional Construction</text>

    <text x="85" y="415" class="step-label">⏱️ Timeline: 6-12 months</text>
    <text x="85" y="438" class="step-label">👷 Labor: 15-30 workers</text>
    <text x="85" y="461" class="step-label">💰 Cost: $300,000-400,000</text>
    <text x="85" y="484" class="step-label">📊 Waste: 15-25% materials</text>
    <text x="85" y="507" class="step-label">🌧️ Weather delays: 4-8 weeks</text>
    <text x="85" y="530" class="step-label">⚠️ Quality variance: High</text>

    <!-- Robotic column -->
    <rect x="410" y="360" width="300" height="200" rx="6" fill="#e8f5e9" stroke="#27ae60" stroke-width="2"/>
    <text x="560" y="385" text-anchor="middle" class="step-title" style="fill: #27ae60;">Robotic Construction</text>

    <text x="425" y="415" class="step-label">⏱️ Timeline: 72 hours (3 days)</text>
    <text x="425" y="438" class="step-label">👷 Labor: 3-5 supervisors</text>
    <text x="425" y="461" class="step-label">💰 Cost: $180,000-240,000</text>
    <text x="425" y="484" class="step-label">📊 Waste: &lt;2% materials</text>
    <text x="425" y="507" class="step-label">🌧️ Weather delays: Minimal</text>
    <text x="425" y="530" class="step-label">⚠️ Quality variance: ±1mm precision</text>
  </g>

  <!-- Cost Savings Breakdown -->
  <g id="savings-breakdown">
    <rect x="50" y="630" width="1100" height="220" rx="10" fill="#f0f9f4" stroke="#27ae60" stroke-width="3"/>
    <text x="600" y="665" text-anchor="middle" class="step-title" style="fill: #27ae60; font-size: 22px;">Total Cost Savings Breakdown</text>

    <!-- Savings items -->
    <g>
      <rect x="80" y="690" width="330" height="70" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
      <text x="95" y="715" class="step-label" style="font-weight: 600;">Labor Cost Reduction</text>
      <text x="95" y="735" class="cost-label">Robots work 24/7, no overtime, benefits, insurance</text>
      <text x="395" y="725" text-anchor="end" class="savings-label" style="font-size: 18px;">-35%</text>
    </g>

    <g>
      <rect x="440" y="690" width="330" height="70" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
      <text x="455" y="715" class="step-label" style="font-weight: 600;">Material Efficiency</text>
      <text x="455" y="735" class="cost-label">Precision cutting, zero waste, bulk purchasing</text>
      <text x="755" y="725" text-anchor="end" class="savings-label" style="font-size: 18px;">-18%</text>
    </g>

    <g>
      <rect x="800" y="690" width="330" height="70" rx="6" fill="white" stroke="#ddd" stroke-width="1"/>
      <text x="815" y="715" class="step-label" style="font-weight: 600;">Time Savings</text>
      <text x="815" y="735" class="cost-label">3 days vs 6 months = lower financing costs</text>
      <text x="1115" y="725" text-anchor="end" class="savings-label" style="font-size: 18px;">-12%</text>
    </g>

    <!-- Total -->
    <rect x="80" y="780" width="1050" height="50" rx="8" fill="#27ae60"/>
    <text x="600" y="810" text-anchor="middle" class="step-title" style="fill: white; font-size: 24px;">TOTAL HOUSING COST REDUCTION: 30-40%</text>
  </g>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2d3c34" />
    </marker>
  </defs>

  <!-- Bottom note -->
  <text x="600" y="880" text-anchor="middle" class="cost-label" style="font-size: 11px; opacity: 0.7;">
    Real-world examples: Mighty Buildings (Oakland), Icon 3D printing (Texas), Blokable (Washington). Timeline based on current robotic construction demonstrations.
  </text>
</svg>
