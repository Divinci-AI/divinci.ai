<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .job-title { font-family: 'Georgia', serif; font-size: 24px; font-weight: bold; fill: #2d3c34; }
      .job-label { font-family: 'Arial', sans-serif; font-size: 13px; fill: #2d3c34; }
      .job-value { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; fill: #2d3c34; }
      .job-small { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3c34; opacity: 0.8; }
      .job-flow { transition: opacity 0.3s ease; }
      .job-flow:hover { opacity: 0.8; }
    </style>

    <!-- Gradient for flow -->
    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ffb8b8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#b8e6b8;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="30" text-anchor="middle" class="job-title">Automation: Job Displacement vs Creation (by 2030)</text>
  <text x="400" y="55" text-anchor="middle" class="job-small" style="font-size: 12px;">The employment landscape is shifting, not disappearing</text>

  <!-- Left side: Jobs Displaced -->
  <g>
    <rect x="50" y="100" width="200" height="300" fill="#ffb8b8" stroke="#2d3c34" stroke-width="2" rx="8" opacity="0.3"/>
    <text x="150" y="130" text-anchor="middle" class="job-label" style="font-weight: bold; font-size: 16px;">Jobs Displaced</text>
    <text x="150" y="160" text-anchor="middle" class="job-value" style="font-size: 32px; fill: #d32f2f;">92M</text>
    <text x="150" y="185" text-anchor="middle" class="job-small">Automation &amp; AI</text>

    <!-- Displaced job types -->
    <text x="60" y="220" class="job-small" style="font-size: 11px;">• Routine manufacturing</text>
    <text x="60" y="240" class="job-small" style="font-size: 11px;">• Data entry</text>
    <text x="60" y="260" class="job-small" style="font-size: 11px;">• Basic customer service</text>
    <text x="60" y="280" class="job-small" style="font-size: 11px;">• Repetitive office work</text>
    <text x="60" y="300" class="job-small" style="font-size: 11px;">• Some transportation</text>

    <!-- Percentage note -->
    <text x="150" y="360" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #d32f2f;">14% of global</text>
    <text x="150" y="378" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #d32f2f;">workforce affected</text>
  </g>

  <!-- Center: Transition Flows -->
  <g class="job-flow">
    <!-- Healthcare flow -->
    <path d="M 250 200 L 550 180" stroke="#b8e6b8" stroke-width="60" opacity="0.4"/>
    <text x="400" y="175" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #2d3c34;">Healthcare +30%</text>

    <!-- STEM flow -->
    <path d="M 250 250 L 550 230" stroke="#cfdcff" stroke-width="50" opacity="0.4"/>
    <text x="400" y="240" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #2d3c34;">STEM +29%</text>

    <!-- Creative/Social flow -->
    <path d="M 250 300 L 550 280" stroke="#e6b8ff" stroke-width="30" opacity="0.4"/>
    <text x="400" y="295" text-anchor="middle" class="job-label" style="font-size: 11px; fill: #2d3c34;">Social/Emotional +14%</text>

    <!-- Other new jobs flow -->
    <path d="M 250 350 L 550 330" stroke="#f9d689" stroke-width="40" opacity="0.4"/>
    <text x="400" y="345" text-anchor="middle" class="job-label" style="font-size: 11px; fill: #2d3c34;">Other emerging roles</text>
  </g>

  <!-- Right side: Jobs Created -->
  <g>
    <rect x="550" y="100" width="200" height="300" fill="#b8e6b8" stroke="#2d3c34" stroke-width="2" rx="8" opacity="0.3"/>
    <text x="650" y="130" text-anchor="middle" class="job-label" style="font-weight: bold; font-size: 16px;">Jobs Created</text>
    <text x="650" y="160" text-anchor="middle" class="job-value" style="font-size: 32px; fill: #2e7d32;">170M</text>
    <text x="650" y="185" text-anchor="middle" class="job-small">New opportunities</text>

    <!-- Created job types -->
    <text x="560" y="220" class="job-small" style="font-size: 11px;">• Healthcare professionals</text>
    <text x="560" y="240" class="job-small" style="font-size: 11px;">• AI/robotics engineers</text>
    <text x="560" y="260" class="job-small" style="font-size: 11px;">• Creative &amp; strategic roles</text>
    <text x="560" y="280" class="job-small" style="font-size: 11px;">• Care &amp; social work</text>
    <text x="560" y="300" class="job-small" style="font-size: 11px;">• Green energy jobs</text>
    <text x="560" y="320" class="job-small" style="font-size: 11px;">• Human-AI collaboration</text>

    <!-- Percentage note -->
    <text x="650" y="360" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #2e7d32;">Net gain of</text>
    <text x="650" y="378" text-anchor="middle" class="job-label" style="font-size: 12px; fill: #2e7d32;">78 million jobs</text>
  </g>

  <!-- Net Result Box -->
  <rect x="250" y="420" width="300" height="60" fill="#fff3e0" stroke="#8b7659" stroke-width="3" rx="8"/>
  <text x="400" y="445" text-anchor="middle" class="job-label" style="font-weight: bold; font-size: 14px;">UBI Enables The Transition</text>
  <text x="400" y="465" text-anchor="middle" class="job-small">Safety net for career changes, education &amp; entrepreneurship</text>

  <!-- Source note -->
  <text x="400" y="495" text-anchor="middle" class="job-small" style="font-size: 10px; opacity: 0.6;">Source: World Economic Forum, McKinsey Global Institute</text>
</svg>
