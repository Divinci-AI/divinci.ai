name: Style Guide Validation

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allow manual triggering
  workflow_dispatch:

jobs:
  style-guide-validation:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: |
        npm ci
        npx playwright install --with-deps
        
    - name: Build site
      run: |
        # Install Zola
        wget -q https://github.com/getzola/zola/releases/download/v0.17.2/zola-v0.17.2-x86_64-unknown-linux-gnu.tar.gz
        tar -xzf zola-v0.17.2-x86_64-unknown-linux-gnu.tar.gz
        sudo mv zola /usr/local/bin/
        
        # Build the site
        zola build
        
    - name: Run static style guide validation
      run: npm run style:validate
      
    - name: Start development server
      run: |
        npx serve public -l 3000 &
        sleep 5
      
    - name: Run style guide browser tests
      run: npm run style:test
      
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: style-guide-test-results
        path: |
          test-results/
          playwright-report/
        retention-days: 30
        
    - name: Comment PR with style guide results
      if: github.event_name == 'pull_request' && failure()
      uses: actions/github-script@v7
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          let comment = '## 🎨 Style Guide Validation Failed\n\n';
          comment += 'Your changes do not comply with the Divinci AI style guide. ';
          comment += 'Please review the following issues:\n\n';
          
          // Check if validation script output exists
          try {
            const validationOutput = fs.readFileSync('style-validation-output.txt', 'utf8');
            comment += '### Static Analysis Results\n```\n' + validationOutput + '\n```\n\n';
          } catch (e) {
            comment += '### Static Analysis\nRun `npm run style:validate` locally for detailed results.\n\n';
          }
          
          comment += '### How to Fix\n';
          comment += '1. Run `npm run style:validate` locally to see detailed violations\n';
          comment += '2. Replace any forbidden colors with approved ones:\n';
          comment += '   - `#16214c` → `#1e3a2b` (headings)\n';
          comment += '   - `#254284` → `#2d3c34` (text)\n';
          comment += '3. Use approved fonts: `Fraunces` for headings, `Source Sans 3` for body text\n';
          comment += '4. Run `npm run style:check` to verify fixes\n\n';
          comment += '### Approved Color Palette\n';
          comment += '- Background: `#f8f4f0` (tan/beige)\n';
          comment += '- Primary Text: `#2d3c34` (dark blue-green)\n';
          comment += '- Headings: `#1e3a2b` (darker blue-green)\n';
          comment += '- Secondary Text: `#7e8d95` (muted blue-gray)\n\n';
          comment += 'See the full style guide in `scripts/validate-style-guide.js` for complete details.';
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: comment
          });

  style-guide-enforcement:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js  
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm ci
      
    - name: Check for forbidden colors in changed files
      run: |
        # Get list of changed files
        git fetch origin ${{ github.base_ref }}
        CHANGED_FILES=$(git diff --name-only origin/${{ github.base_ref }}...HEAD -- '*.md' '*.html' '*.css' | grep -E '\.(md|html|css)$' || true)
        
        if [ -n "$CHANGED_FILES" ]; then
          echo "Checking changed files for forbidden colors..."
          echo "$CHANGED_FILES"
          
          # Check for forbidden colors
          VIOLATIONS=$(echo "$CHANGED_FILES" | xargs grep -l "#16214c\|#254284" || true)
          
          if [ -n "$VIOLATIONS" ]; then
            echo "❌ Forbidden colors found in the following files:"
            echo "$VIOLATIONS"
            echo ""
            echo "Please replace:"
            echo "  #16214c → #1e3a2b"
            echo "  #254284 → #2d3c34"
            exit 1
          else
            echo "✅ No forbidden colors found in changed files"
          fi
        else
          echo "No relevant files changed"
        fi
        
    - name: Validate style guide compliance
      run: |
        echo "Running full style guide validation..."
        npm run style:validate 2>&1 | tee style-validation-output.txt
        
        # Check exit code
        if [ ${PIPESTATUS[0]} -ne 0 ]; then
          echo "Style guide validation failed!"
          exit 1
        fi