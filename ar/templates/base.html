<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">

    <!-- Hreflang tags for language alternatives -->
    <link rel="alternate" href="https://divinci.ai/templates/base.html" hreflang="x-default" />
    <link rel="alternate" href="https://divinci.ai/templates/base.html" hreflang="en" />
    <link rel="alternate" href="https://divinci.ai/es/templates/base.html" hreflang="es" />
    <link rel="alternate" href="https://divinci.ai/fr/templates/base.html" hreflang="fr" />
    <link rel="alternate" href="https://divinci.ai/ar/templates/base.html" hreflang="ar" />

    <!-- Hreflang tags for language alternatives -->
    <link rel="alternate" href="https://divinci.ai/templates/base.html" hreflang="x-default" />
    <link rel="alternate" href="https://divinci.ai/templates/base.html" hreflang="en" />
    <link rel="alternate" href="https://divinci.ai/es/templates/base.html" hreflang="es" />
    <link rel="alternate" href="https://divinci.ai/fr/templates/base.html" hreflang="fr" />
    <link rel="alternate" href="https://divinci.ai/ar/templates/base.html" hreflang="ar" />
    <meta name="description" content="{% block description %}Divinci AI - Empowering human-AI collaboration{% endblock %}">

    <title>{% block title %}Divinci AI{% endblock %} - العربية</title>

    <!-- Favicons and App Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="..//apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="..//images/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="..//images/favicon-16x16.png">

    <!-- Stylesheets -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Sora:wght@100;200;300;400;500;600;700;800&display=swap" as="style">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bulma@0.9.4/css/bulma.min.css">
    <link rel="stylesheet" href="..//assets/css/fonts.css">
    <link rel="stylesheet" href="..//assets/css/sora-styles.css">
    <link rel="stylesheet" href="..//styles.css">
    <link rel="stylesheet" href="..//styles-footer.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="..//assets/css/enhanced-accessibility.css">

    {% block extra_css %}{% endblock %}

    <!-- Additional head content -->
    {% block extra_head %}{% endblock %}
    <!-- Set default language -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.i18n && window.i18n.changeLanguage) {
                window.i18n.changeLanguage('ar');
            }
        });
    </script>
</head>
<body>
    <!-- Skip to content link for keyboard users -->
    <div class="skip-links">
        <a href="#main-content" class="skip-link">Skip to main content</a>
    </div>

    <!-- Header -->
    {% include "partials/header.html" %}

    <!-- Main Content -->
    <main id="main-content" role="main" tabindex="-1">
        {% block content %}{% endblock %}
    </main>

    <!-- Footer -->
    {% include "partials/footer.html" %}

    <!-- Core scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>
    <script src="..//js/keyboard-navigation.js" defer></script>
    <script src="..//js/apply-sora-to-divinci.js" defer></script>
    <script src="..//js/enhanced-accessibility.js" defer></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
