<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": "Divinci AI",
  "url": "https://divinci.ai",
  "potentialAction": {
    "@type": "SearchAction",
    "target": "https://divinci.ai/search?q={search_term_string}",
    "query-input": "required name=search_term_string"
  },
  "inLanguage": ["en", "es", "fr", "ar"]
}
</script>

<!-- Page-specific structured data will be added dynamically -->
<script>
    /**
     * Add structured data for the current page
     * @param {Object} pageData - Data for the current page
     */
    function addStructuredData(pageData) {
        // Default to WebPage if no type specified
        const type = pageData.type || 'WebPage';

        // Create structured data object
        const structuredData = {
            "@context": "https://schema.org",
            "@type": type,
            "name": pageData.title || document.title,
            "description": pageData.description || "",
            "url": pageData.url || window.location.href
        };

        // Add image if available
        if (pageData.image) {
            structuredData.image = pageData.image.startsWith('http')
                ? pageData.image
                : `https://divinci.ai/images/social/${pageData.image}`;
        }

        // Add additional fields based on type
        if (type === 'Article') {
            structuredData.headline = pageData.title || document.title;
            structuredData.datePublished = pageData.datePublished || "";
            structuredData.dateModified = pageData.dateModified || pageData.datePublished || "";

            // Add author if available
            if (pageData.author) {
                structuredData.author = {
                    "@type": "Person",
                    "name": pageData.author
                };
            }

            // Add publisher
            structuredData.publisher = {
                "@type": "Organization",
                "name": "Divinci AI",
                "logo": {
                    "@type": "ImageObject",
                    "url": "https://divinci.ai/images/divinci_logo.png"
                }
            };
        } else if (type === 'Product') {
            // Add product-specific fields
            if (pageData.brand) {
                structuredData.brand = {
                    "@type": "Brand",
                    "name": pageData.brand
                };
            }

            if (pageData.offers) {
                structuredData.offers = {
                    "@type": "Offer",
                    "price": pageData.offers.price || "0",
                    "priceCurrency": pageData.offers.currency || "USD",
                    "availability": pageData.offers.availability || "https://schema.org/InStock"
                };
            }

            if (pageData.features) {
                structuredData.features = pageData.features;
            }
        } else if (type === 'FAQPage') {
            // Add FAQ-specific fields
            if (pageData.faqs && Array.isArray(pageData.faqs)) {
                structuredData.mainEntity = pageData.faqs.map(faq => ({
                    "@type": "Question",
                    "name": faq.question,
                    "acceptedAnswer": {
                        "@type": "Answer",
                        "text": faq.answer
                    }
                }));
            }
        } else if (type === 'BreadcrumbList') {
            // Add breadcrumb-specific fields
            if (pageData.breadcrumbs && Array.isArray(pageData.breadcrumbs)) {
                structuredData.itemListElement = pageData.breadcrumbs.map((item, index) => ({
                    "@type": "ListItem",
                    "position": index + 1,
                    "name": item.name,
                    "item": item.url
                }));
            }
        } else if (type === 'HowTo') {
            // Add HowTo-specific fields
            structuredData.totalTime = pageData.totalTime || "PT30M";

            if (pageData.steps && Array.isArray(pageData.steps)) {
                structuredData.step = pageData.steps.map((step, index) => ({
                    "@type": "HowToStep",
                    "position": index + 1,
                    "name": step.name,
                    "text": step.text,
                    "url": step.url || window.location.href + `#step${index + 1}`
                }));
            }
        }

        // Add language information
        if (pageData.language) {
            structuredData.inLanguage = pageData.language;
        } else {
            const htmlLang = document.documentElement.lang;
            if (htmlLang) {
                structuredData.inLanguage = htmlLang;
            }
        }

        // Add the structured data to the page
        const script = document.createElement('script');
        script.type = 'application/ld+json';
        script.textContent = JSON.stringify(structuredData);
        document.head.appendChild(script);
    }

    /**
     * Add breadcrumb structured data
     * @param {Array} breadcrumbs - Array of breadcrumb items
     */
    function addBreadcrumbStructuredData(breadcrumbs) {
        addStructuredData({
            type: 'BreadcrumbList',
            breadcrumbs: breadcrumbs
        });
    }

    /**
     * Add FAQ structured data
     * @param {Array} faqs - Array of FAQ items
     */
    function addFAQStructuredData(faqs) {
        addStructuredData({
            type: 'FAQPage',
            faqs: faqs
        });
    }

    /**
     * Add Product structured data
     * @param {Object} productData - Product data
     */
    function addProductStructuredData(productData) {
        addStructuredData({
            type: 'Product',
            title: productData.name,
            description: productData.description,
            image: productData.image,
            brand: productData.brand || 'Divinci AI',
            offers: productData.offers,
            features: productData.features
        });
    }
