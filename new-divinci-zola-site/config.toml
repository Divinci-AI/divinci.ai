# Zola Configuration for New Divinci AI Website
base_url = "https://divinci-ai-site.divinci-ai.workers.dev"

# Build settings - Optimized for performance
compile_sass = true
minify_html = true
generate_feeds = false
build_search_index = false
hard_link_static = true

# Theme and output settings
output_dir = "public"
default_language = "en"

# Blog taxonomies
taxonomies = [
    {name = "categories", feeds = true},
    {name = "tags", feeds = false},
]


# Markdown settings
[markdown]
highlight_code = false
highlight_theme = "base16-ocean-dark"
render_emoji = true
external_links_target_blank = true
external_links_no_follow = true
external_links_no_referrer = true
smart_punctuation = true

