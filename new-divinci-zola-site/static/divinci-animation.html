<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hreflang tags for language alternatives -->
    <link rel="alternate" href="https://divinci.ai/divinci-animation.html" hreflang="x-default" />
    <link rel="alternate" href="https://divinci.ai/divinci-animation.html" hreflang="en" />
    <link rel="alternate" href="https://divinci.ai/es/divinci-animation.html" hreflang="es" />
    <link rel="alternate" href="https://divinci.ai/fr/divinci-animation.html" hreflang="fr" />
    <link rel="alternate" href="https://divinci.ai/ar/divinci-animation.html" hreflang="ar" />
    <title>Divinci Robot Animation</title>
    <link rel="stylesheet" href="divinci-animation.css">
</head>
<body>
    <div class="animation-container">
        <!-- Media Elements -->
        <div class="media-elements">
            <div class="files-container">
                <!-- Top-left quadrant -->
                <div class="media-element file" data-start-x="-200" data-start-y="-100">
                    <span class="emoji">📄</span>
                </div>
                <!-- Left -->
                <div class="media-element file" data-start-x="-250" data-start-y="0">
                    <span class="emoji">📁</span>
                </div>
                <!-- Bottom-left quadrant -->
                <div class="media-element file" data-start-x="-200" data-start-y="100">
                    <span class="emoji">📝</span>
                </div>
            </div>
            <div class="video-container">
                <!-- Top -->
                <div class="media-element video" data-start-x="0" data-start-y="-250">
                    <span class="emoji">🎬</span>
                </div>
                <!-- Top-right quadrant -->
                <div class="media-element video" data-start-x="180" data-start-y="-180">
                    <span class="emoji">📹</span>
                </div>
                <!-- Right -->
                <div class="media-element video" data-start-x="250" data-start-y="0">
                    <span class="emoji">🎥</span>
                </div>
            </div>
            <div class="audio-container">
                <!-- Bottom-right quadrant -->
                <div class="media-element audio" data-start-x="200" data-start-y="100">
                    <span class="emoji">🎵</span>
                </div>
                <!-- Bottom -->
                <div class="media-element audio" data-start-x="0" data-start-y="250">
                    <span class="emoji">🔊</span>
                </div>
                <!-- Bottom-left quadrant (second) -->
                <div class="media-element audio" data-start-x="-180" data-start-y="180">
                    <span class="emoji">🎧</span>
                </div>
            </div>
            <div class="diagonal-container">
                <!-- Top-left diagonal -->
                <div class="media-element file" data-start-x="-180" data-start-y="-180">
                    <span class="emoji">💾</span>
                </div>
                <!-- Top-right diagonal -->
                <div class="media-element video" data-start-x="180" data-start-y="-180">
                    <span class="emoji">📺</span>
                </div>
                <!-- Bottom-right diagonal -->
                <div class="media-element audio" data-start-x="180" data-start-y="180">
                    <span class="emoji">🎤</span>
                </div>
            </div>
        </div>

        <!-- Divinci Robot -->
        <div class="robot-container">
            <object id="divinci-robot" data="images/divinci_logo_animated.svg" type="image/svg+xml"></object>
        </div>

    </div>

    <!-- GSAP Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/MotionPathPlugin.min.js"></script>

    <!-- Our Animation Script -->
    <script src="divinci-animation.js"></script>
</body>
</html>
