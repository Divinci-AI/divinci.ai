<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" style="background-color: #f8f4f0;">
  <defs>
    <radialGradient id="photonSource">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#667eea;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="beamPath" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0" />
      <stop offset="50%" style="stop-color:#667eea;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#667eea;stop-opacity:0" />
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Title -->
  <text x="400" y="30" font-family="Fraunces, serif" font-size="20" font-weight="600" fill="#2d3c34" text-anchor="middle">
    Quantum Random Number Generation via Beam Splitter
  </text>

  <!-- Photon source -->
  <g transform="translate(100, 225)">
    <circle r="20" fill="url(#photonSource)" filter="url(#glow)">
      <animate attributeName="r" values="18;22;18" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="0" y="45" font-family="Source Sans 3, sans-serif" font-size="12" fill="#2d3c34" text-anchor="middle">
      Single Photon
    </text>
    <text x="0" y="60" font-family="Source Sans 3, sans-serif" font-size="10" fill="#667eea" text-anchor="middle">
      Source
    </text>
  </g>

  <!-- Incoming beam -->
  <rect x="130" y="220" width="170" height="6" fill="url(#beamPath)" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.8;0.4" dur="2s" repeatCount="indefinite"/>
  </rect>

  <!-- Traveling photon to splitter -->
  <circle r="4" fill="#ffd700" filter="url(#glow)">
    <animateMotion dur="1.5s" repeatCount="indefinite">
      <mpath href="#toSplitter"/>
    </animateMotion>
  </circle>
  <path id="toSplitter" d="M 130,223 L 300,223" fill="none" stroke="none"/>

  <!-- 50/50 Beam Splitter -->
  <g transform="translate(320, 225)">
    <!-- Beam splitter prism -->
    <polygon points="-20,-20 20,-20 20,20 -20,20" fill="none" stroke="#8b7659" stroke-width="2.5"/>
    <polygon points="-20,-20 20,-20 20,20 -20,20" fill="#8b7659" opacity="0.15"/>

    <!-- Diagonal split line -->
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="#8b7659" stroke-width="1.5" stroke-dasharray="3,2"/>

    <!-- Rotating quantum superposition indicator -->
    <circle r="30" fill="none" stroke="#667eea" stroke-width="1" opacity="0.3">
      <animate attributeName="r" values="25;35;25" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.2;0.4;0.2" dur="2s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="60" font-family="Source Sans 3, sans-serif" font-size="11" fill="#2d3c34" text-anchor="middle">
      50/50
    </text>
    <text x="0" y="73" font-family="Source Sans 3, sans-serif" font-size="11" fill="#8b7659" text-anchor="middle">
      Beam Splitter
    </text>
  </g>

  <!-- Upper path (Path A) -->
  <g>
    <rect x="340" y="140" width="180" height="6" fill="url(#beamPath)" opacity="0.6">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Photon traveling path A -->
    <circle r="4" fill="#667eea" filter="url(#glow)" opacity="0">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="1.5s">
        <mpath href="#pathA"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <path id="pathA" d="M 340,143 L 520,143" fill="none" stroke="none"/>

    <!-- Detector A -->
    <g transform="translate(550, 143)">
      <rect x="-15" y="-25" width="30" height="50" fill="none" stroke="#667eea" stroke-width="2" rx="3"/>
      <rect x="-15" y="-25" width="30" height="50" fill="#667eea" opacity="0.1" rx="3"/>

      <circle cx="0" cy="0" r="8" fill="none" stroke="#667eea" stroke-width="2">
        <animate attributeName="opacity" values="0;1;0" dur="3s" repeatCount="indefinite"/>
      </circle>

      <text x="0" y="45" font-family="Source Sans 3, sans-serif" font-size="11" fill="#2d3c34" text-anchor="middle">
        Detector A
      </text>
      <text x="0" y="60" font-family="Courier New, monospace" font-size="11" font-weight="600" fill="#667eea" text-anchor="middle">
        "0"
      </text>
    </g>
  </g>

  <!-- Lower path (Path B) -->
  <g>
    <rect x="340" y="300" width="180" height="6" fill="url(#beamPath)" opacity="0.6">
      <animate attributeName="opacity" values="0.8;0;0.8" dur="3s" repeatCount="indefinite"/>
    </rect>

    <!-- Photon traveling path B -->
    <circle r="4" fill="#764ba2" filter="url(#glow)" opacity="0">
      <animateMotion dur="1.5s" repeatCount="indefinite" begin="3s">
        <mpath href="#pathB"/>
      </animateMotion>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.9;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <path id="pathB" d="M 340,303 L 520,303" fill="none" stroke="none"/>

    <!-- Detector B -->
    <g transform="translate(550, 303)">
      <rect x="-15" y="-25" width="30" height="50" fill="none" stroke="#764ba2" stroke-width="2" rx="3"/>
      <rect x="-15" y="-25" width="30" height="50" fill="#764ba2" opacity="0.1" rx="3"/>

      <circle cx="0" cy="0" r="8" fill="none" stroke="#764ba2" stroke-width="2">
        <animate attributeName="opacity" values="1;0;1" dur="3s" repeatCount="indefinite"/>
      </circle>

      <text x="0" y="45" font-family="Source Sans 3, sans-serif" font-size="11" fill="#2d3c34" text-anchor="middle">
        Detector B
      </text>
      <text x="0" y="60" font-family="Courier New, monospace" font-size="11" font-weight="600" fill="#764ba2" text-anchor="middle">
        "1"
      </text>
    </g>
  </g>

  <!-- Quantum uncertainty annotation -->
  <g transform="translate(320, 100)">
    <text x="0" y="0" font-family="Source Sans 3, sans-serif" font-size="12" fill="#8b7659" text-anchor="middle" font-style="italic">
      Photon in superposition
    </text>
    <text x="0" y="15" font-family="Source Sans 3, sans-serif" font-size="11" fill="#667eea" text-anchor="middle" font-style="italic">
      (takes both paths until measured)
    </text>
  </g>

  <!-- Output stream visualization -->
  <g transform="translate(650, 223)">
    <text x="0" y="-10" font-family="Source Sans 3, sans-serif" font-size="13" font-weight="600" fill="#2d3c34" text-anchor="middle">
      Random Bits
    </text>

    <!-- Random bit stream -->
    <g transform="translate(-45, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#667eea" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">0</text>
    </g>

    <g transform="translate(-25, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#764ba2" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">1</text>
    </g>

    <g transform="translate(-5, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#764ba2" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.5s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">1</text>
    </g>

    <g transform="translate(15, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#667eea" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="2.8s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">0</text>
    </g>

    <g transform="translate(35, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#764ba2" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.2s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">1</text>
    </g>

    <g transform="translate(55, 10)">
      <rect x="0" y="0" width="16" height="22" fill="#667eea" opacity="0.8" rx="2">
        <animate attributeName="opacity" values="0.8;0.3;0.8" dur="3.5s" repeatCount="indefinite"/>
      </rect>
      <text x="8" y="15" font-family="Courier New, monospace" font-size="11" fill="white" text-anchor="middle">0</text>
    </g>
  </g>

  <!-- Bottom annotation -->
  <text x="400" y="420" font-family="Source Sans 3, sans-serif" font-size="12" fill="#8b7659" text-anchor="middle" font-style="italic">
    Outcome is fundamentally unpredictable - true quantum randomness
  </text>
</svg>
