<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .flow-title { font-family: 'Georgia', serif; font-size: 32px; font-weight: bold; fill: #2d3c34; }
      .flow-subtitle { font-family: 'Georgia', serif; font-size: 16px; fill: #5a6b5f; font-style: italic; }
      .section-title { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: 700; fill: #2d3c34; }
      .job-label { font-family: 'Arial', sans-serif; font-size: 14px; fill: #4a5a4f; }
      .number-large { font-family: 'Arial', sans-serif; font-size: 36px; font-weight: bold; }
      .number-medium { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 600; }
      .caption { font-family: 'Arial', sans-serif; font-size: 12px; fill: #666; }
    </style>
    <linearGradient id="displaced-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="created-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="net-gradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="flow-title">AI Automation: Job Displacement vs. Creation by 2030</text>
  <text x="700" y="65" text-anchor="middle" class="flow-subtitle">Net gain of 78 million jobs through economic transformation</text>

  <!-- Jobs Displaced Section -->
  <g id="displaced">
    <rect x="80" y="120" width="380" height="280" rx="12" fill="url(#displaced-gradient)" opacity="0.2" stroke="#e74c3c" stroke-width="3"/>
    <text x="270" y="160" text-anchor="middle" class="section-title" style="fill: #c0392b;">Jobs Displaced</text>

    <!-- Displaced number -->
    <text x="270" y="240" text-anchor="middle" class="number-large" style="fill: #c0392b;">92 Million</text>
    <text x="270" y="270" text-anchor="middle" class="caption">30% of current US jobs automated by 2030</text>

    <!-- Categories displaced -->
    <text x="100" y="310" class="job-label">• Data entry &amp; processing</text>
    <text x="100" y="330" class="job-label">• Routine manufacturing</text>
    <text x="100" y="350" class="job-label">• Basic customer service</text>
    <text x="100" y="370" class="job-label">• Transportation &amp; logistics</text>
  </g>

  <!-- Arrow showing transformation -->
  <g id="transformation-arrow">
    <defs>
      <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
        <polygon points="0 0, 10 3, 0 6" fill="#8b7659" />
      </marker>
    </defs>
    <path d="M 480 260 L 640 260" stroke="#8b7659" stroke-width="8" fill="none" marker-end="url(#arrowhead)"/>
    <text x="560" y="235" text-anchor="middle" class="number-medium" style="fill: #8b7659; font-size: 14px;">Economic Transformation</text>
  </g>

  <!-- Jobs Created Section -->
  <g id="created">
    <rect x="660" y="120" width="380" height="280" rx="12" fill="url(#created-gradient)" opacity="0.2" stroke="#27ae60" stroke-width="3"/>
    <text x="850" y="160" text-anchor="middle" class="section-title" style="fill: #229954;">New Jobs Created</text>

    <!-- Created number -->
    <text x="850" y="240" text-anchor="middle" class="number-large" style="fill: #229954;">170 Million</text>
    <text x="850" y="270" text-anchor="middle" class="caption">Technology-enabled job creation</text>

    <!-- Categories created -->
    <text x="680" y="310" class="job-label">• AI training &amp; oversight</text>
    <text x="680" y="330" class="job-label">• Renewable energy tech</text>
    <text x="680" y="350" class="job-label">• Healthcare &amp; elderly care</text>
    <text x="680" y="370" class="job-label">• Creative &amp; content roles</text>
  </g>

  <!-- Net Positive Result -->
  <g id="net-result">
    <rect x="340" y="450" width="720" height="160" rx="12" fill="url(#net-gradient)" opacity="0.15" stroke="#3498db" stroke-width="3"/>
    <text x="700" y="490" text-anchor="middle" class="section-title" style="fill: #2980b9;">Net Job Growth</text>

    <text x="700" y="550" text-anchor="middle" class="number-large" style="fill: #2980b9;">+78 Million</text>
    <text x="700" y="585" text-anchor="middle" class="caption" style="font-size: 14px;">170M created - 92M displaced = 78M net new jobs by 2030</text>
  </g>

  <!-- Breakdown boxes -->
  <g id="breakdown">
    <!-- Left box - Automation productivity -->
    <rect x="80" y="650" width="400" height="120" rx="8" fill="#f8f9fa" stroke="#8b7659" stroke-width="2"/>
    <text x="280" y="680" text-anchor="middle" class="number-medium" style="fill: #8b7659;">Productivity Gains</text>
    <text x="100" y="710" class="caption">• 16% GDP increase from AI ($13T globally)</text>
    <text x="100" y="730" class="caption">• Automation multiplier creates new markets</text>
    <text x="100" y="750" class="caption">• Lower costs enable business expansion</text>

    <!-- Middle box - Job transition timeline -->
    <rect x="500" y="650" width="400" height="120" rx="8" fill="#f8f9fa" stroke="#8b7659" stroke-width="2"/>
    <text x="700" y="680" text-anchor="middle" class="number-medium" style="fill: #8b7659;">Transition Timeline</text>
    <text x="520" y="710" class="caption">• 2025-2027: Early displacement begins</text>
    <text x="520" y="730" class="caption">• 2027-2029: New job creation accelerates</text>
    <text x="520" y="750" class="caption">• 2030: Net positive employment achieved</text>

    <!-- Right box - UBI role -->
    <rect x="920" y="650" width="400" height="120" rx="8" fill="#f8f9fa" stroke="#3498db" stroke-width="2"/>
    <text x="1120" y="680" text-anchor="middle" class="number-medium" style="fill: #2980b9;">UBI's Critical Role</text>
    <text x="940" y="710" class="caption">• Bridges transition period (2025-2030)</text>
    <text x="940" y="730" class="caption">• Enables retraining &amp; education</text>
    <text x="940" y="750" class="caption">• Prevents social disruption during shift</text>
  </g>

  <!-- Visual flow elements -->
  <g id="flow-indicators">
    <!-- Displaced jobs visual -->
    <rect x="120" y="420" width="300" height="8" rx="4" fill="#e74c3c" opacity="0.6"/>

    <!-- Created jobs visual (larger) -->
    <rect x="700" y="420" width="520" height="8" rx="4" fill="#27ae60" opacity="0.6"/>

    <!-- Balance point -->
    <circle cx="560" cy="424" r="12" fill="#8b7659" stroke="#fff" stroke-width="3"/>
  </g>
</svg>