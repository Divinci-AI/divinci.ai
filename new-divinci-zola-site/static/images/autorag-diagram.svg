<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" aria-labelledby="title desc">
  <title id="title">AutoRAG Knowledge Base Connection Diagram</title> 
  <desc id="desc">Visualization of Divinci AI's AutoRAG system showing how it connects enterprise knowledge bases to LLMs with automatic processing and optimization</desc>
  
  <defs>
    <!-- Styles -->
    <style>
      /* Base styles using the Divinci color palette */
      .background { fill: rgb(248, 244, 240); }
      .container { fill: #F5F7FA; stroke: #485262; stroke-width: 1.5; }
      .primary-connection { stroke: #2E5BFF; stroke-width: 2; fill: none; }
      .secondary-connection { stroke: #00D8D8; stroke-width: 1.5; fill: none; }
      .tertiary-connection { stroke: #B0B7C3; stroke-width: 1; stroke-dasharray: 4,2; fill: none; }
      .highlight-connection { stroke: #8C54FF; stroke-width: 2.5; fill: none; }
      
      .knowledge-node { fill: #F5F7FA; stroke: #2E5BFF; stroke-width: 2; }
      .processing-node { fill: #F5F7FA; stroke: #00D8D8; stroke-width: 2; }
      .llm-node { fill: #F5F7FA; stroke: #8C54FF; stroke-width: 2; }
      .node-highlight { fill: #F0F5FF; }
      
      .icon-primary { fill: #2E5BFF; }
      .icon-secondary { fill: #00D8D8; }
      .icon-tertiary { fill: #8C54FF; }
      
      text {
        font-family: 'Inter', sans-serif;
        fill: #485262;
      }
      .title-text { 
        font-size: 12px; 
        font-weight: 500;
      }
      .subtitle-text { 
        font-size: 10px; 
        font-weight: 400;
      }
      .detail-text { 
        font-size: 9px; 
        font-weight: 400;
      }
      .header-text { 
        font-size: 16px; 
        font-weight: 600;
      }
      
      /* Animation keyframes */
      @keyframes flowAnimation {
        from { stroke-dashoffset: 400; }
        to { stroke-dashoffset: 0; }
      }
      
      .animated-path {
        stroke-dasharray: 5, 3;
        animation: flowAnimation 10s linear infinite;
      }
      
      .data-hexagon {
        fill: #F5F7FA;
        stroke: #2E5BFF;
        stroke-width: 1.5;
      }
      
      .feature-box {
        fill: #F5F7FA;
        stroke: #00D8D8;
        stroke-width: 1.5;
        rx: 4;
        ry: 4;
      }
      
      .decision-diamond {
        fill: #F5F7FA;
        stroke: #8C54FF;
        stroke-width: 1.5;
      }
      
      /* Performance indicators */
      .performance-indicator-good { fill: #00D27A; }
      .performance-indicator-medium { fill: #FFAB2D; }
      .performance-indicator-attention { fill: #FF5C5C; }
    </style>
    
    <!-- Gradient for knowledge flow -->
    <linearGradient id="knowledgeFlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2E5BFF" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8C54FF" stop-opacity="0.8"/>
    </linearGradient>
    
    <!-- Special effect for processing area -->
    <filter id="processing-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="100%" height="100%" class="background"/>
  
  <!-- Main Sections: Knowledge Sources, Processing Engine, LLM Integration -->
  
  <!-- Knowledge Sources Section -->
  <g id="knowledge-sources">
    <rect x="50" y="50" width="200" height="400" rx="10" ry="10" class="container"/>
    <text x="150" y="80" class="title-text" text-anchor="middle">Enterprise Knowledge Sources</text>
    
    <!-- Document sources -->
    <g transform="translate(80, 120)">
      <rect x="0" y="0" width="140" height="60" rx="4" ry="4" class="container"/>
      <text x="70" y="20" class="subtitle-text" text-anchor="middle">Documents</text>
      <!-- Enhanced document stack icon - centered -->
      <rect x="52" y="28" width="18" height="12" rx="2" ry="2" fill="#2E5BFF" stroke="#2E5BFF" stroke-width="1"/>
      <rect x="55" y="31" width="18" height="12" rx="2" ry="2" fill="#5C7BFF" stroke="#2E5BFF" stroke-width="1"/>
      <rect x="58" y="34" width="18" height="12" rx="2" ry="2" fill="#8C9FFF" stroke="#2E5BFF" stroke-width="1"/>
      <!-- Document lines - centered -->
      <line x1="54" y1="32" x2="65" y2="32" stroke="white" stroke-width="0.8"/>
      <line x1="54" y1="35" x2="65" y2="35" stroke="white" stroke-width="0.8"/>
      <line x1="57" y1="38" x2="68" y2="38" stroke="white" stroke-width="0.8"/>
      <line x1="57" y1="41" x2="68" y2="41" stroke="white" stroke-width="0.8"/>
      <text x="70" y="55" class="detail-text" text-anchor="middle">PDF, Word, PPT, etc.</text>
    </g>
    
    <!-- Database sources -->
    <g transform="translate(80, 200)">
      <rect x="0" y="0" width="140" height="60" rx="4" ry="4" class="container"/>
      <text x="70" y="20" class="subtitle-text" text-anchor="middle">Databases</text>
      <rect x="40" y="30" width="60" height="15" class="icon-secondary" fill-opacity="0.6"/>
      <rect x="40" y="45" width="60" height="5" class="icon-secondary" fill-opacity="0.3"/>
      <text x="70" y="55" class="detail-text" text-anchor="middle">SQL, NoSQL, APIs</text>
    </g>
    
    <!-- Knowledge Base sources -->
    <g transform="translate(80, 280)">
      <rect x="0" y="0" width="140" height="60" rx="4" ry="4" class="container"/>
      <text x="70" y="20" class="subtitle-text" text-anchor="middle">Knowledge Bases</text>
      <circle cx="50" cy="35" r="10" class="icon-tertiary" fill-opacity="0.6"/>
      <circle cx="70" cy="35" r="10" class="icon-tertiary" fill-opacity="0.6"/>
      <circle cx="90" cy="35" r="10" class="icon-tertiary" fill-opacity="0.6"/>
      <text x="70" y="55" class="detail-text" text-anchor="middle">Wikis, Confluence, etc.</text>
    </g>
    
    <!-- Code sources -->
    <g transform="translate(80, 360)">
      <rect x="0" y="0" width="140" height="60" rx="4" ry="4" class="container"/>
      <text x="70" y="20" class="subtitle-text" text-anchor="middle">Code Repositories</text>
      <text x="70" y="40" class="icon-primary" text-anchor="middle" font-family="monospace">{ code }</text>
      <text x="70" y="55" class="detail-text" text-anchor="middle">GitHub, GitLab, etc.</text>
    </g>
  </g>
  
  <!-- AutoRAG Processing Engine -->
  <g id="processing-engine">
    <rect x="300" y="100" width="200" height="300" rx="10" ry="10" class="container"/>
    <text x="400" y="130" class="title-text" text-anchor="middle">AutoRAG Processing Engine</text>
    
    <!-- Document Processor -->
    <g transform="translate(325, 150)">
      <rect x="0" y="0" width="150" height="40" rx="4" ry="4" class="feature-box"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Document Processor</text>
    </g>
    
    <!-- Content Analyzer -->
    <g transform="translate(325, 200)">
      <rect x="0" y="0" width="150" height="40" rx="4" ry="4" class="feature-box"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Content Analyzer</text>
    </g>
    
    <!-- Vector Embedding Engine -->
    <g transform="translate(325, 250)">
      <rect x="0" y="0" width="150" height="40" rx="4" ry="4" class="feature-box"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Vector Embedding</text>
    </g>
    
    <!-- Retrieval Optimizer -->
    <g transform="translate(325, 300)">
      <rect x="0" y="0" width="150" height="40" rx="4" ry="4" class="feature-box"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Retrieval Optimizer</text>
    </g>
    
    <!-- Context Manager -->
    <g transform="translate(325, 350)">
      <rect x="0" y="0" width="150" height="40" rx="4" ry="4" class="feature-box"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Context Manager</text>
    </g>
  </g>
  
  <!-- LLM Integration -->
  <g id="llm-integration">
    <rect x="550" y="50" width="200" height="400" rx="10" ry="10" class="container"/>
    <text x="650" y="80" class="title-text" text-anchor="middle">LLM Integration</text>
    
    <!-- Various LLM Types -->
    <g transform="translate(575, 120)">
      <rect x="0" y="0" width="150" height="85" rx="4" ry="4" class="container"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Enterprise LLMs</text>
      
      <!-- LLM icons - larger size -->
      <circle cx="35" cy="50" r="20" class="llm-node"/>
      <text x="35" y="55" class="detail-text" text-anchor="middle">GPT</text>
      
      <circle cx="75" cy="50" r="20" class="llm-node"/>
      <text x="75" y="55" class="detail-text" text-anchor="middle">Claude</text>
      
      <circle cx="115" cy="50" r="20" class="llm-node"/>
      <text x="115" y="55" class="detail-text" text-anchor="middle">Gemini</text>
    </g>
    
    <!-- Response Generation -->
    <g transform="translate(575, 220)">
      <rect x="0" y="0" width="150" height="60" rx="4" ry="4" class="container"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Response Generation</text>
      <!-- Enhanced response generation icon -->
      <rect x="30" y="38" width="25" height="15" rx="3" ry="3" fill="#8C54FF" stroke="#8C54FF" stroke-width="1"/>
      <path d="M40,45 L50,40 L50,50 Z" fill="white"/>
      <circle cx="70" cy="40" r="3" fill="#00D8D8"/>
      <circle cx="80" cy="45" r="3" fill="#00D8D8"/>
      <circle cx="90" cy="42" r="3" fill="#00D8D8"/>
      <path d="M100,40 Q110,35 120,40 Q110,45 100,40" fill="none" stroke="#2E5BFF" stroke-width="2"/>
    </g>
    
    <!-- Citation Manager -->
    <g transform="translate(575, 300)">
      <rect x="0" y="0" width="150" height="60" rx="4" ry="4" class="container"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Citation Manager</text>
      <!-- Enhanced citation icon -->
      <circle cx="50" cy="45" r="8" fill="none" stroke="#2E5BFF" stroke-width="2"/>
      <text x="50" y="49" class="detail-text" text-anchor="middle" fill="#2E5BFF" font-weight="600">C</text>
      <path d="M65,40 L80,40 L80,50 L65,50 Z" fill="#00D8D8" stroke="#00D8D8" stroke-width="1"/>
      <line x1="68" y1="43" x2="77" y2="43" stroke="white" stroke-width="1"/>
      <line x1="68" y1="47" x2="75" y2="47" stroke="white" stroke-width="1"/>
      <path d="M85,42 L95,37 L105,42 L95,47 Z" fill="#8C54FF" stroke="#8C54FF" stroke-width="1"/>
    </g>
    
    <!-- Performance Monitor -->
    <g transform="translate(575, 380)">
      <rect x="0" y="0" width="150" height="60" rx="4" ry="4" class="container"/>
      <text x="75" y="25" class="subtitle-text" text-anchor="middle">Performance Monitor</text>
      
      <!-- Chart icon -->
      <path d="M40,35 L60,50 L80,40 L100,30 L120,45" class="performance-indicator-good" stroke-width="2" fill="none"/>
    </g>
  </g>
  
  <!-- Connection paths between sections -->
  
  <!-- Document connections -->
  <path d="M220,150 C260,150 260,170 300,170" class="primary-connection animated-path"/>
  
  <!-- Database connections -->
  <path d="M220,230 C260,230 260,220 300,220" class="primary-connection animated-path"/>
  
  <!-- Knowledge Base connections -->
  <path d="M220,310 C260,310 260,270 300,270" class="primary-connection animated-path"/>
  
  <!-- Code connections -->
  <path d="M220,390 C260,390 260,320 300,320" class="primary-connection animated-path"/>
  
  <!-- Processing to LLM connections -->
  <path d="M500,170 C520,170 530,162 550,162" class="highlight-connection animated-path"/>
  <path d="M500,220 C520,220 530,250 550,250" class="highlight-connection animated-path"/>
  <path d="M500,270 C520,270 530,330 550,330" class="highlight-connection animated-path"/>
  
  <!-- Feedback loop -->
  <path d="M575,410 C540,410 520,410 500,370 C480,330 460,130 400,80 C340,30 220,30 100,50" class="tertiary-connection"/>
  <text x="400" y="30" class="header-text" text-anchor="middle">Continuous Learning Feedback Loop</text>
  
  <!-- Key performance indicators -->
  <g transform="translate(650, 480)">
    <text x="0" y="0" class="subtitle-text">97% Hallucination Reduction</text>
    <circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/>
  </g>
  
  <g transform="translate(400, 480)">
    <text x="0" y="0" class="subtitle-text">85% Faster Implementation</text>
    <circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/>
  </g>
  
  <g transform="translate(150, 480)">
    <text x="0" y="0" class="subtitle-text">99.8% Information Accuracy</text>
    <circle cx="-15" cy="-5" r="5" class="performance-indicator-good"/>
  </g>
</svg>