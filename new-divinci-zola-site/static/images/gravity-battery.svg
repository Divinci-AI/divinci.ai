<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" style="background-color: #f8f4f0;">
  <defs>
    <linearGradient id="massGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b7659;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5d4d3e;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="cableGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2d3c34;stop-opacity:0.8" />
      <stop offset="50%" style="stop-color:#2d3c34;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d3c34;stop-opacity:0.8" />
    </linearGradient>

    <radialGradient id="energyGlow">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#ffd700;stop-opacity:0" />
    </radialGradient>

    <linearGradient id="shaftGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9ca3af;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#d1d5db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#9ca3af;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="400" y="25" font-family="Fraunces, serif" font-size="18" font-weight="600" fill="#2d3c34" text-anchor="middle">
    Gravity Battery Energy Storage System
  </text>

  <!-- Shaft structure (mine shaft / tower) -->
  <g>
    <rect x="350" y="100" width="100" height="330" fill="url(#shaftGrad)" stroke="#6b7280" stroke-width="2"/>
    <rect x="350" y="100" width="100" height="330" fill="none" stroke="#6b7280" stroke-width="1.5" opacity="0.5"/>

    <!-- Shaft depth markers -->
    <line x1="345" y1="150" x2="355" y2="150" stroke="#6b7280" stroke-width="1"/>
    <line x1="345" y1="220" x2="355" y2="220" stroke="#6b7280" stroke-width="1"/>
    <line x1="345" y1="290" x2="355" y2="290" stroke="#6b7280" stroke-width="1"/>
    <line x1="345" y1="360" x2="355" y2="360" stroke="#6b7280" stroke-width="1"/>

    <text x="335" y="155" font-family="Source Sans 3, sans-serif" font-size="9" fill="#6b7280" text-anchor="end">100m</text>
    <text x="335" y="225" font-family="Source Sans 3, sans-serif" font-size="9" fill="#6b7280" text-anchor="end">200m</text>
    <text x="335" y="295" font-family="Source Sans 3, sans-serif" font-size="9" fill="#6b7280" text-anchor="end">300m</text>
    <text x="335" y="365" font-family="Source Sans 3, sans-serif" font-size="9" fill="#6b7280" text-anchor="end">400m</text>
  </g>

  <!-- Pulley system at top -->
  <g transform="translate(400, 100)">
    <circle r="25" fill="none" stroke="#2d3c34" stroke-width="3"/>
    <circle r="25" fill="#2d3c34" opacity="0.1"/>

    <!-- Rotating pulley indicator -->
    <line x1="-18" y1="0" x2="18" y2="0" stroke="#2d3c34" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </line>
    <line x1="0" y1="-18" x2="0" y2="18" stroke="#2d3c34" stroke-width="2">
      <animateTransform attributeName="transform" type="rotate" from="0 0 0" to="360 0 0" dur="8s" repeatCount="indefinite"/>
    </line>
  </g>

  <!-- Cable -->
  <rect x="398" y="105" width="4" height="200" fill="url(#cableGrad)">
    <animate attributeName="height" values="200;140;200" dur="8s" repeatCount="indefinite"/>
  </rect>

  <!-- Heavy mass -->
  <g>
    <rect x="360" y="305" width="80" height="60" fill="url(#massGrad)" stroke="#5d4d3e" stroke-width="2" rx="3">
      <animate attributeName="y" values="305;245;305" dur="8s" repeatCount="indefinite"/>
    </rect>

    <!-- Mass weight label -->
    <text x="400" y="340" font-family="Source Sans 3, sans-serif" font-size="14" font-weight="600" fill="white" text-anchor="middle">
      500 tons
      <animate attributeName="y" values="340;280;340" dur="8s" repeatCount="indefinite"/>
    </text>

    <!-- Energy glow when moving -->
    <ellipse cx="400" cy="305" rx="60" ry="10" fill="url(#energyGlow)">
      <animate attributeName="cy" values="305;245;305" dur="8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.6;0" dur="8s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- Generator/Motor at surface -->
  <g transform="translate(400, 80)">
    <rect x="-40" y="-25" width="80" height="20" fill="#667eea" stroke="#667eea" stroke-width="1.5" rx="2"/>
    <rect x="-40" y="-25" width="80" height="20" fill="none" stroke="#667eea" stroke-width="1.5" rx="2"/>

    <!-- Electrical connections -->
    <circle cx="-30" cy="-15" r="3" fill="#ffd700">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="30" cy="-15" r="3" fill="#ffd700">
      <animate attributeName="opacity" values="1;0.5;1" dur="1.5s" repeatCount="indefinite"/>
    </circle>

    <text x="0" y="-30" font-family="Source Sans 3, sans-serif" font-size="11" fill="#2d3c34" text-anchor="middle">
      Generator/Motor
    </text>
  </g>

  <!-- Left side: Charging (storing energy) -->
  <g transform="translate(150, 200)">
    <text x="0" y="0" font-family="Fraunces, serif" font-size="15" font-weight="600" fill="#2d3c34" text-anchor="middle">
      Charging
    </text>
    <text x="0" y="18" font-family="Source Sans 3, sans-serif" font-size="11" fill="#8b7659" text-anchor="middle" font-style="italic">
      (Storing Energy)
    </text>

    <!-- Solar panel input -->
    <g transform="translate(0, 60)">
      <rect x="-30" y="0" width="60" height="40" fill="none" stroke="#667eea" stroke-width="2" rx="3"/>

      <!-- Solar cells pattern -->
      <line x1="-20" y1="10" x2="20" y2="10" stroke="#667eea" stroke-width="1" opacity="0.3"/>
      <line x1="-20" y1="20" x2="20" y2="20" stroke="#667eea" stroke-width="1" opacity="0.3"/>
      <line x1="-20" y1="30" x2="20" y2="30" stroke="#667eea" stroke-width="1" opacity="0.3"/>

      <!-- Sun rays -->
      <g transform="translate(0, -18)">
        <circle r="8" fill="#ffd700" opacity="0.7">
          <animate attributeName="opacity" values="0.5;0.9;0.5" dur="2s" repeatCount="indefinite"/>
        </circle>
        <line x1="0" y1="-12" x2="0" y2="-16" stroke="#ffd700" stroke-width="1.5"/>
        <line x1="8" y1="-8" x2="11" y2="-11" stroke="#ffd700" stroke-width="1.5"/>
        <line x1="11" y1="0" x2="15" y2="0" stroke="#ffd700" stroke-width="1.5"/>
        <line x1="-8" y1="-8" x2="-11" y2="-11" stroke="#ffd700" stroke-width="1.5"/>
        <line x1="-11" y1="0" x2="-15" y2="0" stroke="#ffd700" stroke-width="1.5"/>
      </g>

      <text x="0" y="58" font-family="Source Sans 3, sans-serif" font-size="10" fill="#667eea" text-anchor="middle">
        Solar/Wind
      </text>
    </g>

    <!-- Arrow up -->
    <g transform="translate(0, 145)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#8b7659" stroke-width="2" marker-end="url(#arrowUp)"/>
      <text x="15" y="-6" font-family="Source Sans 3, sans-serif" font-size="9" fill="#8b7659">
        Lift mass
      </text>
    </g>

    <!-- Energy stored formula -->
    <g transform="translate(0, 150)">
      <rect x="-60" y="0" width="120" height="45" fill="#8b7659" opacity="0.1" rx="4" stroke="#8b7659" stroke-width="1"/>
      <text x="0" y="18" font-family="Source Sans 3, sans-serif" font-size="11" fill="#2d3c34" text-anchor="middle" font-weight="600">
        U = mgh
      </text>
      <text x="0" y="33" font-family="Source Sans 3, sans-serif" font-size="9" fill="#8b7659" text-anchor="middle" font-style="italic">
        Potential Energy
      </text>
    </g>
  </g>

  <!-- Right side: Discharging (releasing energy) -->
  <g transform="translate(650, 200)">
    <text x="0" y="0" font-family="Fraunces, serif" font-size="15" font-weight="600" fill="#2d3c34" text-anchor="middle">
      Discharging
    </text>
    <text x="0" y="18" font-family="Source Sans 3, sans-serif" font-size="11" fill="#667eea" text-anchor="middle" font-style="italic">
      (Releasing Energy)
    </text>

    <!-- Computer/load output -->
    <g transform="translate(0, 30)">
      <rect x="-30" y="0" width="60" height="40" fill="none" stroke="#667eea" stroke-width="2" rx="3"/>

      <!-- Screen lines -->
      <rect x="-20" y="8" width="40" height="24" fill="#667eea" opacity="0.2" rx="2"/>
      <line x1="-15" y1="15" x2="15" y2="15" stroke="#667eea" stroke-width="1" opacity="0.5"/>
      <line x1="-15" y1="20" x2="15" y2="20" stroke="#667eea" stroke-width="1" opacity="0.5"/>
      <line x1="-15" y1="25" x2="10" y2="25" stroke="#667eea" stroke-width="1" opacity="0.5"/>

      <text x="0" y="58" font-family="Source Sans 3, sans-serif" font-size="10" fill="#667eea" text-anchor="middle">
        Light Logic PC
      </text>
    </g>

    <!-- Arrow down -->
    <g transform="translate(0, 115)">
      <line x1="0" y1="0" x2="0" y2="-15" stroke="#667eea" stroke-width="2" marker-end="url(#arrowUp)"/>
      <text x="-15" y="-6" font-family="Source Sans 3, sans-serif" font-size="9" fill="#667eea" text-anchor="end">
        Mass falls
      </text>
    </g>

    <!-- Energy specs -->
    <g transform="translate(0, 120)">
      <rect x="-60" y="0" width="120" height="60" fill="#667eea" opacity="0.1" rx="4" stroke="#667eea" stroke-width="1"/>
      <text x="0" y="18" font-family="Source Sans 3, sans-serif" font-size="10" fill="#2d3c34" text-anchor="middle" font-weight="600">
        Efficiency: 80-90%
      </text>
      <text x="0" y="33" font-family="Source Sans 3, sans-serif" font-size="9" fill="#667eea" text-anchor="middle">
        Lifespan: 50+ years
      </text>
      <text x="0" y="48" font-family="Source Sans 3, sans-serif" font-size="9" fill="#667eea" text-anchor="middle" font-style="italic">
        Zero degradation
      </text>
    </g>
  </g>

  <defs>
    <marker id="arrowUp" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto">
      <polygon points="0,0 10,5 0,10" fill="#8b7659"/>
    </marker>
  </defs>

  <!-- Bottom annotation -->
  <text x="400" y="475" font-family="Source Sans 3, sans-serif" font-size="12" fill="#8b7659" text-anchor="middle" font-style="italic">
    Sustainable energy storage using gravity - no rare earth elements, no degradation
  </text>
</svg>
