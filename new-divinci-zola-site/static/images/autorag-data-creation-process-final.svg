<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 400" width="1000" height="400" aria-labelledby="title-data-creation desc-data-creation">
  <title id="title-data-creation">AutoRAG Data Creation Process</title>
  <desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process from raw documents to QA datasets</desc>
  
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>
  
  <style>
    .bg { fill: #0c1229; }
    .text { 
      font-family: 'Sora', 'Arial', sans-serif;
      fill: #ffffff;
      font-size: 28px;
      text-anchor: middle;
      dominant-baseline: middle;
    }
    .title {
      font-family: 'Sora', 'Arial', sans-serif;
      fill: #ffffff;
      font-size: 40px;
      text-anchor: middle;
      font-weight: 600;
    }
    .arrow {
      stroke: #ffffff;
      stroke-width: 3;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .box {
      fill: rgba(46, 91, 255, 0.2);
      stroke: #5ce2e7;
      stroke-width: 2;
      rx: 20;
      ry: 20;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-10px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .float {
      animation: float 6s ease-in-out infinite;
    }
    
    .pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    
    .rotate {
      animation: rotate 20s linear infinite;
      transform-origin: center;
    }
    
    .doc-blue { fill: #4285F4; }
    .doc-green { fill: #34A853; }
    .doc-red { fill: #EA4335; }
    .doc-text { fill: #ffffff; }
    
    .microscope { fill: #78909C; }
    .microscope-base { fill: #B0BEC5; }
    .microscope-dot { fill: #EA4335; }
    
    .scissors { fill: none; stroke: #ffffff; stroke-width: 5; }
    
    .qa-window { fill: #F5F7FA; stroke: #B0BEC5; stroke-width: 2; }
    .qa-header { fill: #B0BEC5; }
    .qa-question { fill: #FF9800; }
    .qa-answer { fill: #4CAF50; }
  </style>
  
  <!-- Background -->
  <rect width="1000" height="400" class="bg" />
  
  <!-- Sacred geometry background elements -->
  <circle cx="500" cy="200" r="280" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1" class="rotate" />
  <circle cx="500" cy="200" r="220" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1" class="rotate" style="animation-direction: reverse;" />
  
  <!-- Title -->
  <text x="500" y="60" class="title">[ Data Creation Process ]</text>
  
  <!-- Main process flow - horizontal layout -->
  <g transform="translate(0, 200)">
    <!-- Raw Documents -->
    <g transform="translate(150, 0)" class="float">
      <!-- Document stack -->
      <rect x="-40" y="-60" width="80" height="100" rx="5" ry="5" class="doc-blue" />
      <rect x="-50" y="-70" width="80" height="100" rx="5" ry="5" class="doc-green" />
      <rect x="-60" y="-80" width="80" height="100" rx="5" ry="5" class="doc-red" />
      
      <!-- Document lines -->
      <rect x="-30" y="-50" width="50" height="5" class="doc-text" />
      <rect x="-30" y="-40" width="50" height="5" class="doc-text" />
      <rect x="-30" y="-30" width="50" height="5" class="doc-text" />
      <rect x="-30" y="-20" width="50" height="5" class="doc-text" />
      <rect x="-30" y="-10" width="50" height="5" class="doc-text" />
      <rect x="-30" y="0" width="50" height="5" class="doc-text" />
      
      <!-- Label -->
      <text x="0" y="70" class="text">Raw Documents</text>
    </g>
    
    <!-- Parsing -->
    <g transform="translate(350, 0)">
      <!-- Microscope -->
      <g class="float" style="animation-duration: 4s;">
        <circle cx="0" cy="-30" r="30" class="microscope pulse" />
        <rect x="-15" y="-10" width="30" height="40" class="microscope-base" />
        <rect x="-25" y="10" width="50" height="10" class="microscope-base" />
        <circle cx="-10" cy="5" r="5" class="microscope-dot pulse" />
        <circle cx="10" cy="15" r="5" class="microscope-dot pulse" />
      </g>
      
      <!-- Label -->
      <text x="0" y="70" class="text">Parsing</text>
    </g>
    
    <!-- Chunking -->
    <g transform="translate(550, 0)">
      <!-- Scissors -->
      <g class="float" style="animation-duration: 5s;">
        <!-- Simple scissors shape that will render reliably -->
        <path d="M-30,0 C-20,-30 20,-30 30,0" class="scissors" />
        <path d="M-30,-60 L30,0" class="scissors" />
        <path d="M30,-60 L-30,0" class="scissors" />
      </g>
      
      <!-- Label -->
      <text x="0" y="70" class="text">Chunking</text>
    </g>
    
    <!-- QA Creation -->
    <g transform="translate(750, 0)" class="float">
      <!-- Window -->
      <rect x="-50" y="-80" width="100" height="100" rx="10" ry="10" class="qa-window" />
      <rect x="-50" y="-80" width="100" height="20" rx="10" ry="10" class="qa-header" />
      
      <!-- Q&A bubbles -->
      <rect x="-40" y="-50" width="80" height="20" rx="5" ry="5" class="qa-question pulse" />
      <rect x="-40" y="-20" width="60" height="20" rx="5" ry="5" class="qa-answer pulse" />
      <text x="-30" y="-35" fill="#ffffff" font-size="12">Q</text>
      <text x="-30" y="-5" fill="#ffffff" font-size="12">A</text>
      
      <!-- Label -->
      <text x="0" y="70" class="text">QA Creation</text>
    </g>
    
    <!-- Horizontal Arrows -->
    <path d="M200,0 L300,0" class="arrow" />
    <path d="M400,0 L500,0" class="arrow" />
    <path d="M600,0 L700,0" class="arrow" />
    
    <!-- Vertical arrows -->
    <path d="M550,50 L550,150" class="arrow" />
    <path d="M750,50 L750,150" class="arrow" />
    
    <!-- Output boxes -->
    <g class="pulse" style="animation-duration: 4s;">
      <rect x="480" y="150" width="140" height="80" class="box" />
      <text x="550" y="190" class="text">Corpus</text>
    </g>
    
    <g class="pulse" style="animation-duration: 4s; animation-delay: 1s;">
      <rect x="680" y="150" width="140" height="80" class="box" />
      <text x="750" y="190" class="text">QA Data</text>
    </g>
  </g>
  
  <!-- Floating particles -->
  <circle cx="200" cy="100" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 0.5s;" />
  <circle cx="300" cy="200" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 1s;" />
  <circle cx="400" cy="100" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 1.5s;" />
  <circle cx="600" cy="200" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 2s;" />
  <circle cx="700" cy="100" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 2.5s;" />
  <circle cx="800" cy="200" r="2" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 3s;" />
</svg>
