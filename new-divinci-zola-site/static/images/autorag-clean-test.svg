<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 350">
  <rect width="750" height="350" fill="rgb(248, 244, 240)"/>
  
  <!-- Add simple animations -->
  <style>
    .pulse { animation: pulse 3s ease-in-out infinite; }
    .glow { animation: glow 2s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.7; }
    }
    @keyframes glow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.2); }
    }
  </style>
  
  <!-- Step 1: Raw Documents with enhanced paper effect -->
  <g transform="translate(100, 150)">
    <!-- Document shadows for depth -->
    <rect x="-33" y="-22" width="50" height="65" rx="4" fill="#000000" opacity="0.2"/>
    <rect x="-28" y="-17" width="50" height="65" rx="4" fill="#000000" opacity="0.15"/>
    <rect x="-23" y="-12" width="50" height="65" rx="4" fill="#000000" opacity="0.1"/>
    
    <!-- Document stack with layered effect and animation -->
    <rect x="-35" y="-25" width="50" height="65" rx="4" fill="#EA4335" class="pulse">
      <animate attributeName="y" values="-25;-27;-25" dur="4s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-30" y="-20" width="50" height="65" rx="4" fill="#34A853" class="pulse">
      <animate attributeName="y" values="-20;-22;-20" dur="4s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="-25" y="-15" width="50" height="65" rx="4" fill="#4285F4" class="pulse">
      <animate attributeName="y" values="-15;-17;-15" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    
    <!-- Document lines to show text with animation -->
    <rect x="-25" y="-5" width="0" height="2" fill="white" opacity="0.8">
      <animate attributeName="width" values="0;30;30" dur="3s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-25" y="0" width="0" height="2" fill="white" opacity="0.8">
      <animate attributeName="width" values="0;25;25" dur="3s" repeatCount="indefinite" begin="0.3s" />
    </rect>
    <rect x="-25" y="5" width="0" height="2" fill="white" opacity="0.8">
      <animate attributeName="width" values="0;30;30" dur="3s" repeatCount="indefinite" begin="0.6s" />
    </rect>
    <rect x="-25" y="10" width="0" height="2" fill="white" opacity="0.8">
      <animate attributeName="width" values="0;20;20" dur="3s" repeatCount="indefinite" begin="0.9s" />
    </rect>
    <rect x="-25" y="15" width="0" height="2" fill="white" opacity="0.8">
      <animate attributeName="width" values="0;28;28" dur="3s" repeatCount="indefinite" begin="1.2s" />
    </rect>
    
    <!-- Glow effect -->
    <circle cx="0" cy="15" r="60" fill="url(#blue-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" fill="#2c3e50" font-size="18" text-anchor="middle">Raw Documents</text>
  </g>
  
  <!-- Arrow 1 with animation -->
  <path d="M150,150 L230,150" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="2s" repeatCount="indefinite" />
  </path>
  
  <!-- Step 2: Parsing with animated microscope -->
  <g transform="translate(280, 150)">
    <!-- Microscope lens with pulsing animation -->
    <circle cx="0" cy="0" r="25" fill="#78909C" class="glow">
      <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Microscope base -->
    <rect x="-12" y="15" width="24" height="30" fill="#B0BEC5" />
    <rect x="-20" y="30" width="40" height="8" fill="#546E7A" />
    
    <!-- Scanning beam effect -->
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#06b6d4" stroke-width="1" opacity="0.6">
      <animate attributeName="y1" values="0;-15;15;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="0;-15;15;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite" />
    </line>
    
    <!-- Animated data points -->
    <circle cx="-8" cy="25" r="3" fill="#EA4335" class="pulse">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="8" cy="25" r="3" fill="#EA4335" class="pulse">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1s" />
    </circle>
    <circle cx="0" cy="30" r="0" fill="#EA4335" opacity="0">
      <animate attributeName="r" values="0;4;0" dur="3s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite" begin="1.5s" />
    </circle>
    
    <!-- Glow effect -->
    <circle cx="0" cy="15" r="50" fill="url(#green-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" fill="#2c3e50" font-size="18" text-anchor="middle">Parsing</text>
  </g>
  
  <!-- Arrow 2 with animation -->
  <path d="M330,150 L410,150" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="2s" repeatCount="indefinite" begin="0.5s" />
  </path>
  
  <!-- Step 3: Chunking with animated pieces -->
  <g transform="translate(460, 150)">
    <!-- Document chunks with pulsing animation -->
    <rect x="-20" y="-20" width="12" height="30" rx="2" fill="#4285F4" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-3" y="-20" width="12" height="30" rx="2" fill="#4285F4" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="14" y="-20" width="12" height="30" rx="2" fill="#4285F4" opacity="0.9">
      <animate attributeName="opacity" values="0.9;0.6;0.9" dur="2s" repeatCount="indefinite" begin="1s" />
    </rect>
    
    <!-- Animated cutting lines -->
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#06b6d4" stroke-width="2" stroke-dasharray="5,5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="3s" repeatCount="indefinite" begin="0s" />
    </line>
    <line x1="-30" y1="5" x2="30" y2="5" stroke="#06b6d4" stroke-width="2" stroke-dasharray="5,5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="3s" repeatCount="indefinite" begin="1s" />
    </line>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="40" fill="url(#green-glow)" opacity="0.2" class="pulse" />
    
    <text x="0" y="50" fill="#2c3e50" font-size="18" text-anchor="middle">Chunking</text>
  </g>
  
  <!-- Arrow 3 with animation -->
  <path d="M510,150 L590,150" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="100" stroke-dashoffset="100">
    <animate attributeName="stroke-dashoffset" values="100;0" dur="2s" repeatCount="indefinite" begin="1s" />
  </path>
  
  <!-- Step 4: QA Creation with animated window -->
  <g transform="translate(640, 150)">
    <!-- Window frame with pulsing opacity -->
    <rect x="-40" y="-40" width="80" height="80" rx="8" ry="8" fill="#F5F7FA" stroke="#B0BEC5" stroke-width="2">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite" />
    </rect>
    <!-- Window title bar -->
    <rect x="-40" y="-40" width="80" height="15" rx="8" ry="8" fill="#B0BEC5" />
    <circle cx="30" cy="-32" r="4" fill="#FF5252" class="pulse" />
    
    <!-- Q&A conversation bubbles -->
    <rect x="-30" y="-20" width="60" height="15" rx="4" ry="4" fill="#FF9800" class="pulse" />
    
    <!-- Animated typing dots in question bubble -->
    <circle cx="-15" cy="-12" r="1.5" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="-8" cy="-12" r="1.5" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="-1" cy="-12" r="1.5" fill="white" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="1s" />
    </circle>
    
    <!-- Answer bubble with expanding animation -->
    <rect x="-30" y="8" width="45" height="15" rx="4" ry="4" fill="#4CAF50">
      <animate attributeName="width" values="0;45" dur="2s" repeatCount="indefinite" begin="1.5s" />
    </rect>
    
    <!-- Answer typing dots -->
    <circle cx="-15" cy="15" r="1.5" fill="white" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2s" />
    </circle>
    <circle cx="-8" cy="15" r="1.5" fill="white" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2.3s" />
    </circle>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="55" fill="url(#qa-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" fill="#2c3e50" font-size="18" text-anchor="middle">QA Creation</text>
  </g>
  
  <!-- Output boxes with animations -->
  <g class="pulse">
    <rect x="400" y="250" width="120" height="60" rx="15" fill="none" stroke="#06b6d4" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" />
    </rect>
    <!-- Data visualization inside corpus -->
    <g transform="translate(460, 275)">
      <rect x="-30" y="-5" width="8" height="4" fill="#4285F4" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0s" />
      </rect>
      <rect x="-18" y="-5" width="8" height="4" fill="#4285F4" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.3s" />
      </rect>
      <rect x="-6" y="-5" width="8" height="4" fill="#4285F4" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.6s" />
      </rect>
      <rect x="6" y="-5" width="8" height="4" fill="#4285F4" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.9s" />
      </rect>
      <rect x="18" y="-5" width="8" height="4" fill="#4285F4" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="1.2s" />
      </rect>
    </g>
    <text x="460" y="295" fill="#2c3e50" font-size="18" text-anchor="middle">Corpus</text>
  </g>
  
  <g class="pulse">
    <rect x="580" y="250" width="120" height="60" rx="15" fill="none" stroke="#06b6d4" stroke-width="2">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    <!-- QA pairs visualization -->
    <g transform="translate(640, 275)">
      <rect x="-30" y="-5" width="20" height="4" fill="#FF9800" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="0s" />
      </rect>
      <rect x="-5" y="-5" width="12" height="4" fill="#4CAF50" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="0.3s" />
      </rect>
      <rect x="10" y="-5" width="4" height="4" fill="#2c3e50" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.6s" />
      </rect>
      <rect x="18" y="-5" width="4" height="4" fill="#2c3e50" opacity="0.7">
        <animate attributeName="opacity" values="0.7;1;0.7" dur="3s" repeatCount="indefinite" begin="0.9s" />
      </rect>
    </g>
    <text x="640" y="295" fill="#2c3e50" font-size="18" text-anchor="middle">QA Data</text>
  </g>
  
  <!-- Arrows down with animation -->
  <path d="M460,225 L460,245" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="30" stroke-dashoffset="30">
    <animate attributeName="stroke-dashoffset" values="30;0" dur="2s" repeatCount="indefinite" begin="1.5s" />
  </path>
  <path d="M640,225 L640,245" stroke="#7c3aed" stroke-width="3" fill="none" marker-end="url(#arrow)" stroke-dasharray="25" stroke-dashoffset="25">
    <animate attributeName="stroke-dashoffset" values="25;0" dur="2s" repeatCount="indefinite" begin="2s" />
  </path>
  
  <!-- Background sacred geometry (subtle) -->
  <circle cx="360" cy="145" r="140" fill="none" stroke="#7c3aed" stroke-width="0.5" opacity="0.08">
    <animateTransform attributeName="transform" type="rotate" values="0 360 145;360 360 145" dur="60s" repeatCount="indefinite" />
  </circle>
  <circle cx="360" cy="145" r="170" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.05">
    <animateTransform attributeName="transform" type="rotate" values="360 360 145;0 360 145" dur="80s" repeatCount="indefinite" />
  </circle>

  <!-- Animated particles flowing between steps -->
  <circle cx="190" cy="150" r="3" fill="#7c3aed" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="370" cy="150" r="3" fill="#7c3aed" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="550" cy="150" r="3" fill="#7c3aed" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>

  <!-- Gradient definitions for glow effects -->
  <defs>
    <radialGradient id="blue-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="green-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#06b6d4" stop-opacity="0.2" />
      <stop offset="100%" stop-color="#06b6d4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="qa-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.15" />
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0" />
    </radialGradient>
    
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#7c3aed"/>
    </marker>
  </defs>
</svg>