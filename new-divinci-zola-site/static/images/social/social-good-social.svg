<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#5ce2e7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Image overlay gradient -->
    <linearGradient id="overlayGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#254284" stop-opacity="0.6" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="1000" cy="480" r="150" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="600" cy="100" r="50" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  <circle cx="400" cy="500" r="80" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  
  <!-- Image placeholder (will be replaced with actual image) -->
  <rect x="150" y="150" width="400" height="300" rx="10" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <rect x="150" y="150" width="400" height="300" rx="10" fill="url(#overlayGradient)" />
  
  <!-- Icon placeholder -->
  <circle cx="350" cy="300" r="60" fill="#5ce2e7" opacity="0.3" stroke="#5ce2e7" stroke-width="2" />
  <text x="350" y="320" font-family="Arial, sans-serif" font-size="40" fill="white" text-anchor="middle">🌍</text>
  
  <!-- Page title -->
  <text x="750" y="250" font-family="Sora, Arial, sans-serif" font-size="64" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">AI for Good</text>
  
  <!-- Tagline -->
  <text x="750" y="320" font-family="Sora, Arial, sans-serif" font-size="32" fill="white" text-anchor="middle" opacity="0.9">Using AI for positive social impact</text>
  
  <!-- Description -->
  <text x="750" y="380" font-family="Sora, Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.8">Join us in using AI technology for meaningful</text>
  <text x="750" y="410" font-family="Sora, Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.8">social impact and community development</text>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.7">divinci.ai/social-good</text>
</svg>
