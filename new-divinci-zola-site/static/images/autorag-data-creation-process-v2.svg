<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800" height="300" aria-labelledby="title-data-creation desc-data-creation">
  <title id="title-data-creation">AutoRAG Data Creation Process</title>
  <desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process from raw documents to QA datasets</desc>
  
  <defs>
    <!-- Arrow marker -->
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ffffff" />
    </marker>
  </defs>
  
  <style>
    .bg { fill: #0c1229; }
    .text { 
      font-family: 'Sora', 'Arial', sans-serif;
      fill: #ffffff;
      font-size: 24px;
      text-anchor: middle;
    }
    .title {
      font-family: 'Sora', 'Arial', sans-serif;
      fill: #ffffff;
      font-size: 36px;
      text-anchor: middle;
      font-weight: 600;
    }
    .arrow {
      stroke: #ffffff;
      stroke-width: 2;
      fill: none;
      marker-end: url(#arrowhead);
    }
    .box {
      fill: rgba(46, 91, 255, 0.2);
      stroke: #5ce2e7;
      stroke-width: 2;
      rx: 15;
      ry: 15;
    }
    
    @keyframes float {
      0% { transform: translateY(0px); }
      50% { transform: translateY(-5px); }
      100% { transform: translateY(0px); }
    }
    
    @keyframes pulse {
      0% { opacity: 0.7; }
      50% { opacity: 1; }
      100% { opacity: 0.7; }
    }
    
    @keyframes rotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    
    .float {
      animation: float 6s ease-in-out infinite;
    }
    
    .pulse {
      animation: pulse 3s ease-in-out infinite;
    }
    
    .rotate {
      animation: rotate 20s linear infinite;
      transform-origin: center;
    }
    
    .doc-blue { fill: #4285F4; }
    .doc-green { fill: #34A853; }
    .doc-red { fill: #EA4335; }
    .doc-text { fill: #ffffff; }
    
    .microscope { fill: #78909C; }
    .microscope-base { fill: #B0BEC5; }
    .microscope-dot { fill: #EA4335; }
    
    .scissors { fill: none; stroke: #ffffff; stroke-width: 3; }
    
    .qa-window { fill: #F5F7FA; stroke: #B0BEC5; stroke-width: 2; }
    .qa-header { fill: #B0BEC5; }
    .qa-question { fill: #FF9800; }
    .qa-answer { fill: #4CAF50; }
  </style>
  
  <!-- Background -->
  <rect width="800" height="300" class="bg" />
  
  <!-- Sacred geometry background elements -->
  <circle cx="400" cy="150" r="200" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1" class="rotate" />
  <circle cx="400" cy="150" r="150" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1" class="rotate" style="animation-direction: reverse;" />
  
  <!-- Title -->
  <text x="400" y="50" class="title">[ Data Creation Process ]</text>
  
  <!-- Process Flow -->
  <g>
    <!-- Raw Documents -->
    <g transform="translate(120, 150)" class="float">
      <!-- Document stack -->
      <rect x="-30" y="-40" width="60" height="70" rx="5" ry="5" class="doc-blue" />
      <rect x="-35" y="-45" width="60" height="70" rx="5" ry="5" class="doc-green" />
      <rect x="-40" y="-50" width="60" height="70" rx="5" ry="5" class="doc-red" />
      
      <!-- Document lines -->
      <rect x="-25" y="-35" width="40" height="3" class="doc-text" />
      <rect x="-25" y="-28" width="40" height="3" class="doc-text" />
      <rect x="-25" y="-21" width="40" height="3" class="doc-text" />
      <rect x="-25" y="-14" width="40" height="3" class="doc-text" />
      <rect x="-25" y="-7" width="40" height="3" class="doc-text" />
      
      <!-- Label -->
      <text x="0" y="50" class="text">Raw Documents</text>
    </g>
    
    <!-- Parsing -->
    <g transform="translate(280, 150)">
      <!-- Microscope -->
      <g class="float" style="animation-duration: 4s;">
        <circle cx="0" cy="-20" r="25" class="microscope pulse" />
        <rect x="-10" y="0" width="20" height="30" class="microscope-base" />
        <rect x="-20" y="15" width="40" height="8" class="microscope-base" />
        <circle cx="-8" cy="10" r="4" class="microscope-dot pulse" />
        <circle cx="8" cy="20" r="4" class="microscope-dot pulse" />
      </g>
      
      <!-- Label -->
      <text x="0" y="50" class="text">Parsing</text>
    </g>
    
    <!-- Chunking -->
    <g transform="translate(440, 150)">
      <!-- Scissors -->
      <g class="float" style="animation-duration: 5s;">
        <!-- Simple scissors shape that will render reliably -->
        <path d="M-20,0 C-15,-20 15,-20 20,0" class="scissors" />
        <path d="M-20,-40 L20,0" class="scissors" />
        <path d="M20,-40 L-20,0" class="scissors" />
      </g>
      
      <!-- Label -->
      <text x="0" y="50" class="text">Chunking</text>
    </g>
    
    <!-- QA Creation -->
    <g transform="translate(600, 150)" class="float">
      <!-- Window -->
      <rect x="-35" y="-50" width="70" height="70" rx="8" ry="8" class="qa-window" />
      <rect x="-35" y="-50" width="70" height="15" rx="8" ry="8" class="qa-header" />
      
      <!-- Q&A bubbles -->
      <rect x="-30" y="-30" width="60" height="15" rx="4" ry="4" class="qa-question pulse" />
      <rect x="-30" y="-10" width="45" height="15" rx="4" ry="4" class="qa-answer pulse" />
      <text x="-22" y="-20" fill="#ffffff" font-size="10">Q</text>
      <text x="-22" y="0" fill="#ffffff" font-size="10">A</text>
      
      <!-- Label -->
      <text x="0" y="50" class="text">QA Creation</text>
    </g>
    
    <!-- Horizontal Arrows -->
    <path d="M160,150 L240,150" class="arrow" />
    <path d="M320,150 L400,150" class="arrow" />
    <path d="M480,150 L560,150" class="arrow" />
    
    <!-- Vertical arrows -->
    <path d="M440,180 L440,230" class="arrow" />
    <path d="M600,180 L600,230" class="arrow" />
    
    <!-- Output boxes -->
    <g class="pulse" style="animation-duration: 4s;">
      <rect x="390" y="230" width="100" height="50" class="box" />
      <text x="440" y="260" class="text">Corpus</text>
    </g>
    
    <g class="pulse" style="animation-duration: 4s; animation-delay: 1s;">
      <rect x="550" y="230" width="100" height="50" class="box" />
      <text x="600" y="260" class="text">QA Data</text>
    </g>
  </g>
  
  <!-- Floating particles -->
  <circle cx="150" cy="100" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 0.5s;" />
  <circle cx="250" cy="200" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 1s;" />
  <circle cx="350" cy="100" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 1.5s;" />
  <circle cx="450" cy="200" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 2s;" />
  <circle cx="550" cy="100" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 2.5s;" />
  <circle cx="650" cy="200" r="1.5" fill="#5ce2e7" opacity="0.3" class="float" style="animation-delay: 3s;" />
</svg>
