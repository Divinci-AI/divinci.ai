<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .eco-title { font-family: 'Georgia', serif; font-size: 32px; font-weight: bold; fill: #c9974a; }
      .eco-subtitle { font-family: 'Georgia', serif; font-size: 15px; fill: #5a6b5f; font-style: italic; }
      .input-label { font-family: 'Arial', sans-serif; font-size: 14px; font-weight: 700; fill: white; text-transform: uppercase; }
      .cycle-label { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: 700; fill: #2d5f7f; text-transform: uppercase; }
      .center-label { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 700; fill: white; text-transform: uppercase; }
    </style>
    
    <!-- Gradients -->
    <linearGradient id="outer-ring-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5aa8d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6fa3;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="gold-ring-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9974a;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="inner-circle-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a4f;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="teal-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4ba3a8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d7a7f;stop-opacity:1" />
    </linearGradient>

    <!-- Arrow markers -->
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2d5f7f" />
    </marker>
    <marker id="arrow-gold" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#c9974a" />
    </marker>
    <marker id="arrow-teal" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#4ba3a8" />
    </marker>
  </defs>

  <!-- Title -->
  <text x="600" y="45" text-anchor="middle" class="eco-title">UNIVERSAL BASIC INCOME ECOSYSTEM</text>
  <text x="600" y="75" text-anchor="middle" class="eco-subtitle">How funding sources flow through distribution to create circular economic growth</text>

  <!-- INPUT SECTION (Top) -->
  <g id="inputs">
    <!-- Government Savings -->
    <g id="input1">
      <rect x="50" y="140" width="280" height="50" rx="25" fill="#2d5f7f"/>
      <polygon points="340,165 370,150 370,180" fill="#2d5f7f"/>
      <circle cx="375" cy="165" r="15" fill="none" stroke="#2d5f7f" stroke-width="4"/>
      <text x="190" y="172" text-anchor="middle" class="input-label">Government Savings</text>
    </g>

    <!-- Technology Gains -->
    <g id="input2">
      <rect x="460" y="140" width="280" height="50" rx="25" fill="#2d5f7f"/>
      <polygon points="750,165 780,150 780,180" fill="#2d5f7f"/>
      <circle cx="785" cy="165" r="15" fill="none" stroke="#2d5f7f" stroke-width="4"/>
      <text x="600" y="172" text-anchor="middle" class="input-label">Technology Gains</text>
    </g>

    <!-- Cryptocurrency Flow -->
    <g id="input3">
      <rect x="870" y="140" width="280" height="50" rx="25" fill="#2d5f7f"/>
      <polygon points="1160,165 1190,150 1190,180" fill="#2d5f7f"/>
      <circle cx="1195" cy="165" r="15" fill="none" stroke="#2d5f7f" stroke-width="4"/>
      <text x="1010" y="172" text-anchor="middle" class="input-label">Cryptocurrency Flow</text>
    </g>
  </g>

  <!-- Arrows flowing down to UBI circle (center: 600,350, radius: 85) -->
  <!-- Left arrow: from input1 to upper-left edge of circle -->
  <path d="M 375 180 Q 400 250, 540 310" stroke="#c9974a" stroke-width="4" fill="none" marker-end="url(#arrow-gold)"/>
  <!-- Center arrow: from input2 straight down to top edge of circle -->
  <path d="M 600 180 L 600 265" stroke="#c9974a" stroke-width="4" fill="none" marker-end="url(#arrow-gold)"/>
  <!-- Right arrow: from input3 to upper-right edge of circle -->
  <path d="M 1010 180 Q 800 250, 660 310" stroke="#c9974a" stroke-width="4" fill="none" marker-end="url(#arrow-gold)"/>

  <!-- Central UBI Logo (improved from standalone) -->
  <g id="ubi-logo">
    <!-- Outer blue ring -->
    <circle cx="600" cy="350" r="85" fill="none" stroke="url(#outer-ring-grad)" stroke-width="6"/>
    
    <!-- Gold ring -->
    <circle cx="600" cy="350" r="72" fill="none" stroke="url(#gold-ring-grad)" stroke-width="5"/>
    
    <!-- Inner blue circle background -->
    <circle cx="600" cy="350" r="62" fill="url(#inner-circle-grad)"/>
    
    <!-- UBI Text -->
    <text x="600" y="375" 
          text-anchor="middle" 
          font-family="Arial Black, Arial Bold, Helvetica, sans-serif" 
          font-size="58" 
          font-weight="900"
          fill="#c9974a"
          letter-spacing="-3">UBI</text>
  </g>

  <!-- UBI Distribution System Box -->
  <g id="distribution">
    <rect x="400" y="450" width="400" height="55" rx="10" fill="#c9974a" stroke="#1a3a4f" stroke-width="3"/>
    <text x="600" y="485" text-anchor="middle" class="center-label" style="font-size: 20px;">UBI Distribution System</text>
  </g>

  <!-- Arrow down to circular economy -->
  <path d="M 600 505 L 600 570" stroke="#4ba3a8" stroke-width="6" fill="none" marker-end="url(#arrow-teal)"/>

  <!-- Circular Economy Section -->
  <g id="circular-economy">
    <!-- Outer rotation circle -->
    <circle cx="600" cy="750" r="180" fill="none" stroke="#2d5f7f" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Middle rotation circle -->
    <circle cx="600" cy="750" r="135" fill="none" stroke="#c9974a" stroke-width="4" stroke-dasharray="10,5"/>
    
    <!-- Center circle -->
    <circle cx="600" cy="750" r="85" fill="url(#inner-circle-grad)"/>
    
    <!-- Center gears/cogs -->
    <g transform="translate(600, 750)">
      <!-- Large center gear -->
      <circle cx="0" cy="0" r="40" fill="#1a3a4f" stroke="#c9974a" stroke-width="3"/>
      <circle cx="0" cy="0" r="25" fill="#2d5f7f"/>
      <path d="M -5,-40 L 5,-40 L 5,-48 L -5,-48 Z" fill="#c9974a"/>
      <path d="M -5,40 L 5,40 L 5,48 L -5,48 Z" fill="#c9974a"/>
      <path d="M -40,-5 L -40,5 L -48,5 L -48,-5 Z" fill="#c9974a"/>
      <path d="M 40,-5 L 40,5 L 48,5 L 48,-5 Z" fill="#c9974a"/>
      
      <!-- Small top gear -->
      <circle cx="-25" cy="-25" r="15" fill="#4ba3a8" stroke="#c9974a" stroke-width="2"/>
      <circle cx="-25" cy="-25" r="8" fill="#2d7a7f"/>
      
      <!-- Small bottom gear -->
      <circle cx="25" cy="25" r="15" fill="#c9974a" stroke="#2d5f7f" stroke-width="2"/>
      <circle cx="25" cy="25" r="8" fill="#d4a574"/>
    </g>
    
    <!-- Center label -->
    <text x="600" y="758" text-anchor="middle" class="center-label" style="font-size: 16px;">ECONOMIC</text>
    <text x="600" y="780" text-anchor="middle" class="center-label" style="font-size: 16px;">ACTIVITY</text>

    <!-- Circular flow labels (clockwise from top) -->
    <!-- Economic Growth (top right) -->
    <text x="750" y="650" text-anchor="middle" class="cycle-label">Economic Growth</text>
    
    <!-- Investment (right) -->
    <text x="810" y="750" text-anchor="middle" class="cycle-label">Investment</text>
    
    <!-- Innovation (bottom right) -->
    <text x="750" y="850" text-anchor="middle" class="cycle-label">Innovation</text>
    
    <!-- Investment (bottom) -->
    <text x="600" y="915" text-anchor="middle" class="cycle-label">Investment</text>
    
    <!-- Consumption (bottom left) -->
    <text x="450" y="850" text-anchor="middle" class="cycle-label">Consumption</text>
    
    <!-- Tax Revenue (left) -->
    <text x="390" y="750" text-anchor="middle" class="cycle-label">Tax Revenue</text>
    
    <!-- Arrows showing circular flow (Blue outer ring - clockwise) -->
    <path d="M 750,590 A 180,180 0 0,1 850,680" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 865,750 A 180,180 0 0,1 850,820" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 780,890 A 180,180 0 0,1 650,930" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 550,930 A 180,180 0 0,1 420,890" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 350,820 A 180,180 0 0,1 335,750" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    <path d="M 350,680 A 180,180 0 0,1 450,590" stroke="#2d5f7f" stroke-width="6" fill="none" marker-end="url(#arrow-blue)"/>
    
    <!-- Gold middle ring (counter-clockwise) -->
    <path d="M 530,595 A 135,135 0 0,0 455,640" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
    <path d="M 420,700 A 135,135 0 0,0 420,800" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
    <path d="M 455,860 A 135,135 0 0,0 530,905" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
    <path d="M 670,905 A 135,135 0 0,0 745,860" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
    <path d="M 780,800 A 135,135 0 0,0 780,700" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
    <path d="M 745,640 A 135,135 0 0,0 670,595" stroke="#c9974a" stroke-width="5" fill="none" marker-end="url(#arrow-gold)" opacity="0.8"/>
  </g>

  <!-- Return arrow to top (tax revenue feeds back) -->
  <path d="M 390 680 Q 150 400, 190 200" stroke="#4ba3a8" stroke-width="3" fill="none" stroke-dasharray="8,4" marker-end="url(#arrow-teal)"/>
  <text x="100" y="440" class="cycle-label" style="font-size: 12px; fill: #4ba3a8;">Revenue</text>
  <text x="100" y="460" class="cycle-label" style="font-size: 12px; fill: #4ba3a8;">Returns</text>
</svg>
