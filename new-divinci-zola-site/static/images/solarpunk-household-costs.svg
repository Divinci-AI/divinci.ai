<svg viewBox="0 0 1400 800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .household-title { font-family: 'Georgia', serif; font-size: 32px; font-weight: bold; fill: #2d3c34; }
      .household-subtitle { font-family: 'Georgia', serif; font-size: 16px; fill: #5a6b5f; font-style: italic; }
      .column-title { font-family: 'Arial', sans-serif; font-size: 24px; font-weight: 700; }
      .category-label { font-family: 'Arial', sans-serif; font-size: 15px; font-weight: 600; fill: #2d3c34; }
      .cost-value { font-family: 'Arial', sans-serif; font-size: 16px; font-weight: bold; }
      .total-label { font-family: 'Arial', sans-serif; font-size: 20px; font-weight: 700; fill: #fff; }
      .savings-note { font-family: 'Arial', sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <linearGradient id="traditional-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e74c3c;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#c0392b;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="solarpunk-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="700" y="40" text-anchor="middle" class="household-title">Monthly Household Costs: Traditional vs. Solarpunk Living</text>
  <text x="700" y="65" text-anchor="middle" class="household-subtitle">How technology and sustainable systems reduce cost of living by 40-60%</text>

  <!-- Traditional Column -->
  <g id="traditional">
    <rect x="80" y="100" width="520" height="600" rx="12" fill="#fef5f5" stroke="#e74c3c" stroke-width="3"/>
    <text x="340" y="140" text-anchor="middle" class="column-title" style="fill: #c0392b;">Traditional Living (2025)</text>

    <!-- Housing -->
    <rect x="110" y="170" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="200" class="category-label">🏠 Housing (rent/mortgage)</text>
    <text x="530" y="200" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$1,800</text>

    <!-- Utilities -->
    <rect x="110" y="230" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="260" class="category-label">⚡ Utilities (electric, gas, water)</text>
    <text x="530" y="260" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$250</text>

    <!-- Food -->
    <rect x="110" y="290" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="320" class="category-label">🍎 Food (groceries)</text>
    <text x="530" y="320" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$800</text>

    <!-- Transportation -->
    <rect x="110" y="350" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="380" class="category-label">🚗 Transportation (gas, insurance)</text>
    <text x="530" y="380" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$400</text>

    <!-- Healthcare -->
    <rect x="110" y="410" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="440" class="category-label">🏥 Healthcare (insurance, copays)</text>
    <text x="530" y="440" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$350</text>

    <!-- Home Maintenance -->
    <rect x="110" y="470" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="500" class="category-label">🔧 Home/Vehicle Maintenance</text>
    <text x="530" y="500" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$300</text>

    <!-- Other -->
    <rect x="110" y="530" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="560" class="category-label">📦 Consumer Goods</text>
    <text x="530" y="560" text-anchor="end" class="cost-value" style="fill: #e74c3c;">$200</text>

    <!-- Total Traditional -->
    <rect x="110" y="620" width="460" height="60" rx="8" fill="url(#traditional-grad)"/>
    <text x="340" y="645" text-anchor="middle" class="total-label">TOTAL MONTHLY</text>
    <text x="340" y="670" text-anchor="middle" class="total-label" style="font-size: 28px;">$4,100</text>
  </g>

  <!-- Solarpunk Column -->
  <g id="solarpunk">
    <rect x="800" y="100" width="520" height="600" rx="12" fill="#f0f9f4" stroke="#27ae60" stroke-width="3"/>
    <text x="1060" y="140" text-anchor="middle" class="column-title" style="fill: #229954;">Solarpunk Living (2035)</text>

    <!-- Housing -->
    <rect x="830" y="170" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="195" class="category-label">🏠 Housing (robot-built at-cost)</text>
    <text x="850" y="208" class="savings-note">30-40% construction savings</text>
    <text x="1250" y="200" text-anchor="end" class="cost-value" style="fill: #27ae60;">$900</text>

    <!-- Utilities -->
    <rect x="830" y="230" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="255" class="category-label">⚡ Utilities (solar+battery, minimal)</text>
    <text x="850" y="268" class="savings-note">Off-grid, 70% reduction</text>
    <text x="1250" y="260" text-anchor="end" class="cost-value" style="fill: #27ae60;">$75</text>

    <!-- Food -->
    <rect x="830" y="290" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="315" class="category-label">🍎 Food (70% self-grown)</text>
    <text x="850" y="328" class="savings-note">Robotic vertical farm systems</text>
    <text x="1250" y="320" text-anchor="end" class="cost-value" style="fill: #27ae60;">$300</text>

    <!-- Transportation -->
    <rect x="830" y="350" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="375" class="category-label">🚗 Transportation (EV, cheap fusion)</text>
    <text x="850" y="388" class="savings-note">80% lower energy costs</text>
    <text x="1250" y="380" text-anchor="end" class="cost-value" style="fill: #27ae60;">$120</text>

    <!-- Healthcare -->
    <rect x="830" y="410" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="435" class="category-label">🏥 Healthcare (preventive, AI assist)</text>
    <text x="850" y="448" class="savings-note">Better outcomes, lower costs</text>
    <text x="1250" y="440" text-anchor="end" class="cost-value" style="fill: #27ae60;">$250</text>

    <!-- Home Maintenance -->
    <rect x="830" y="470" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="495" class="category-label">🔧 Maintenance (robotic assistance)</text>
    <text x="850" y="508" class="savings-note">AI diagnostics, robot repair help</text>
    <text x="1250" y="500" text-anchor="end" class="cost-value" style="fill: #27ae60;">$100</text>

    <!-- Other -->
    <rect x="830" y="530" width="460" height="50" rx="6" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <text x="850" y="555" class="category-label">📦 Consumer Goods</text>
    <text x="850" y="568" class="savings-note">Fusion-powered manufacturing</text>
    <text x="1250" y="560" text-anchor="end" class="cost-value" style="fill: #27ae60;">$150</text>

    <!-- Total Solarpunk -->
    <rect x="830" y="620" width="460" height="60" rx="8" fill="url(#solarpunk-grad)"/>
    <text x="1060" y="645" text-anchor="middle" class="total-label">TOTAL MONTHLY</text>
    <text x="1060" y="670" text-anchor="middle" class="total-label" style="font-size: 28px;">$1,895</text>
  </g>

  <!-- Savings Arrow -->
  <g id="savings-arrow">
    <path d="M 620 400 L 780 400" stroke="#f39c12" stroke-width="8" fill="none"/>
    <polygon points="780 390, 800 400, 780 410" fill="#f39c12"/>
    <text x="700" y="390" text-anchor="middle" class="category-label" style="fill: #f39c12; font-size: 18px;">SAVES</text>
    <text x="700" y="430" text-anchor="middle" class="category-label" style="fill: #f39c12; font-size: 32px; font-weight: 900;">$2,205/mo</text>
    <text x="700" y="455" text-anchor="middle" class="savings-note" style="fill: #f39c12; font-size: 14px;">54% reduction</text>
  </g>

  <!-- Bottom note -->
  <text x="700" y="760" text-anchor="middle" class="savings-note" style="font-size: 14px;">
    Combined with $1,200-2,000 UBI cash payment = $3,095-3,895 total monthly value in moderate scenario
  </text>
</svg>