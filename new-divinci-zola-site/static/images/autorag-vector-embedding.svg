<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" aria-labelledby="title-vec-emb desc-vec-emb">
  <title id="title-vec-emb">Vector Embedding Visualization</title>
  <desc id="desc-vec-emb">Visualization of how text is converted to vector embeddings and stored in a vector database</desc>
  
  <defs>
    <!-- Styles -->
    <style>
      /* Base styles using the Divinci color palette */
      .vec-emb-bg { fill: #F5F7FA; }
      .vec-emb-container { fill: #F5F7FA; stroke: #485262; stroke-width: 1.5; rx: 6; ry: 6; }
      .vec-emb-connection { stroke: #2E5BFF; stroke-width: 2; fill: none; }
      .vec-emb-highlight { stroke: #8C54FF; stroke-width: 2.5; fill: none; }
      
      .vec-emb-box { fill: #F5F7FA; stroke: #00D8D8; stroke-width: 1.5; rx: 4; ry: 4; }
      .vec-emb-model { fill: #F0F5FF; stroke: #8C54FF; stroke-width: 2; rx: 5; ry: 5; }
      .vec-emb-db { fill: #F5F7FA; stroke: #2E5BFF; stroke-width: 2; rx: 3; ry: 3; }
      
      .vec-emb-text-item { fill: #2E5BFF; opacity: 0.8; }
      .vec-emb-vector { fill: #8C54FF; }
      
      .vec-emb-text {
        font-family: 'Inter', sans-serif;
        fill: #485262;
        font-size: 10px;
      }
      .vec-emb-title { 
        font-size: 12px; 
        font-weight: 500;
      }
      
      /* Animation */
      @keyframes vecFlow {
        from { stroke-dashoffset: 100; }
        to { stroke-dashoffset: 0; }
      }
      
      .vec-emb-animated {
        stroke-dasharray: 5, 3;
        animation: vecFlow 4s linear infinite;
      }
      
      @keyframes vecPulse {
        0%, 100% { opacity: 0.9; }
        50% { opacity: 1; }
      }
      
      .vec-emb-pulse {
        animation: vecPulse 2s ease-in-out infinite;
      }
      
      /* Vector coordinates animation */
      @keyframes vecValues {
        0% { opacity: 0.4; }
        50% { opacity: 1; }
        100% { opacity: 0.4; }
      }
      
      .vec-coord-1 { animation: vecValues 2.0s ease-in-out 0.0s infinite; }
      .vec-coord-2 { animation: vecValues 2.0s ease-in-out 0.4s infinite; }
      .vec-coord-3 { animation: vecValues 2.0s ease-in-out 0.8s infinite; }
      .vec-coord-4 { animation: vecValues 2.0s ease-in-out 1.2s infinite; }
      .vec-coord-5 { animation: vecValues 2.0s ease-in-out 1.6s infinite; }
    </style>
  </defs>
  
  <!-- Background -->
  <rect width="300" height="200" class="vec-emb-bg"/>
  
  <!-- Text Chunks -->
  <g transform="translate(20, 40)">
    <rect width="70" height="80" class="vec-emb-container"/>
    <text x="35" y="20" class="vec-emb-title" text-anchor="middle">Text Chunks</text>
    
    <!-- Text chunk representations -->
    <rect x="15" y="30" width="40" height="8" rx="2" ry="2" class="vec-emb-text-item"/>
    <rect x="15" y="43" width="40" height="8" rx="2" ry="2" class="vec-emb-text-item"/>
    <rect x="15" y="56" width="40" height="8" rx="2" ry="2" class="vec-emb-text-item"/>
    <rect x="15" y="69" width="40" height="8" rx="2" ry="2" class="vec-emb-text-item"/>
  </g>
  
  <!-- Embedding Model -->
  <g transform="translate(120, 50)">
    <rect width="80" height="60" class="vec-emb-model vec-emb-pulse"/>
    <text x="40" y="25" class="vec-emb-title" text-anchor="middle">Embedding</text>
    <text x="40" y="40" class="vec-emb-title" text-anchor="middle">Model</text>
    
    <!-- Neural network representation -->
    <circle cx="25" cy="55" r="3" fill="#8C54FF" opacity="0.6"/>
    <circle cx="25" cy="45" r="3" fill="#8C54FF" opacity="0.6"/>
    <circle cx="40" cy="50" r="3" fill="#8C54FF" opacity="0.9"/>
    <circle cx="55" cy="55" r="3" fill="#8C54FF" opacity="0.6"/>
    <circle cx="55" cy="45" r="3" fill="#8C54FF" opacity="0.6"/>
    
    <line x1="25" y1="45" x2="40" y2="50" stroke="#8C54FF" stroke-width="0.7" opacity="0.5"/>
    <line x1="25" y1="55" x2="40" y2="50" stroke="#8C54FF" stroke-width="0.7" opacity="0.5"/>
    <line x1="40" y1="50" x2="55" y2="45" stroke="#8C54FF" stroke-width="0.7" opacity="0.5"/>
    <line x1="40" y1="50" x2="55" y2="55" stroke="#8C54FF" stroke-width="0.7" opacity="0.5"/>
  </g>
  
  <!-- Vector Embeddings -->
  <g transform="translate(230, 30)">
    <rect width="50" height="100" class="vec-emb-db"/>
    <text x="25" y="15" class="vec-emb-title" text-anchor="middle">Vector DB</text>
    
    <!-- Vector representations -->
    <g transform="translate(15, 30)">
      <text x="0" y="0" class="vec-emb-text vec-coord-1" font-family="monospace">[0.2,</text>
      <text x="0" y="12" class="vec-emb-text vec-coord-2" font-family="monospace">0.8,</text>
      <text x="0" y="24" class="vec-emb-text vec-coord-3" font-family="monospace">-0.4,</text>
      <text x="0" y="36" class="vec-emb-text vec-coord-4" font-family="monospace">0.1,</text>
      <text x="0" y="48" class="vec-emb-text vec-coord-5" font-family="monospace">0.7]</text>
    </g>
    
    <line x1="10" y1="90" x2="40" y2="90" stroke="#2E5BFF" stroke-width="1"/>
    <line x1="10" y1="95" x2="40" y2="95" stroke="#2E5BFF" stroke-width="1"/>
    <line x1="10" y1="100" x2="40" y2="100" stroke="#2E5BFF" stroke-width="1"/>
  </g>
  
  <!-- Connections -->
  <path d="M90,80 C100,80 110,80 120,80" class="vec-emb-connection vec-emb-animated"/>
  <path d="M200,80 C210,80 220,80 230,80" class="vec-emb-highlight vec-emb-animated"/>
  
  <!-- Semantic Search Box -->
  <g transform="translate(20, 140)">
    <rect width="70" height="40" class="vec-emb-box"/>
    <text x="35" y="25" class="vec-emb-title" text-anchor="middle">Semantic</text>
    <text x="35" y="37" class="vec-emb-title" text-anchor="middle">Search</text>
  </g>
  
  <!-- Context Memory -->
  <g transform="translate(120, 140)">
    <rect width="80" height="40" class="vec-emb-box"/>
    <text x="40" y="25" class="vec-emb-title" text-anchor="middle">Context</text>
    <text x="40" y="37" class="vec-emb-title" text-anchor="middle">Memory</text>
  </g>
  
  <!-- Similarity Metrics -->
  <g transform="translate(230, 140)">
    <rect width="50" height="40" class="vec-emb-box"/>
    <text x="25" y="25" class="vec-emb-title" text-anchor="middle">Similarity</text>
    <text x="25" y="37" class="vec-emb-title" text-anchor="middle">Metrics</text>
  </g>
  
  <!-- Bottom connections -->
  <path d="M255,130 C255,135 255,140 255,140" class="vec-emb-connection" stroke-dasharray="2,2"/>
  <path d="M90,160 L120,160" class="vec-emb-connection" stroke-dasharray="2,2"/>
  <path d="M200,160 L230,160" class="vec-emb-connection" stroke-dasharray="2,2"/>
</svg>