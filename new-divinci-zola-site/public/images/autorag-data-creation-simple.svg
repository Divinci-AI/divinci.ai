<?xml version="1.0" encoding="UTF-8"?>
<svg width="800" height="300" viewBox="0 0 800 300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="300" fill="#0c1229"/>
  
  <!-- Title -->
  <text x="400" y="50" font-family="Arial, sans-serif" font-size="36" fill="white" text-anchor="middle" font-weight="bold">[ Data Creation Process ]</text>
  
  <!-- Document Stack -->
  <g transform="translate(150, 150)">
    <rect x="-40" y="-50" width="80" height="100" rx="5" ry="5" fill="#EA4335"/>
    <rect x="-35" y="-45" width="80" height="100" rx="5" ry="5" fill="#34A853"/>
    <rect x="-30" y="-40" width="80" height="100" rx="5" ry="5" fill="#4285F4"/>
    
    <!-- Document lines -->
    <rect x="-20" y="-30" width="60" height="5" fill="white"/>
    <rect x="-20" y="-20" width="60" height="5" fill="white"/>
    <rect x="-20" y="-10" width="60" height="5" fill="white"/>
    <rect x="-20" y="0" width="60" height="5" fill="white"/>
    <rect x="-20" y="10" width="60" height="5" fill="white"/>
    <rect x="-20" y="20" width="60" height="5" fill="white"/>
    
    <!-- Label -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">Raw Documents</text>
  </g>
  
  <!-- Parsing -->
  <g transform="translate(300, 150)">
    <!-- Microscope -->
    <circle cx="0" cy="-30" r="30" fill="#78909C"/>
    <rect x="-15" y="-10" width="30" height="40" fill="#B0BEC5"/>
    <rect x="-25" y="10" width="50" height="10" fill="#B0BEC5"/>
    <circle cx="-10" cy="5" r="5" fill="#EA4335"/>
    <circle cx="10" cy="15" r="5" fill="#EA4335"/>
    
    <!-- Label -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">Parsing</text>
  </g>
  
  <!-- Chunking -->
  <g transform="translate(450, 150)">
    <!-- Scissors -->
    <path d="M-30,0 C-20,-30 20,-30 30,0" fill="none" stroke="white" stroke-width="5"/>
    <path d="M-30,-60 L30,0" fill="none" stroke="white" stroke-width="5"/>
    <path d="M30,-60 L-30,0" fill="none" stroke="white" stroke-width="5"/>
    
    <!-- Label -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">Chunking</text>
  </g>
  
  <!-- QA Creation -->
  <g transform="translate(600, 150)">
    <!-- Window -->
    <rect x="-50" y="-60" width="100" height="100" rx="10" ry="10" fill="#F5F7FA" stroke="#B0BEC5" stroke-width="2"/>
    <rect x="-50" y="-60" width="100" height="20" rx="10" ry="10" fill="#B0BEC5"/>
    
    <!-- Q&A bubbles -->
    <rect x="-40" y="-30" width="80" height="20" rx="5" ry="5" fill="#FF9800"/>
    <rect x="-40" y="0" width="60" height="20" rx="5" ry="5" fill="#4CAF50"/>
    <text x="-30" y="-15" fill="white" font-size="12" font-family="Arial, sans-serif">Q</text>
    <text x="-30" y="15" fill="white" font-size="12" font-family="Arial, sans-serif">A</text>
    
    <!-- Label -->
    <text x="0" y="80" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">QA Creation</text>
  </g>
  
  <!-- Horizontal Arrows -->
  <path d="M200,150 L250,150" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M350,150 L400,150" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M500,150 L550,150" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Vertical arrows -->
  <path d="M450,180 L450,230" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M600,180 L600,230" stroke="white" stroke-width="3" fill="none" marker-end="url(#arrowhead)"/>
  
  <!-- Output boxes -->
  <rect x="400" y="230" width="100" height="50" rx="15" ry="15" fill="rgba(46, 91, 255, 0.2)" stroke="#5ce2e7" stroke-width="2"/>
  <text x="450" y="260" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">Corpus</text>
  
  <rect x="550" y="230" width="100" height="50" rx="15" ry="15" fill="rgba(46, 91, 255, 0.2)" stroke="#5ce2e7" stroke-width="2"/>
  <text x="600" y="260" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle">QA Data</text>
  
  <!-- Arrow marker definition -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="white"/>
    </marker>
  </defs>
  
  <!-- Background circles -->
  <circle cx="400" cy="150" r="200" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1"/>
  <circle cx="400" cy="150" r="150" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.1"/>
</svg>
