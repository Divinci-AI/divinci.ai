<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .mult-title { font-family: 'Georgia', serif; font-size: 32px; font-weight: bold; fill: #2d3c34; }
      .mult-subtitle { font-family: 'Georgia', serif; font-size: 15px; fill: #5a6b5f; font-style: italic; }
      .flow-label { font-family: 'Arial', sans-serif; font-size: 14px; font-weight: 600; fill: #2d3c34; }
      .amount-label { font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 700; fill: #27ae60; }
      .detail-label { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3c34; }
      .multiplier-label { font-family: 'Arial', sans-serif; font-size: 13px; fill: #666; font-style: italic; }
    </style>
    <linearGradient id="ubi-payment" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="consumer-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f39c12;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#e67e22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="business-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="total-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="mult-title">The UBI Multiplier Effect: How $1 Becomes $2.50</text>
  <text x="600" y="70" text-anchor="middle" class="mult-subtitle">Economic stimulus from UBI spending ripples through the economy, creating jobs and additional economic activity</text>

  <!-- Stage 1: Initial UBI Payment -->
  <g id="stage1">
    <rect x="450" y="120" width="300" height="120" rx="12" fill="url(#ubi-payment)" opacity="0.2"/>
    <rect x="470" y="140" width="260" height="60" rx="8" fill="url(#ubi-payment)"/>
    <text x="600" y="165" text-anchor="middle" class="flow-label" style="fill: white; font-size: 16px;">STAGE 1: UBI PAYMENT</text>
    <text x="600" y="190" text-anchor="middle" class="amount-label" style="fill: white; font-size: 24px;">$1,500/month</text>

    <text x="600" y="225" text-anchor="middle" class="detail-label">Deposited directly to 250M American adults</text>
  </g>

  <!-- Arrow down -->
  <path d="M 600 260 L 600 310" stroke="#2d3c34" stroke-width="4" fill="none" marker-end="url(#arrow-down)"/>
  <text x="630" y="290" class="multiplier-label">Direct spending</text>

  <!-- Stage 2: Consumer Spending (Round 1) -->
  <g id="stage2">
    <rect x="50" y="330" width="1100" height="150" rx="12" fill="url(#consumer-grad)" opacity="0.15"/>
    <rect x="420" y="350" width="360" height="40" rx="8" fill="url(#consumer-grad)"/>
    <text x="600" y="377" text-anchor="middle" class="flow-label" style="fill: white;">STAGE 2: CONSUMER SPENDING (Round 1)</text>

    <!-- Spending categories -->
    <g>
      <rect x="80" y="410" width="200" height="50" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
      <text x="180" y="432" text-anchor="middle" class="flow-label" style="font-size: 12px;">🏪 Local Businesses</text>
      <text x="180" y="450" text-anchor="middle" class="amount-label" style="font-size: 14px;">$450</text>
    </g>

    <g>
      <rect x="310" y="410" width="200" height="50" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
      <text x="410" y="432" text-anchor="middle" class="flow-label" style="font-size: 12px;">🍎 Groceries/Food</text>
      <text x="410" y="450" text-anchor="middle" class="amount-label" style="font-size: 14px;">$400</text>
    </g>

    <g>
      <rect x="540" y="410" width="200" height="50" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
      <text x="640" y="432" text-anchor="middle" class="flow-label" style="font-size: 12px;">🏠 Housing/Utilities</text>
      <text x="640" y="450" text-anchor="middle" class="amount-label" style="font-size: 14px;">$450</text>
    </g>

    <g>
      <rect x="770" y="410" width="200" height="50" rx="6" fill="#fff" stroke="#f39c12" stroke-width="2"/>
      <text x="870" y="432" text-anchor="middle" class="flow-label" style="font-size: 12px;">🚗 Transportation</text>
      <text x="870" y="450" text-anchor="middle" class="amount-label" style="font-size: 14px;">$200</text>
    </g>
  </g>

  <!-- Arrow down -->
  <path d="M 600 500 L 600 550" stroke="#2d3c34" stroke-width="4" fill="none" marker-end="url(#arrow-down)"/>
  <text x="630" y="530" class="multiplier-label">Business revenue</text>

  <!-- Stage 3: Business Spending (Round 2) -->
  <g id="stage3">
    <rect x="100" y="570" width="1000" height="150" rx="12" fill="url(#business-grad)" opacity="0.15"/>
    <rect x="420" y="590" width="360" height="40" rx="8" fill="url(#business-grad)"/>
    <text x="600" y="617" text-anchor="middle" class="flow-label" style="fill: white;">STAGE 3: BUSINESS SPENDING (Round 2)</text>

    <!-- Business spending categories -->
    <g>
      <rect x="130" y="650" width="200" height="50" rx="6" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="230" y="670" text-anchor="middle" class="flow-label" style="font-size: 12px;">👷 Employee Wages</text>
      <text x="230" y="690" text-anchor="middle" class="amount-label" style="font-size: 14px;">$600</text>
    </g>

    <g>
      <rect x="360" y="650" width="200" height="50" rx="6" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="460" y="670" text-anchor="middle" class="flow-label" style="font-size: 12px;">📦 Suppliers/Inventory</text>
      <text x="460" y="690" text-anchor="middle" class="amount-label" style="font-size: 14px;">$500</text>
    </g>

    <g>
      <rect x="590" y="650" width="200" height="50" rx="6" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="690" y="670" text-anchor="middle" class="flow-label" style="font-size: 12px;">🏗️ Business Investment</text>
      <text x="690" y="690" text-anchor="middle" class="amount-label" style="font-size: 14px;">$400</text>
    </g>

    <g>
      <rect x="820" y="650" width="200" height="50" rx="6" fill="#fff" stroke="#9b59b6" stroke-width="2"/>
      <text x="920" y="670" text-anchor="middle" class="flow-label" style="font-size: 12px;">📊 Services/Marketing</text>
      <text x="920" y="690" text-anchor="middle" class="amount-label" style="font-size: 14px;">$250</text>
    </g>
  </g>

  <!-- Circular flow arrow (Round 2 continues) -->
  <path d="M 230 720 Q 150 800, 300 850" stroke="#9b59b6" stroke-width="3" fill="none" stroke-dasharray="5,5" marker-end="url(#arrow-curve)"/>
  <text x="200" y="800" class="multiplier-label" style="fill: #9b59b6;">Round 3, 4, 5...</text>
  <text x="200" y="818" class="multiplier-label" style="fill: #9b59b6; font-size: 10px;">Each $1 spent triggers</text>
  <text x="200" y="833" class="multiplier-label" style="fill: #9b59b6; font-size: 10px;">more economic activity</text>

  <!-- Total Economic Impact Box -->
  <g id="total-impact">
    <rect x="450" y="770" width="700" height="180" rx="12" fill="url(#total-grad)"/>

    <text x="800" y="815" text-anchor="middle" class="flow-label" style="fill: white; font-size: 22px;">TOTAL ECONOMIC IMPACT</text>
    <text x="800" y="860" text-anchor="middle" class="amount-label" style="fill: white; font-size: 40px;">$1,500 → $3,750</text>
    <text x="800" y="895" text-anchor="middle" class="detail-label" style="fill: white; font-size: 14px;">Multiplier Effect: 2.5x</text>

    <text x="800" y="925" text-anchor="middle" class="detail-label" style="fill: white; opacity: 0.9;">Every $1 in UBI generates $2.50 in total economic activity</text>
  </g>

  <!-- Key Insights Box (Left side) -->
  <g id="insights">
    <rect x="50" y="770" width="370" height="180" rx="10" fill="#f9f9f9" stroke="#2d3c34" stroke-width="2"/>
    <text x="235" y="800" text-anchor="middle" class="flow-label" style="font-size: 16px;">📈 Why the Multiplier Works</text>

    <text x="70" y="830" class="detail-label" style="font-weight: 600;">✅ High Marginal Propensity to Consume</text>
    <text x="80" y="848" class="detail-label">Low-income households spend 95%+ immediately</text>

    <text x="70" y="873" class="detail-label" style="font-weight: 600;">✅ Local Economic Circulation</text>
    <text x="80" y="891" class="detail-label">Money stays in communities, creating jobs</text>

    <text x="70" y="916" class="detail-label" style="font-weight: 600;">✅ Business Investment Trigger</text>
    <text x="80" y="934" class="detail-label">Increased demand → expansion &amp; hiring</text>
  </g>

  <!-- Bottom Research Citation -->
  <rect x="50" y="970" width="1100" height="15" fill="none"/>
  <text x="600" y="983" text-anchor="middle" class="detail-label" style="font-size: 10px; opacity: 0.6;">
    Source: Roosevelt Institute 2017 modeling study found $1,000/month UBI could expand economy 12.56% over 8 years via multiplier effects (Nikiforos et al.)
  </text>

  <!-- Arrow markers -->
  <defs>
    <marker id="arrow-down" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#2d3c34" />
    </marker>
    <marker id="arrow-curve" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#9b59b6" />
    </marker>
  </defs>
</svg>
