<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450">
  <defs>
    <style>
      .data-creation-bg { fill: #0c1229; }
      .data-creation-text {
        font-family: 'Sora', 'Inter', sans-serif;
        fill: #ffffff;
        font-size: 20px;
        font-weight: 500;
      }
      .data-creation-title {
        font-family: 'Sora', 'Inter', sans-serif;
        fill: #ffffff;
        font-size: 36px;
        font-weight: 600;
      }
      .data-creation-arrow { stroke: #ffffff; stroke-width: 3; fill: none; }
      .data-creation-box {
        fill: rgba(46, 91, 255, 0.2);
        stroke: #5ce2e7;
        stroke-width: 2;
        rx: 20;
        ry: 20;
      }
      
      /* Document colors */
      .doc-blue { fill: #4285F4; }
      .doc-green { fill: #34A853; }
      .doc-red { fill: #EA4335; }
      .doc-text { fill: #ffffff; }
      
      /* Microscope colors */
      .microscope-base { fill: #B0BEC5; }
      .microscope-lens { fill: #78909C; }
      .microscope-stage { fill: #546E7A; }
      .microscope-dot { fill: #EA4335; }
      
      /* QA window colors */
      .qa-window { fill: #F5F7FA; stroke: #B0BEC5; stroke-width: 2; }
      .qa-dot { fill: #FF5252; }
      .qa-question { fill: #FF9800; }
      .qa-answer { fill: #4CAF50; }

      /* Animations */
      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulse {
        0% { opacity: 0.7; }
        50% { opacity: 1; }
        100% { opacity: 0.7; }
      }
      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }
      @keyframes typing {
        0% { width: 0; }
        100% { width: 100%; }
      }
      
      .float { animation: float 6s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .arrow-animate {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: dash 2s linear infinite;
      }
      .doc-stack { animation: float 4s ease-in-out infinite; }
      .qa-bubble-animate { animation: pulse 2s ease-in-out infinite; }
      .corpus-box-animate { animation: pulse 4s ease-in-out infinite; }
      .qa-box-animate { 
        animation: pulse 4s ease-in-out infinite;
        animation-delay: 1s;
      }
    </style>

    <!-- Gradients for glow effects -->
    <radialGradient id="blue-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="green-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5ce2e7" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#5ce2e7" stop-opacity="0" />
    </radialGradient>

    <!-- Arrow marker -->
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" class="data-creation-bg"/>
  
  <!-- Title -->
  <text x="450" y="50" class="data-creation-title" text-anchor="middle">[ Data Creation Process ]</text>
  
  <!-- Step 1: Raw Documents with animated stack -->
  <g transform="translate(120, 180)" class="doc-stack">
    <!-- Document stack with staggered animation -->
    <rect x="-30" y="-20" width="60" height="80" rx="5" ry="5" class="doc-blue">
      <animate attributeName="y" values="-20;-25;-20" dur="4s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-35" y="-25" width="60" height="80" rx="5" ry="5" class="doc-green">
      <animate attributeName="y" values="-25;-30;-25" dur="4s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="-40" y="-30" width="60" height="80" rx="5" ry="5" class="doc-red">
      <animate attributeName="y" values="-30;-35;-30" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    
    <!-- Animated document lines -->
    <rect x="-25" y="-10" width="0" height="3" class="doc-text">
      <animate attributeName="width" values="0;40;40" dur="3s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-25" y="-5" width="0" height="3" class="doc-text">
      <animate attributeName="width" values="0;35;35" dur="3s" repeatCount="indefinite" begin="0.3s" />
    </rect>
    <rect x="-25" y="0" width="0" height="3" class="doc-text">
      <animate attributeName="width" values="0;40;40" dur="3s" repeatCount="indefinite" begin="0.6s" />
    </rect>
    <rect x="-25" y="5" width="0" height="3" class="doc-text">
      <animate attributeName="width" values="0;30;30" dur="3s" repeatCount="indefinite" begin="0.9s" />
    </rect>
    <rect x="-25" y="10" width="0" height="3" class="doc-text">
      <animate attributeName="width" values="0;35;35" dur="3s" repeatCount="indefinite" begin="1.2s" />
    </rect>
    
    <!-- Glow effect -->
    <circle cx="0" cy="15" r="60" fill="url(#blue-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" class="data-creation-text" text-anchor="middle">Raw Documents</text>
  </g>
  
  <!-- Arrow 1 with animation -->
  <path d="M170,180 L250,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)"/>
  
  <!-- Step 2: Parsing with animated microscope -->
  <g transform="translate(300, 180)">
    <!-- Microscope lens with pulsing animation -->
    <circle cx="0" cy="0" r="25" class="microscope-lens">
      <animate attributeName="r" values="25;28;25" dur="3s" repeatCount="indefinite" />
    </circle>
    
    <!-- Microscope base -->
    <rect x="-12" y="15" width="24" height="30" class="microscope-base" />
    <rect x="-20" y="30" width="40" height="8" class="microscope-stage" />
    
    <!-- Scanning beam effect -->
    <line x1="-15" y1="0" x2="15" y2="0" stroke="#5ce2e7" stroke-width="1" opacity="0.5">
      <animate attributeName="y1" values="0;-15;15;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="y2" values="0;-15;15;0" dur="4s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.5;0.8;0.5" dur="4s" repeatCount="indefinite" />
    </line>
    
    <!-- Animated data points -->
    <circle cx="-8" cy="25" r="3" class="microscope-dot pulse">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="8" cy="25" r="3" class="microscope-dot pulse">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" begin="1s" />
    </circle>
    <circle cx="0" cy="30" r="0" fill="#EA4335" opacity="0">
      <animate attributeName="r" values="0;4;0" dur="3s" repeatCount="indefinite" begin="1.5s" />
      <animate attributeName="opacity" values="0;0.7;0" dur="3s" repeatCount="indefinite" begin="1.5s" />
    </circle>
    
    <!-- Glow effect -->
    <circle cx="0" cy="15" r="50" fill="url(#green-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" class="data-creation-text" text-anchor="middle">Parsing</text>
  </g>
  
  <!-- Arrow 2 with animation -->
  <path d="M350,180 L430,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)"/>
  
  <!-- Step 3: Chunking with animated pieces -->
  <g transform="translate(480, 180)">
    <!-- Document chunks with pulsing animation -->
    <rect x="-20" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" begin="0s" />
    </rect>
    <rect x="-3" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="14" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" begin="1s" />
    </rect>
    
    <!-- Animated cutting lines -->
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#5ce2e7" stroke-width="2" stroke-dasharray="5,5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="0s" />
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="3s" repeatCount="indefinite" begin="0s" />
    </line>
    <line x1="-30" y1="5" x2="30" y2="5" stroke="#5ce2e7" stroke-width="2" stroke-dasharray="5,5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" begin="1s" />
      <animate attributeName="stroke-dashoffset" values="0;-10" dur="3s" repeatCount="indefinite" begin="1s" />
    </line>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="40" fill="url(#green-glow)" opacity="0.2" class="pulse" />
    
    <text x="0" y="70" class="data-creation-text" text-anchor="middle">Chunking</text>
  </g>
  
  <!-- Arrow 3 with animation -->
  <path d="M530,180 L610,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)"/>
  
  <!-- Step 4: QA Creation with animated window -->
  <g transform="translate(680, 180)" class="float">
    <!-- Window frame with pulsing opacity -->
    <rect x="-40" y="-40" width="80" height="80" rx="8" ry="8" class="qa-window">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite" />
    </rect>
    <!-- Window title bar -->
    <rect x="-40" y="-40" width="80" height="15" rx="8" ry="8" fill="#B0BEC5" />
    <circle cx="30" cy="-32" r="4" class="qa-dot pulse" />
    
    <!-- Q&A conversation bubbles -->
    <rect x="-30" y="-20" width="60" height="15" rx="4" ry="4" class="qa-question qa-bubble-animate" />
    
    <!-- Animated typing dots in question bubble -->
    <circle cx="-15" cy="-12" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="0s" />
    </circle>
    <circle cx="-8" cy="-12" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="-1" cy="-12" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="1s" />
    </circle>
    
    <!-- Answer bubble with expanding animation -->
    <rect x="-30" y="8" width="45" height="15" rx="4" ry="4" class="qa-answer">
      <animate attributeName="width" values="0;45" dur="2s" repeatCount="indefinite" begin="1.5s" />
    </rect>
    
    <!-- Answer typing dots -->
    <circle cx="-15" cy="15" r="1.5" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2s" />
    </circle>
    <circle cx="-8" cy="15" r="1.5" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2.3s" />
    </circle>
    
    <!-- Data flow lines -->
    <path d="M-20,-35 C0,-45 20,-45 35,-35" fill="none" stroke="#5ce2e7" stroke-width="1" opacity="0">
      <animate attributeName="opacity" values="0;0.5;0" dur="3s" repeatCount="indefinite" />
    </path>
    
    <!-- Glow effect -->
    <circle cx="0" cy="0" r="55" fill="url(#green-glow)" opacity="0.1" class="pulse" />
    
    <text x="0" y="70" class="data-creation-text" text-anchor="middle">QA Creation</text>
  </g>
  
  <!-- Vertical arrows to outputs -->
  <path d="M480,220 L470,260" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)"/>
  <path d="M680,220 L650,260" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)"/>
  
  <!-- Output boxes with animations -->
  <g class="corpus-box-animate">
    <rect x="410" y="280" width="120" height="60" class="data-creation-box">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" />
    </rect>
    <!-- Data visualization inside corpus -->
    <g transform="translate(470, 310)">
      <rect x="-30" y="-10" width="8" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="0s" />
      </rect>
      <rect x="-18" y="-10" width="8" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="0.3s" />
      </rect>
      <rect x="-6" y="-10" width="8" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="0.6s" />
      </rect>
      <rect x="6" y="-10" width="8" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="0.9s" />
      </rect>
      <rect x="18" y="-10" width="8" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.7;0.3" dur="3s" repeatCount="indefinite" begin="1.2s" />
      </rect>
    </g>
    <text x="470" y="325" class="data-creation-text" text-anchor="middle">Corpus</text>
  </g>
  
  <g class="qa-box-animate">
    <rect x="590" y="280" width="120" height="60" class="data-creation-box">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    <!-- QA pairs visualization -->
    <g transform="translate(650, 310)">
      <rect x="-30" y="-10" width="20" height="4" fill="#FF9800" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="0s" />
      </rect>
      <rect x="-5" y="-10" width="12" height="4" fill="#4CAF50" opacity="0.5">
        <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite" begin="0.3s" />
      </rect>
      <rect x="10" y="-10" width="4" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="0.6s" />
      </rect>
      <rect x="18" y="-10" width="4" height="4" fill="#ffffff" opacity="0.3">
        <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3s" repeatCount="indefinite" begin="0.9s" />
      </rect>
    </g>
    <text x="650" y="325" class="data-creation-text" text-anchor="middle">QA Data</text>
  </g>

  <!-- Animated particles flowing between steps -->
  <circle cx="210" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="390" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="570" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Background sacred geometry (subtle) -->
  <circle cx="450" cy="225" r="180" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.05">
    <animateTransform attributeName="transform" type="rotate" values="0 450 225;360 450 225" dur="60s" repeatCount="indefinite" />
  </circle>
  <circle cx="450" cy="225" r="220" fill="none" stroke="#5ce2e7" stroke-width="0.5" opacity="0.03">
    <animateTransform attributeName="transform" type="rotate" values="360 450 225;0 450 225" dur="80s" repeatCount="indefinite" />
  </circle>
</svg>