<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    
    <!-- Glow filter for the code elements -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Code pattern -->
    <pattern id="codePattern" patternUnits="userSpaceOnUse" width="4" height="4">
      <rect width="4" height="4" fill="#5ce2e7" fill-opacity="0.05" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="100" cy="100" r="80" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="500" cy="300" r="100" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Grid lines -->
  <g stroke="#5ce2e7" stroke-width="0.5" stroke-opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
  </g>
  
  <!-- API Integration illustration -->
  <g transform="translate(300, 200)" filter="url(#glow)">
    <!-- Client application -->
    <g transform="translate(-120, 0)">
      <rect x="-60" y="-70" width="120" height="140" rx="5" fill="#ffffff" />
      <rect x="-50" y="-60" width="100" height="15" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-40" width="100" height="100" rx="2" fill="url(#codePattern)" />
      
      <!-- Code lines -->
      <rect x="-40" y="-35" width="80" height="5" rx="2" fill="#5ce2e7" opacity="0.7" />
      <rect x="-40" y="-25" width="60" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="-15" width="70" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="-5" width="50" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="5" width="80" height="5" rx="2" fill="#5ce2e7" opacity="0.7" />
      <rect x="-40" y="15" width="65" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="25" width="75" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="35" width="55" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="45" width="80" height="5" rx="2" fill="#5ce2e7" opacity="0.7" />
      
      <text x="0" y="80" font-family="Arial, sans-serif" font-size="12" fill="#16214c" text-anchor="middle">Client</text>
    </g>
    
    <!-- API Server -->
    <g transform="translate(120, 0)">
      <rect x="-60" y="-70" width="120" height="140" rx="5" fill="#ffffff" />
      <rect x="-50" y="-60" width="100" height="15" rx="2" fill="#e0e0e0" />
      <rect x="-50" y="-40" width="100" height="100" rx="2" fill="url(#codePattern)" />
      
      <!-- Code lines -->
      <rect x="-40" y="-35" width="80" height="5" rx="2" fill="#ff9f43" opacity="0.7" />
      <rect x="-40" y="-25" width="60" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="-15" width="70" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="-5" width="50" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="5" width="80" height="5" rx="2" fill="#ff9f43" opacity="0.7" />
      <rect x="-40" y="15" width="65" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="25" width="75" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="35" width="55" height="5" rx="2" fill="#e0e0e0" />
      <rect x="-40" y="45" width="80" height="5" rx="2" fill="#ff9f43" opacity="0.7" />
      
      <text x="0" y="80" font-family="Arial, sans-serif" font-size="12" fill="#16214c" text-anchor="middle">API Server</text>
    </g>
    
    <!-- API Connection -->
    <g>
      <!-- Request arrow -->
      <path d="M-50,0 L50,0" stroke="#5ce2e7" stroke-width="3" stroke-linecap="round" />
      <polygon points="50,0 40,-5 40,5" fill="#5ce2e7" />
      
      <!-- Request label -->
      <rect x="-30" y="-25" width="60" height="20" rx="10" fill="#5ce2e7" fill-opacity="0.2" />
      <text x="0" y="-12" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Request</text>
      
      <!-- Response arrow -->
      <path d="M50,-30 L-50,-30" stroke="#ff9f43" stroke-width="3" stroke-linecap="round" />
      <polygon points="-50,-30 -40,-35 -40,-25" fill="#ff9f43" />
      
      <!-- Response label -->
      <rect x="-30" y="-55" width="60" height="20" rx="10" fill="#ff9f43" fill-opacity="0.2" />
      <text x="0" y="-42" font-family="Arial, sans-serif" font-size="10" fill="white" text-anchor="middle">Response</text>
      
      <!-- Data packets -->
      <g>
        <rect x="-15" y="-5" width="10" height="10" rx="2" fill="#5ce2e7">
          <animate attributeName="x" values="-15;15;45" dur="2s" repeatCount="indefinite" />
        </rect>
        
        <rect x="45" y="-35" width="10" height="10" rx="2" fill="#ff9f43">
          <animate attributeName="x" values="45;15;-15" dur="2s" repeatCount="indefinite" />
        </rect>
      </g>
    </g>
    
    <!-- JSON data -->
    <g transform="translate(0, 60)">
      <rect x="-80" y="-20" width="160" height="40" rx="5" fill="white" fill-opacity="0.9" />
      <text x="0" y="-5" font-family="monospace" font-size="10" fill="#16214c" text-anchor="middle">{"method": "GET",</text>
      <text x="0" y="10" font-family="monospace" font-size="10" fill="#16214c" text-anchor="middle">"endpoint": "/api/v1/data"}</text>
    </g>
  </g>
  
  <!-- Title -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">API Integration</text>
  
  <!-- Divinci Logo -->
  <g transform="translate(40, 40) scale(0.4)">
    <rect width="60" height="60" rx="10" fill="#16214c" stroke="white" stroke-width="2" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">D</text>
  </g>
</svg>
