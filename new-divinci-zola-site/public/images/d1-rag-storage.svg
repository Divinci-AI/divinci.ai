<svg viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="coreGlow">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:0.2" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#f8f9fa"/>

  <!-- Globe representation (center) with rotation -->
  <g>
    <circle cx="400" cy="200" r="80" fill="url(#coreGlow)" opacity="0.3"/>
    <circle cx="400" cy="200" r="80" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.4"/>
    <circle cx="400" cy="200" r="60" fill="none" stroke="url(#grad1)" stroke-width="2" opacity="0.5"/>

    <g transform="translate(400, 200)">
      <ellipse rx="80" ry="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="0 0 0"
          to="360 0 0"
          dur="30s"
          repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="80" ry="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="60 0 0"
          to="420 0 0"
          dur="30s"
          repeatCount="indefinite"/>
      </ellipse>
      <ellipse rx="80" ry="20" fill="none" stroke="url(#grad1)" stroke-width="1.5" opacity="0.5">
        <animateTransform
          attributeName="transform"
          type="rotate"
          from="120 0 0"
          to="480 0 0"
          dur="30s"
          repeatCount="indefinite"/>
      </ellipse>
    </g>
  </g>

  <!-- Edge nodes (distributed around globe) -->
  <g>
    <circle cx="200" cy="100" r="25" fill="url(#grad2)" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="200" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Edge</text>
  </g>

  <g>
    <circle cx="600" cy="100" r="25" fill="url(#grad2)" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="0.5s" repeatCount="indefinite"/>
    </circle>
    <text x="600" y="105" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Edge</text>
  </g>

  <g>
    <circle cx="150" cy="300" r="25" fill="url(#grad2)" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1s" repeatCount="indefinite"/>
    </circle>
    <text x="150" y="305" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Edge</text>
  </g>

  <g>
    <circle cx="650" cy="300" r="25" fill="url(#grad2)" opacity="0.8">
      <animate attributeName="opacity" values="0.4;1;0.4" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <text x="650" y="305" text-anchor="middle" fill="white" font-size="14" font-weight="bold">Edge</text>
  </g>

  <!-- Connection lines with animation -->
  <line x1="200" y1="100" x2="400" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="600" y1="100" x2="400" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="150" y1="300" x2="400" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </line>
  <line x1="650" y1="300" x2="400" y2="200" stroke="url(#grad1)" stroke-width="2" opacity="0.4" stroke-dasharray="10,5">
    <animate attributeName="stroke-dashoffset" from="0" to="30" dur="2s" repeatCount="indefinite"/>
  </line>

  <!-- Database chunks (small rectangles near edges) - positioned consistently above each edge node -->
  <g opacity="0.7">
    <!-- Top-left edge node chunks (centered above cx=200) -->
    <rect x="172" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0s" repeatCount="indefinite"/>
    </rect>
    <rect x="194" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
    </rect>
    <rect x="216" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.6s" repeatCount="indefinite"/>
    </rect>

    <!-- Top-right edge node chunks (centered above cx=600) -->
    <rect x="572" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="594" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="616" y="70" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.8s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom-left edge node chunks (centered above cx=150) -->
    <rect x="122" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.7s" repeatCount="indefinite"/>
    </rect>
    <rect x="144" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="1s" repeatCount="indefinite"/>
    </rect>
    <rect x="166" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="1.3s" repeatCount="indefinite"/>
    </rect>

    <!-- Bottom-right edge node chunks (centered above cx=650) -->
    <rect x="622" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="0.9s" repeatCount="indefinite"/>
    </rect>
    <rect x="644" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="1.2s" repeatCount="indefinite"/>
    </rect>
    <rect x="666" y="320" width="18" height="10" fill="#667eea" rx="2">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" begin="1.5s" repeatCount="indefinite"/>
    </rect>
  </g>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" fill="#2d3748" font-size="24" font-weight="bold">D1 Distributed Database</text>
  <text x="400" y="385" text-anchor="middle" fill="#718096" font-size="15">RAG chunks stored at the edge, close to your users</text>
</svg>
