<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#5ce2e7" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGradient)" />
  
  <!-- Decorative circles -->
  <circle cx="200" cy="150" r="100" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="1000" cy="480" r="150" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.2" />
  <circle cx="600" cy="100" r="50" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  <circle cx="400" cy="500" r="80" fill="none" stroke="#5ce2e7" stroke-width="2" opacity="0.1" />
  
  <!-- Blog post visual element -->
  <rect x="150" y="150" width="300" height="350" rx="10" fill="#ffffff" opacity="0.1" stroke="#5ce2e7" stroke-width="2" />
  <line x1="180" y1="200" x2="420" y2="200" stroke="#5ce2e7" stroke-width="2" opacity="0.5" />
  <line x1="180" y1="240" x2="420" y2="240" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  <line x1="180" y1="280" x2="420" y2="280" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  <line x1="180" y1="320" x2="420" y2="320" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  <line x1="180" y1="360" x2="420" y2="360" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  <line x1="180" y1="400" x2="420" y2="400" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  <line x1="180" y1="440" x2="420" y2="440" stroke="#5ce2e7" stroke-width="2" opacity="0.3" />
  
  <!-- Blog post title -->
  <text x="750" y="250" font-family="Sora, Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">Building Responsible AI</text>
  <text x="750" y="310" font-family="Sora, Arial, sans-serif" font-size="56" font-weight="bold" fill="url(#textGradient)" text-anchor="middle">Systems</text>
  
  <!-- Blog post subtitle -->
  <text x="750" y="380" font-family="Sora, Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">Learn how to build AI systems that are</text>
  <text x="750" y="420" font-family="Sora, Arial, sans-serif" font-size="28" fill="white" text-anchor="middle" opacity="0.9">ethical, transparent, and beneficial</text>
  
  <!-- Author info -->
  <circle cx="650" cy="480" r="30" fill="#5ce2e7" opacity="0.2" stroke="#5ce2e7" stroke-width="2" />
  <text x="650" y="490" font-family="Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">👨‍💻</text>
  <text x="750" y="485" font-family="Sora, Arial, sans-serif" font-size="20" fill="white" text-anchor="middle">By Paul-Marie Carfantan</text>
  
  <!-- URL -->
  <text x="600" y="580" font-family="Arial, sans-serif" font-size="24" fill="white" text-anchor="middle" opacity="0.7">divinci.ai/blog/responsible-ai-systems</text>
</svg>
