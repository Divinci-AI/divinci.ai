<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 450" aria-labelledby="title-data-creation desc-data-creation">
  <title id="title-data-creation">AutoRAG Data Creation Process</title>
  <desc id="desc-data-creation">Animated visualization of the AutoRAG data creation process</desc>

  <defs>
    <style>
      .data-creation-bg { fill: #0c1229; }
      .data-creation-text {
        font-family: 'Sora', 'Inter', sans-serif;
        fill: #ffffff;
        font-size: 28px;
        font-weight: 500;
      }
      .data-creation-title {
        font-family: 'Sora', 'Inter', sans-serif;
        fill: #ffffff;
        font-size: 36px;
        font-weight: 600;
      }
      .data-creation-arrow { stroke: #ffffff; stroke-width: 3; fill: none; }
      .data-creation-box {
        fill: rgba(46, 91, 255, 0.2);
        stroke: #5ce2e7;
        stroke-width: 2;
        rx: 20;
        ry: 20;
      }
      .doc-blue { fill: #4285F4; }
      .doc-green { fill: #34A853; }
      .doc-red { fill: #EA4335; }
      .doc-text { fill: #ffffff; }
      .microscope-base { fill: #B0BEC5; }
      .microscope-lens { fill: #78909C; }
      .microscope-stage { fill: #546E7A; }
      .microscope-dot { fill: #EA4335; }
      .qa-window { fill: #F5F7FA; stroke: #B0BEC5; stroke-width: 2; }
      .qa-dot { fill: #FF5252; }
      .qa-question { fill: #FF9800; }
      .qa-answer { fill: #4CAF50; }

      @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
      }
      @keyframes pulse {
        0% { opacity: 0.7; }
        50% { opacity: 1; }
        100% { opacity: 0.7; }
      }
      @keyframes dash {
        to { stroke-dashoffset: 0; }
      }
      
      .float { animation: float 6s ease-in-out infinite; }
      .pulse { animation: pulse 3s ease-in-out infinite; }
      .arrow-animate {
        stroke-dasharray: 100;
        stroke-dashoffset: 100;
        animation: dash 2s linear infinite;
      }
      .doc-stack { animation: float 4s ease-in-out infinite; }
      .qa-bubble-animate { animation: pulse 2s ease-in-out infinite; }
    </style>

    <radialGradient id="blue-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#4285F4" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#4285F4" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="green-glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#5ce2e7" stop-opacity="0.7" />
      <stop offset="100%" stop-color="#5ce2e7" stop-opacity="0" />
    </radialGradient>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#ffffff"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="450" class="data-creation-bg"/>

  <!-- Title -->
  <text x="450" y="50" class="data-creation-title" text-anchor="middle">[ Data Creation Process ]</text>

  <!-- Raw Documents -->
  <g transform="translate(120, 180)" class="doc-stack">
    <rect x="-30" y="-20" width="60" height="80" rx="5" ry="5" class="doc-blue">
      <animate attributeName="y" values="-20;-25;-20" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect x="-35" y="-25" width="60" height="80" rx="5" ry="5" class="doc-green">
      <animate attributeName="y" values="-25;-30;-25" dur="4s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="-40" y="-30" width="60" height="80" rx="5" ry="5" class="doc-red">
      <animate attributeName="y" values="-30;-35;-30" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    <circle cx="0" cy="15" r="50" fill="url(#blue-glow)" opacity="0.1" class="pulse" />
    <text x="0" y="90" class="data-creation-text" text-anchor="middle">Raw Documents</text>
  </g>

  <!-- Parsing -->
  <g transform="translate(300, 180)">
    <circle cx="0" cy="0" r="25" class="microscope-lens">
      <animate attributeName="r" values="25;27;25" dur="3s" repeatCount="indefinite" />
    </circle>
    <rect x="-12" y="15" width="24" height="30" class="microscope-base" />
    <rect x="-20" y="30" width="40" height="8" class="microscope-stage" />
    <circle cx="-8" cy="25" r="3" class="microscope-dot pulse" />
    <circle cx="8" cy="25" r="3" class="microscope-dot pulse" />
    <circle cx="0" cy="15" r="40" fill="url(#green-glow)" opacity="0.1" class="pulse" />
    <text x="0" y="90" class="data-creation-text" text-anchor="middle">Parsing</text>
  </g>

  <!-- Chunking -->
  <g transform="translate(480, 180)">
    <rect x="-20" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" />
    </rect>
    <rect x="-3" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </rect>
    <rect x="14" y="-20" width="12" height="30" rx="2" fill="#ffffff" opacity="0.8">
      <animate attributeName="opacity" values="0.8;0.4;0.8" dur="2s" repeatCount="indefinite" begin="1s" />
    </rect>
    <line x1="-30" y1="-5" x2="30" y2="-5" stroke="#5ce2e7" stroke-width="2" stroke-dasharray="5,5" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="3s" repeatCount="indefinite" />
    </line>
    <circle cx="0" cy="0" r="35" fill="url(#green-glow)" opacity="0.2" class="pulse" />
    <text x="0" y="90" class="data-creation-text" text-anchor="middle">Chunking</text>
  </g>

  <!-- QA Creation -->
  <g transform="translate(660, 180)" class="float">
    <rect x="-40" y="-40" width="80" height="80" rx="8" ry="8" class="qa-window">
      <animate attributeName="opacity" values="0.9;1;0.9" dur="4s" repeatCount="indefinite" />
    </rect>
    <rect x="-40" y="-40" width="80" height="15" rx="8" ry="8" fill="#B0BEC5" />
    <circle cx="30" cy="-32" r="4" class="qa-dot pulse" />
    
    <!-- Q&A bubbles -->
    <rect x="-30" y="-15" width="60" height="12" rx="4" ry="4" class="qa-question qa-bubble-animate" />
    <circle cx="-15" cy="-9" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" />
    </circle>
    <circle cx="-8" cy="-9" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    <circle cx="-1" cy="-9" r="1.5" fill="#ffffff" opacity="0.7">
      <animate attributeName="opacity" values="0.7;0;0.7" dur="1.5s" repeatCount="indefinite" begin="1s" />
    </circle>
    
    <rect x="-30" y="8" width="45" height="12" rx="4" ry="4" class="qa-answer">
      <animate attributeName="width" values="0;45" dur="2s" repeatCount="indefinite" begin="1.5s" />
    </rect>
    <circle cx="-15" cy="14" r="1.5" fill="#ffffff" opacity="0">
      <animate attributeName="opacity" values="0;0.7;0" dur="2s" repeatCount="indefinite" begin="2s" />
    </circle>
    
    <circle cx="0" cy="0" r="50" fill="url(#green-glow)" opacity="0.1" class="pulse" />
    <text x="0" y="90" class="data-creation-text" text-anchor="middle">QA Creation</text>
  </g>

  <!-- Arrows -->
  <path d="M170,180 L250,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)" />
  <path d="M350,180 L430,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)" />
  <path d="M530,180 L610,180" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)" />

  <!-- Vertical arrows -->
  <path d="M480,220 L480,290" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)" />
  <path d="M660,220 L660,290" class="data-creation-arrow arrow-animate" marker-end="url(#arrow)" />

  <!-- Output boxes -->
  <g class="corpus-box-animate">
    <rect x="410" y="300" width="140" height="70" class="data-creation-box">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" />
    </rect>
    <text x="480" y="345" class="data-creation-text" text-anchor="middle">Corpus</text>
  </g>

  <g class="qa-box-animate">
    <rect x="590" y="300" width="140" height="70" class="data-creation-box">
      <animate attributeName="stroke-width" values="2;3;2" dur="4s" repeatCount="indefinite" begin="1s" />
    </rect>
    <text x="660" y="345" class="data-creation-text" text-anchor="middle">QA Data</text>
  </g>

  <!-- Animated particles -->
  <circle cx="210" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="390" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="570" cy="180" r="3" fill="#5ce2e7" opacity="0.7" class="pulse">
    <animateMotion path="M0,0 L70,0" dur="2s" repeatCount="indefinite" />
  </circle>
</svg>