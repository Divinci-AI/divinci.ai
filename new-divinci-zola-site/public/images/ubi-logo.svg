<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="outer-ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5aa8d9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2d6fa3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gold-ring" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#d4a574;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#c9974a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="inner-circle" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2d5f7f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a3a4f;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Outer blue ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="url(#outer-ring)" stroke-width="4"/>
  
  <!-- Gold ring -->
  <circle cx="100" cy="100" r="85" fill="none" stroke="url(#gold-ring)" stroke-width="6"/>
  
  <!-- Inner blue circle background -->
  <circle cx="100" cy="100" r="75" fill="url(#inner-circle)"/>
  
  <!-- UBI Text - Bold stylized letters -->
  <text x="100" y="128" 
        text-anchor="middle" 
        font-family="Arial Black, Arial Bold, Helvetica, sans-serif" 
        font-size="72" 
        font-weight="900"
        fill="#c9974a"
        letter-spacing="-4">UBI</text>
</svg>
