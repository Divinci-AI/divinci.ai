<?xml version="1.0" encoding="UTF-8"?>
<svg width="600" height="400" viewBox="0 0 600 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#16214c" />
      <stop offset="100%" stop-color="#254284" />
    </linearGradient>
    
    <!-- Glow filter for the vectors -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <!-- Dot pattern -->
    <pattern id="dotPattern" patternUnits="userSpaceOnUse" width="20" height="20">
      <circle cx="10" cy="10" r="1" fill="#5ce2e7" fill-opacity="0.3" />
    </pattern>
  </defs>
  
  <!-- Background -->
  <rect width="600" height="400" fill="url(#bgGradient)" />
  <rect width="600" height="400" fill="url(#dotPattern)" />
  
  <!-- Decorative circles -->
  <circle cx="150" cy="100" r="80" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  <circle cx="450" cy="300" r="100" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.2" />
  
  <!-- Grid lines -->
  <g stroke="#5ce2e7" stroke-width="0.5" stroke-opacity="0.1">
    <line x1="0" y1="100" x2="600" y2="100" />
    <line x1="0" y1="200" x2="600" y2="200" />
    <line x1="0" y1="300" x2="600" y2="300" />
    <line x1="150" y1="0" x2="150" y2="400" />
    <line x1="300" y1="0" x2="300" y2="400" />
    <line x1="450" y1="0" x2="450" y2="400" />
  </g>
  
  <!-- Vector space illustration -->
  <g transform="translate(300, 200)" filter="url(#glow)">
    <!-- Coordinate system -->
    <line x1="-120" y1="0" x2="120" y2="0" stroke="white" stroke-width="2" stroke-opacity="0.7" />
    <line x1="0" y1="-120" x2="0" y2="120" stroke="white" stroke-width="2" stroke-opacity="0.7" />
    <line x1="0" y1="0" x2="60" y2="-60" stroke="white" stroke-width="2" stroke-opacity="0.7" stroke-dasharray="5,5" />
    
    <!-- Axis labels -->
    <text x="125" y="15" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">X</text>
    <text x="15" y="-125" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Y</text>
    <text x="70" y="-65" font-family="Arial, sans-serif" font-size="12" fill="white" text-anchor="middle">Z</text>
    
    <!-- Vector points -->
    <g>
      <!-- Vector 1 -->
      <line x1="0" y1="0" x2="80" y2="-40" stroke="#5ce2e7" stroke-width="2" />
      <circle cx="80" cy="-40" r="6" fill="#5ce2e7" />
      <text x="85" y="-45" font-family="Arial, sans-serif" font-size="10" fill="white">v1</text>
      
      <!-- Vector 2 -->
      <line x1="0" y1="0" x2="-60" y2="-70" stroke="#ff9f43" stroke-width="2" />
      <circle cx="-60" cy="-70" r="6" fill="#ff9f43" />
      <text x="-65" y="-75" font-family="Arial, sans-serif" font-size="10" fill="white">v2</text>
      
      <!-- Vector 3 -->
      <line x1="0" y1="0" x2="40" y2="90" stroke="#ff6b6b" stroke-width="2" />
      <circle cx="40" cy="90" r="6" fill="#ff6b6b" />
      <text x="45" y="95" font-family="Arial, sans-serif" font-size="10" fill="white">v3</text>
      
      <!-- Vector 4 -->
      <line x1="0" y1="0" x2="-90" y2="30" stroke="#1dd1a1" stroke-width="2" />
      <circle cx="-90" cy="30" r="6" fill="#1dd1a1" />
      <text x="-95" y="35" font-family="Arial, sans-serif" font-size="10" fill="white">v4</text>
      
      <!-- Vector 5 -->
      <line x1="0" y1="0" x2="70" y2="50" stroke="#feca57" stroke-width="2" />
      <circle cx="70" cy="50" r="6" fill="#feca57" />
      <text x="75" y="55" font-family="Arial, sans-serif" font-size="10" fill="white">v5</text>
    </g>
    
    <!-- Similarity visualization -->
    <g stroke-dasharray="3,3" stroke-opacity="0.7">
      <line x1="80" y1="-40" x2="70" y2="50" stroke="white" stroke-width="1" />
      <line x1="-60" y1="-70" x2="-90" y2="30" stroke="white" stroke-width="1" />
    </g>
    
    <!-- Cluster visualization -->
    <circle cx="75" cy="5" r="50" fill="none" stroke="#5ce2e7" stroke-width="1" stroke-opacity="0.3" />
    <circle cx="-75" cy="-20" r="45" fill="none" stroke="#ff9f43" stroke-width="1" stroke-opacity="0.3" />
    
    <!-- Animated search -->
    <g>
      <circle cx="0" cy="0" r="8" fill="none" stroke="white" stroke-width="2">
        <animate attributeName="r" values="8;60;8" dur="3s" repeatCount="indefinite" />
        <animate attributeName="stroke-opacity" values="1;0.2;1" dur="3s" repeatCount="indefinite" />
      </circle>
    </g>
  </g>
  
  <!-- Title -->
  <text x="300" y="340" font-family="Arial, sans-serif" font-size="24" font-weight="bold" fill="white" text-anchor="middle">Vector Embeddings</text>
  
  <!-- Divinci Logo -->
  <g transform="translate(40, 40) scale(0.4)">
    <rect width="60" height="60" rx="10" fill="#16214c" stroke="white" stroke-width="2" />
    <text x="30" y="38" font-family="Arial, sans-serif" font-size="40" font-weight="bold" fill="white" text-anchor="middle">D</text>
  </g>
</svg>
