<svg viewBox="0 0 1200 900" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pow-title { font-family: 'Georgia', serif; font-size: 30px; font-weight: bold; fill: #2d3c34; }
      .pow-subtitle { font-family: 'Georgia', serif; font-size: 14px; fill: #5a6b5f; font-style: italic; }
      .node-label { font-family: 'Arial', sans-serif; font-size: 13px; font-weight: 600; fill: #2d3c34; }
      .detail-text { font-family: 'Arial', sans-serif; font-size: 11px; fill: #2d3c34; }
      .value-text { font-family: 'Arial', sans-serif; font-size: 14px; fill: #27ae60; font-weight: 700; }
      .stat-text { font-family: 'Arial', sans-serif; font-size: 10px; fill: #666; }
    </style>
    <radialGradient id="center-node" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#3498db;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2980b9;stop-opacity:0.8" />
    </radialGradient>
    <linearGradient id="compute-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#9b59b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#8e44ad;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="reward-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#27ae60;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#229954;stop-opacity:0.9" />
    </linearGradient>
  </defs>

  <!-- Title -->
  <text x="600" y="40" text-anchor="middle" class="pow-title">Proof-of-Useful-Work: Distributed Computation Network</text>
  <text x="600" y="65" text-anchor="middle" class="pow-subtitle">How citizen computing power advances science while generating UBI funding</text>

  <!-- Central Coordination Node -->
  <g id="central-node">
    <circle cx="600" cy="350" r="100" fill="url(#center-node)"/>
    <text x="600" y="335" text-anchor="middle" class="node-label" style="fill: white; font-size: 16px;">DISTRIBUTED</text>
    <text x="600" y="355" text-anchor="middle" class="node-label" style="fill: white; font-size: 16px;">COMPUTATION</text>
    <text x="600" y="375" text-anchor="middle" class="node-label" style="fill: white; font-size: 16px;">NETWORK</text>

    <text x="600" y="405" text-anchor="middle" class="stat-text" style="fill: white;">10 exaFLOPS target</text>
  </g>

  <!-- Participant Nodes (circular around center) -->
  <!-- Node 1: Home Computer (Top Left) -->
  <g id="node1">
    <circle cx="300" cy="200" r="50" fill="#f9f9f9" stroke="#3498db" stroke-width="3"/>
    <text x="300" y="195" text-anchor="middle" class="node-label" style="font-size: 11px;">💻 Home</text>
    <text x="300" y="210" text-anchor="middle" class="node-label" style="font-size: 11px;">Computer</text>

    <path d="M 350 220 L 540 310" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="440" y="260" class="stat-text" style="fill: #3498db;">Submit tasks</text>
  </g>

  <!-- Node 2: Gaming PC (Top Right) -->
  <g id="node2">
    <circle cx="900" cy="200" r="50" fill="#f9f9f9" stroke="#3498db" stroke-width="3"/>
    <text x="900" y="195" text-anchor="middle" class="node-label" style="font-size: 11px;">🎮 Gaming</text>
    <text x="900" y="210" text-anchor="middle" class="node-label" style="font-size: 11px;">PC</text>

    <path d="M 850 220 L 660 310" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="760" y="260" class="stat-text" style="fill: #3498db;">GPU power</text>
  </g>

  <!-- Node 3: Mobile Device (Bottom Left) -->
  <g id="node3">
    <circle cx="300" cy="500" r="50" fill="#f9f9f9" stroke="#3498db" stroke-width="3"/>
    <text x="300" y="495" text-anchor="middle" class="node-label" style="font-size: 11px;">📱 Mobile</text>
    <text x="300" y="510" text-anchor="middle" class="node-label" style="font-size: 11px;">Device</text>

    <path d="M 350 480 L 540 390" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="440" y="440" class="stat-text" style="fill: #3498db;">Idle cycles</text>
  </g>

  <!-- Node 4: Enterprise Server (Bottom Right) -->
  <g id="node4">
    <circle cx="900" cy="500" r="50" fill="#f9f9f9" stroke="#3498db" stroke-width="3"/>
    <text x="900" y="495" text-anchor="middle" class="node-label" style="font-size: 11px;">🏢 Enterprise</text>
    <text x="900" y="510" text-anchor="middle" class="node-label" style="font-size: 11px;">Server</text>

    <path d="M 850 480 L 660 390" stroke="#3498db" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
    <text x="760" y="440" class="stat-text" style="fill: #3498db;">Spare capacity</text>
  </g>

  <!-- Computation Tasks (Left side boxes) -->
  <g id="tasks-box">
    <rect x="50" y="100" width="180" height="320" rx="10" fill="url(#compute-grad)" opacity="0.15"/>
    <rect x="60" y="110" width="160" height="35" rx="6" fill="url(#compute-grad)"/>
    <text x="140" y="133" text-anchor="middle" class="node-label" style="fill: white; font-size: 13px;">COMPUTE TASKS</text>

    <!-- Task list -->
    <text x="70" y="170" class="detail-text" style="font-weight: 600;">🧬 Protein Folding</text>
    <text x="80" y="188" class="stat-text">Drug discovery, disease research</text>

    <text x="70" y="218" class="detail-text" style="font-weight: 600;">🧪 Climate Modeling</text>
    <text x="80" y="236" class="stat-text">Weather prediction, carbon cycles</text>

    <text x="70" y="266" class="detail-text" style="font-weight: 600;">🔬 Material Science</text>
    <text x="80" y="284" class="stat-text">Battery tech, superconductors</text>

    <text x="70" y="314" class="detail-text" style="font-weight: 600;">🧮 Math Research</text>
    <text x="80" y="332" class="stat-text">Prime numbers, cryptography</text>

    <text x="70" y="362" class="detail-text" style="font-weight: 600;">🤖 AI Training</text>
    <text x="80" y="380" class="stat-text">Model optimization, inference</text>

    <text x="70" y="405" class="value-text" style="font-size: 12px;">$300B+ annual value</text>
  </g>

  <!-- Rewards Distribution (Right side boxes) -->
  <g id="rewards-box">
    <rect x="970" y="100" width="180" height="320" rx="10" fill="url(#reward-grad)" opacity="0.15"/>
    <rect x="980" y="110" width="160" height="35" rx="6" fill="url(#reward-grad)"/>
    <text x="1060" y="133" text-anchor="middle" class="node-label" style="fill: white; font-size: 13px;">REWARDS</text>

    <!-- Reward breakdown -->
    <text x="990" y="170" class="detail-text" style="font-weight: 600;">💰 Cryptocurrency Tokens</text>
    <text x="1000" y="188" class="stat-text">Proportional to compute contributed</text>

    <text x="990" y="218" class="detail-text" style="font-weight: 600;">📊 Computation Credits</text>
    <text x="1000" y="236" class="stat-text">1 FLOP-hour = 1 token</text>

    <text x="990" y="266" class="detail-text" style="font-weight: 600;">🔄 Liquid Market</text>
    <text x="1000" y="284" class="stat-text">Tokens tradable for fiat or goods</text>

    <text x="990" y="314" class="detail-text" style="font-weight: 600;">✅ Quality Bonuses</text>
    <text x="1000" y="332" class="stat-text">Reliable nodes earn 20% premium</text>

    <text x="990" y="362" class="detail-text" style="font-weight: 600;">🎯 UBI Distribution</text>
    <text x="1000" y="380" class="stat-text">Avg $200-500/month per household</text>

    <text x="1060" y="405" text-anchor="middle" class="value-text" style="font-size: 12px;">250M participants</text>
  </g>

  <!-- How It Works (Bottom section) -->
  <g id="how-it-works">
    <rect x="50" y="550" width="1100" height="300" rx="10" fill="#f0f9f4" stroke="#27ae60" stroke-width="3"/>
    <text x="600" y="585" text-anchor="middle" class="pow-title" style="fill: #27ae60; font-size: 24px;">How Proof-of-Useful-Work Functions</text>

    <!-- Step 1 -->
    <g>
      <circle cx="120" cy="640" r="30" fill="#3498db"/>
      <text x="120" y="650" text-anchor="middle" class="node-label" style="fill: white; font-size: 20px;">1</text>

      <text x="170" y="635" class="node-label">Scientists Submit Problems</text>
      <text x="170" y="655" class="detail-text">Research institutions, universities, corporations submit</text>
      <text x="170" y="672" class="detail-text">compute-intensive tasks verified by academic boards</text>
    </g>

    <!-- Step 2 -->
    <g>
      <circle cx="120" cy="740" r="30" fill="#9b59b6"/>
      <text x="120" y="750" text-anchor="middle" class="node-label" style="fill: white; font-size: 20px;">2</text>

      <text x="170" y="735" class="node-label">Network Distributes Work</text>
      <text x="170" y="755" class="detail-text">AI coordinator assigns tasks based on device capability</text>
      <text x="170" y="772" class="detail-text">and participant availability (idle CPU/GPU cycles)</text>
    </g>

    <!-- Step 3 -->
    <g>
      <circle cx="620" cy="640" r="30" fill="#f39c12"/>
      <text x="620" y="650" text-anchor="middle" class="node-label" style="fill: white; font-size: 20px;">3</text>

      <text x="670" y="635" class="node-label">Participants Compute</text>
      <text x="670" y="655" class="detail-text">Households run background tasks on computers, phones,</text>
      <text x="670" y="672" class="detail-text">gaming rigs during idle times (like BOINC/Folding@Home)</text>
    </g>

    <!-- Step 4 -->
    <g>
      <circle cx="620" cy="740" r="30" fill="#27ae60"/>
      <text x="620" y="750" text-anchor="middle" class="node-label" style="fill: white; font-size: 20px;">4</text>

      <text x="670" y="735" class="node-label">Results Verified &amp; Rewards Issued</text>
      <text x="670" y="755" class="detail-text">Redundant computation ensures accuracy; tokens issued</text>
      <text x="670" y="772" class="detail-text">proportional to compute contributed and quality score</text>
    </g>

    <!-- Real-World Example -->
    <rect x="70" y="795" width="1060" height="40" rx="6" fill="#fff9e6" stroke="#f39c12" stroke-width="2"/>
    <text x="600" y="820" text-anchor="middle" class="detail-text" style="font-weight: 600;">
      🌟 Real-World Precedent: Folding@Home achieved 2.4 exaFLOPS in 2020 with 4.6M volunteers, accelerating COVID-19 research
    </text>
  </g>

  <!-- Bottom statistics -->
  <text x="600" y="880" text-anchor="middle" class="stat-text" style="font-size: 11px; opacity: 0.7;">
    Target: 10 exaFLOPS = 250M households × 40 gigaFLOPS avg = $300B annual research value = $1,200/year per household
  </text>
</svg>
