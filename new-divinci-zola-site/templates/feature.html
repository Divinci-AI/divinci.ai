{% extends "base.html" %}

{% block body_class %}feature-page-template{% endblock %}

{% block content %}
{# current_lang is inherited from base template #}


<!-- Full-width content without restrictions for feature pages -->
<main class="feature-page leonardo-bg">
    {{ page.content | safe }}
</main>


<style>
/* Feature page specific styles - full width, no content restrictions */
.feature-page {
    width: 100%;
    max-width: 100%;
    margin: 0;
    padding: 0;
}

.feature-page .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 2rem;
}

.feature-page h1, .feature-page h2, .feature-page h3, .feature-page h4, .feature-page h5, .feature-page h6 {
    margin-top: 0;
    margin-bottom: 1rem;
}

.feature-page p {
    margin-bottom: 1rem;
    line-height: 1.6;
}

.feature-page ul, .feature-page ol {
    margin-bottom: 1rem;
    padding-left: 2rem;
}

.feature-page li {
    margin-bottom: 0.5rem;
}

.feature-page a {
    color: var(--color-neutral-inverse);
    text-decoration: none;
}

.feature-page a:hover {
    color: var(--color-accent-tertiary);
    text-decoration: underline;
}

/* Ensure proper spacing for custom sections */
.feature-page section {
    width: 100%;
    margin: 0;
    padding: 0;
}

/* Desktop responsive adjustments */
@media (max-width: 768px) {
    .feature-page .container {
        padding: 0 1rem;
    }
    
    .hero-animation-container {
        width: 300px !important;
        height: 300px !important;
    }
    
    .benefits-circle-container {
        width: 400px !important;
        height: 400px !important;
    }
    
    .desktop-only {
        display: none !important;
    }
}
</style>
{% endblock %}

{% block extra_scripts %}
{% if page.path is containing("api") %}
<script src="{{ get_url(path="js/redoc.standalone.js") }}"></script>
<script>
(function waitForRedoc() {
  if (typeof Redoc !== 'undefined' && document.getElementById('redoc-container')) {
    // openapi-v1.json is auto-generated from the Express route definitions by
    // workspace/servers/public-api/scripts/generate-openapi.ts in the server
    // repo — every path + method is guaranteed to match the shipped API.
    // The legacy hand-maintained openapi.yaml is still served at /openapi.yaml
    // for reference but no longer drives the render.
    Redoc.init('/openapi-v1.json', {
      scrollYOffset: 0,
      hideDownloadButton: false,
      expandResponses: '200',
      nativeScrollbars: true,
      theme: {
        colors: { primary: { main: '#2d5a4f' } },
        typography: {
          fontSize: '15px',
          fontFamily: 'Source Sans 3, sans-serif',
          headings: { fontFamily: 'Fraunces, serif', fontWeight: '400' },
          code: { fontSize: '13px', fontFamily: 'monospace' }
        },
        sidebar: { backgroundColor: '#f8f4f0', textColor: '#2d3c34' },
        rightPanel: { backgroundColor: '#1e3a2b' },
        menu: { backgroundColor: '#f8f4f0' }
      }
    }, document.getElementById('redoc-container'));

    // Make sidebar sticky after Redoc renders
    function fixRedocSidebar() {
      var wrap = document.querySelector('.redoc-wrap');
      if (!wrap) { setTimeout(fixRedocSidebar, 500); return; }

      var sidebar = wrap.children[0];
      if (!sidebar || sidebar.offsetWidth > 400) { setTimeout(fixRedocSidebar, 500); return; }

      // Key: align-items must be flex-start so sidebar doesn't stretch to full height
      wrap.style.alignItems = 'flex-start';

      sidebar.style.position = 'sticky';
      sidebar.style.top = '50px';
      sidebar.style.height = 'calc(100vh - 50px)';
      sidebar.style.overflowY = 'auto';
      sidebar.style.overflowX = 'hidden';
      sidebar.style.flexShrink = '0';

      console.log('Redoc sidebar fixed:', sidebar.offsetWidth + 'px wide');
    }
    setTimeout(fixRedocSidebar, 1500);

    // Compact header on scroll
    var header = document.querySelector('header');
    if (header) {
      window.addEventListener('scroll', function() {
        if (window.scrollY > 50) {
          header.classList.add('compact');
        } else {
          header.classList.remove('compact');
        }
      }, { passive: true });
    }
  } else {
    setTimeout(waitForRedoc, 100);
  }
})();
</script>
{% endif %}
{% endblock %}
