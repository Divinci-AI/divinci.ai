<!-- Language Switcher Component -->

<div class="language-switcher">
    <div class="language-switcher-current">
        <span class="language-icon">
            <i class="fa-solid fa-language"></i>
        </span>
        <span class="current-language">{{ translations.language_switcher.current_language | default(value="English") }}</span>
        <span class="dropdown-icon">▼</span>
    </div>
    <div class="language-switcher-dropdown">
        <a href="{{ config.base_url }}" class="language-option" data-lang="en">
            <span class="language-name">English</span>
            <span class="language-native">English</span>
        </a>
        <a href="{{ config.base_url }}es" class="language-option" data-lang="es">
            <span class="language-name">Spanish</span>
            <span class="language-native">Español</span>
        </a>
        <a href="{{ config.base_url }}fr" class="language-option" data-lang="fr">
            <span class="language-name">French</span>
            <span class="language-native">Français</span>
        </a>
        <a href="{{ config.base_url }}ar" class="language-option" data-lang="ar">
            <span class="language-name">Arabic</span>
            <span class="language-native">العربية</span>
        </a>
        <a href="{{ config.base_url }}ja" class="language-option" data-lang="ja">
            <span class="language-name">Japanese</span>
            <span class="language-native">日本語</span>
        </a>
        <a href="{{ config.base_url }}zh" class="language-option" data-lang="zh">
            <span class="language-name">Chinese</span>
            <span class="language-native">中文</span>
        </a>
        <a href="{{ config.base_url }}it" class="language-option" data-lang="it">
            <span class="language-name">Italian</span>
            <span class="language-native">Italiano</span>
        </a>
        <a href="{{ config.base_url }}ru" class="language-option" data-lang="ru">
            <span class="language-name">Russian</span>
            <span class="language-native">Русский</span>
        </a>
        <a href="{{ config.base_url }}de" class="language-option" data-lang="de">
            <span class="language-name">German</span>
            <span class="language-native">Deutsch</span>
        </a>
        <a href="{{ config.base_url }}pt" class="language-option" data-lang="pt">
            <span class="language-name">Portuguese</span>
            <span class="language-native">Português</span>
        </a>
        <a href="{{ config.base_url }}ko" class="language-option" data-lang="ko">
            <span class="language-name">Korean</span>
            <span class="language-native">한국어</span>
        </a>
        <a href="{{ config.base_url }}nl" class="language-option" data-lang="nl">
            <span class="language-name">Dutch</span>
            <span class="language-native">Nederlands</span>
        </a>
        <a href="{{ config.base_url }}hi" class="language-option" data-lang="hi">
            <span class="language-name">Hindi</span>
            <span class="language-native">हिन्दी</span>
        </a>
    </div>
</div>
