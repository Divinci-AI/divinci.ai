<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Hreflang tags for language alternatives -->
    <link rel="alternate" href="https://divinci.ai/minimal-test.html" hreflang="x-default" />
    <link rel="alternate" href="https://divinci.ai/minimal-test.html" hreflang="en" />
    <link rel="alternate" href="https://divinci.ai/es/minimal-test.html" hreflang="es" />
    <link rel="alternate" href="https://divinci.ai/fr/minimal-test.html" hreflang="fr" />
    <link rel="alternate" href="https://divinci.ai/ar/minimal-test.html" hreflang="ar" />

    <!-- Hreflang tags for language alternatives -->
    <link rel="alternate" href="https://divinci.ai/minimal-test.html" hreflang="x-default" />
    <link rel="alternate" href="https://divinci.ai/minimal-test.html" hreflang="en" />
    <link rel="alternate" href="https://divinci.ai/es/minimal-test.html" hreflang="es" />
    <link rel="alternate" href="https://divinci.ai/fr/minimal-test.html" hreflang="fr" />
    <link rel="alternate" href="https://divinci.ai/ar/minimal-test.html" hreflang="ar" />
    <title>Divinci Minimal Animation - Français</title>
    <style>
        body {
            background-color: #0a192f;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        
        .container {
            text-align: center;
        }
        
        svg {
            margin-bottom: 20px;
        }
        
        button {
            padding: 10px 20px;
            background-color: #4caf50;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
    </style>
    <!-- Set default language -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (window.i18n && window.i18n.changeLanguage) {
                window.i18n.changeLanguage('fr');
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <svg width="200" height="200" viewBox="0 0 200 200">
            <rect id="rect" x="50" y="50" width="100" height="100" fill="white"/>
        </svg>
        
        <button id="animate-button">Animate Rectangle</button>
    </div>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded');
            
            const rect = document.getElementById('rect');
            const animateButton = document.getElementById('animate-button');
            
            console.log('Elements:', { rect, animateButton });
            
            // Create timeline
            const timeline = gsap.timeline({ paused: true });
            
            // Add animation
            timeline.to(rect, {
                rotation: 360,
                duration: 2,
                transformOrigin: "center",
                ease: "power2.inOut"
            });
            
            // Add button event listener
            animateButton.addEventListener('click', function() {
                console.log('Button clicked');
                timeline.restart();
            });
        });
    </script>
</body>
</html>
